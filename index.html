<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Arial', sans-serif; }
    #titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; color: #ff7ab6; text-shadow: 0 0 20px #ff7ab6; z-index: 10; pointer-events: none; }
    
    #musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border: none; border-radius: 30px; background: #aa44ff; color: white; font-size: 20px; cursor: pointer; box-shadow: 0 0 25px #aa44ff; z-index: 100; transition: 0.4s; }
    #musicBtn:hover { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 40px #ff77aa; background: #ff77aa; }

    #frase { position: absolute; bottom: 130px; width: 100%; text-align: center; font-size: 26px; color: white; text-shadow: 0 0 20px white; opacity: 0; transition: 1s; z-index: 10; }

    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #ff77aa; border: 2px solid #ff77aa; max-width: 450px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; font-size: 18px; outline: none; }
    .btn-modal { padding: 12px 25px; border: none; border-radius: 20px; background: #ff77aa; color: white; cursor: pointer; font-size: 16px; margin: 10px; transition: 0.3s; }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p><strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
        Tú eres mi universo, mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
        <strong>¡Te amo infinitamente! 💕</strong></p>
        <button class="btn-modal" onclick="cerrarModales()">💕 Te amo 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
let despierto = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 0, 800); // Cámara lejos para el efecto de entrada

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUCES
scene.add(new THREE.AmbientLight(0xffffff, 0.2));
const pLight = new THREE.PointLight(0xff77aa, 2);
pLight.position.set(0, 50, 100);
scene.add(pLight);

const frases = ["💖 Mi amor", "🥰 Eres mi todo", "💘 Natasha", "✨ Mi vida", "🌸 Princesa", "💍 Siempre tú", "🧸 Mi bebita", "👑 Mi reina", "🦋 Magia pura", "🌹 Te amo", "🍭 Mi dulce", "🌙 Mi luna"];

// 1. ESTRELLAS MÁS JUNTAS (Densidad alta)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<18000; i++) {
    starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*800, (Math.random()-0.5)*1000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.9, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// 2. CUBOS ROSAS
const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
for(let i=0; i<800; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), cubeMat);
    c.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*600, (Math.random()-0.5)*800);
    scene.add(c);
    cubes.push(c);
}

// 3. CORAZÓN CENTRAL
const heartPoints = [];
for (let i = 0; i < 3000; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heartPoints.push(x * 1.8, y * 1.8 + 20, (Math.random() - 0.5) * 8);
}
const heartMat = new THREE.PointsMaterial({ color: 0x222222, size: 2.5 });
const heart = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3)), heartMat);
scene.add(heart);

// 4. FRASES FLOTANTES (Más cerca del centro)
const sprites = [];
function crearSprite(texto) {
    const canvas = document.createElement("canvas"); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "bold 26px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "#ff77aa"; ctx.shadowBlur = 8;
    ctx.fillText(texto, 128, 32);
    const sMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 });
    const s = new THREE.Sprite(sMat);
    s.position.set((Math.random()-0.5)*600, (Math.random()-0.5)*500, (Math.random()-0.5)*600);
    s.scale.set(60, 15, 1);
    scene.add(s);
    sprites.push(s);
}
for(let i=0; i<300; i++) crearSprite(frases[i % frases.length]);

// 5. FOTOS ORDENADAS
const photos = [];
const loader = new THREE.TextureLoader();
for(let i=1; i<=28; i++) {
    const group = new THREE.Group();
    const pMat = new THREE.MeshBasicMaterial({ map: loader.load(`foto${i}.jpg`), side: THREE.DoubleSide, transparent: true, opacity: 0 });
    group.add(new THREE.Mesh(new THREE.PlaneGeometry(22, 22), pMat));
    const angle = (i % 14) * (Math.PI * 2 / 14);
    const radius = i <= 14 ? 130 : 180;
    group.position.set(Math.cos(angle)*radius, (i <= 14 ? 50 : -50), Math.sin(angle)*radius);
    scene.add(group);
    photos.push(group);
}

// LÓGICA
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta..."); }
}
function cerrarModales() {
    document.getElementById('modalClave').classList.remove('activo');
    document.getElementById('mensajeSecreto').classList.remove('activo');
}

// DESPERTAR DINÁMICO
let audio;
document.getElementById("musicBtn").onclick = function() {
    if(!audio) { audio = new Audio("music.mp3"); audio.loop = true; }
    audio.play();
    this.style.display = "none";
    despierto = true;
    
    // Zoom in de cámara al centro
    let zoomInt = setInterval(() => {
        if(camera.position.z > 300) camera.position.z -= 10;
        else clearInterval(zoomInt);
    }, 10);

    heartMat.color.set(0xff3377);
    starsMat.opacity = 0.9;
    cubeMat.opacity = 0.6;
    sprites.forEach(s => s.material.opacity = 0.5);
    photos.forEach(p => p.children[0].material.opacity = 1);
};

function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    if(despierto) {
        heart.rotation.y += 0.005;
        heart.scale.setScalar(1 + Math.sin(t * 4) * 0.15);
        stars.rotation.y += 0.0003;
        
        cubes.forEach((c, i) => {
            c.scale.setScalar(1 + Math.sin(t * 2 + i) * 0.3);
            c.rotation.x += 0.01;
        });
        
        photos.forEach((p, i) => {
            p.lookAt(camera.position);
            p.position.y += Math.sin(t + i) * 0.1;
        });
    } else {
        heart.scale.setScalar(1 + Math.sin(t * 1) * 0.05);
    }

    controls.update();
    renderer.render(scene, camera);
}
animate();

setInterval(() => {
    if(despierto) {
        const d = document.getElementById("frase");
        d.innerHTML = frases[Math.floor(Math.random()*frases.length)];
        d.style.opacity = 1;
        setTimeout(() => d.style.opacity = 0, 4000);
    }
}, 7000);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
