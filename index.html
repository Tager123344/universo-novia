<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body{ margin:0; overflow:hidden; background:black; font-family:Arial; }
    #titulo{ position:absolute; top:20px; width:100%; text-align:center; font-size:36px; color:#ff7ab6; text-shadow:0 0 25px #ff7ab6; z-index:10; pointer-events:none; }
    
    /* BOTÓN ORIGINAL */
    #musicBtn{ position:absolute; bottom:40px; left:50%; transform:translateX(-50%); padding:14px 28px; border:none; border-radius:25px; background:#aa44ff; color:white; font-size:18px; cursor:pointer; box-shadow:0 0 20px #aa44ff; z-index:20; transition:0.3s; }
    #musicBtn:hover { transform:translateX(-50%) scale(1.1); box-shadow:0 0 30px #ff77aa; }
    
    #frase{ position:absolute; bottom:120px; width:100%; text-align:center; font-size:28px; color:white; text-shadow:0 0 25px white; opacity:0; transition:1s; z-index:10; }

    /* MODALES */
    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff77aa; border: 2px solid #ff77aa; max-width: 500px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; font-size: 18px; }
    button.btn-modal { padding: 12px 30px; border: none; border-radius: 25px; background: #ff77aa; color: white; cursor: pointer; transition: 0.3s; font-size: 16px; margin: 5px; }
    button.btn-modal:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff77aa; }
</style>
</head>
<body>

<div id="titulo">💖 Toca el corazón central para ti, mi amor 💖</div>
<button id="musicBtn">🎵 Activar nuestro universo</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave para mi universo 💕</h2>
        <input type="password" id="inputClave" placeholder="Escribe la fecha especial">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Entrar a mi corazón</button>
        <button class="btn-modal" onclick="document.getElementById('modalClave').classList.remove('activo')">Regresar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p>
            <strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
            Tú eres mi universo, mi principio y mi fin. Cada estrella aquí brilla por ti.<br><br>
            <strong>¡Te amo infinitamente! 💕</strong>
        </p>
        <button class="btn-modal" onclick="document.getElementById('mensajeSecreto').classList.remove('activo')">💕 Cerrar con un beso 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
let universoDespierto = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 40, 280);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUCES
const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); // Empieza tenue
scene.add(ambientLight);
const pLight = new THREE.PointLight(0xffffff, 0.5);
pLight.position.set(100, 100, 100);
scene.add(pLight);

// --- FRASES ---
const frasesBonitas = [
    "💖 Mi gordita hermosa", "💗 Mi lugar seguro", "🥰 Mi tiquitita", "💘 Eres mi universo", 
    "✨ Mi estrella", "🌹 Eres mi vida", "💓 Te amo infinitamente", "💞 Siempre juntos", 
    "👶 Mi bebita", "🌸 Mi niña", "👑 Mi reina", "🦋 Eres magia"
];

// 1. GALAXIA (Estrellas)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<15000; i++){
    const r = Math.random()*800;
    const angle = Math.random()*Math.PI*2;
    starPos.push(Math.cos(angle)*r, (Math.random()-0.5)*100, Math.sin(angle)*r);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({color:0xffffff, size:0.8, transparent:true, opacity:0});
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// 2. CUBITOS ROSAS QUE RESPIRAN
const cubes = [];
for(let i=0; i<1200; i++){
    const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.2, 1.2), 
        new THREE.MeshBasicMaterial({color:0xff77aa, transparent:true, opacity:0})
    );
    cube.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*600, (Math.random()-0.5)*1000);
    scene.add(cube);
    cubes.push(cube);
}

// 3. FRASES FLOTANTES
const sprites = [];
function crearSpriteTexto(texto){
    const canvas = document.createElement("canvas"); canvas.width = 300; canvas.height = 100;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "bold 28px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "#ff77aa"; ctx.shadowBlur = 10; ctx.fillText(texto, 150, 50);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas), transparent:true, opacity:0}));
    sprite.position.set((Math.random()-0.5)*1200, (Math.random()-0.5)*700, (Math.random()-0.5)*1200);
    sprite.scale.set(45, 15, 1); scene.add(sprite);
    sprites.push(sprite);
}
for(let i=0; i<300; i++) crearSpriteTexto(frasesBonitas[i % frasesBonitas.length]);

// 4. CORAZÓN CENTRAL (Empieza gris/tenue)
const heartPts = [];
for(let i=0; i<2500; i++){
    const t = Math.random()*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    heartPts.push(x*1.3, y*1.3 + 40, (Math.random()-0.5)*4);
}
const heartMat = new THREE.PointsMaterial({color:0x444444, size:1.8});
const heartMesh = new THREE.Points(
    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPts, 3)), 
    heartMat
);
scene.add(heartMesh);

// 5. FOTOS ORDENADAS (FIJAS)
const photos = [];
const loader = new THREE.TextureLoader();
const fShape = new THREE.Shape();
fShape.moveTo(-10,-10); fShape.lineTo(10,-10); fShape.lineTo(10,10); fShape.lineTo(-10,10);
const hole = new THREE.Path(); hole.moveTo(-9,-9); hole.lineTo(9,-9); hole.lineTo(9,9); hole.lineTo(-9,9);
fShape.holes.push(hole);
const fGeo = new THREE.ShapeGeometry(fShape);

for(let i=1; i<=28; i++){
    const group = new THREE.Group();
    const photoMat = new THREE.MeshBasicMaterial({map: loader.load(`foto${i}.jpg`), side:THREE.DoubleSide, transparent:true, opacity:0});
    const frameMat = new THREE.MeshBasicMaterial({color:0xff7ab6, side:THREE.DoubleSide, transparent:true, opacity:0});
    
    const photo = new THREE.Mesh(new THREE.PlaneGeometry(18,18), photoMat);
    const frame = new THREE.Mesh(fGeo, frameMat);
    group.add(photo); group.add(frame);

    const isTop = i <= 14;
    const angle = (i % 14) * (Math.PI * 2 / 14);
    const radius = isTop ? 105 : 140;
    const py = isTop ? 65 : -15;
    group.position.set(Math.cos(angle)*radius, py, Math.sin(angle)*radius);
    
    scene.add(group);
    photos.push(group);
}

// 6. PARTÍCULAS DE HOVER
const particles = [];
function createHoverParticles(pos) {
    if(!universoDespierto) return;
    for(let i=0; i<6; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.5, 4, 4), new THREE.MeshBasicMaterial({color: 0xffccdd, transparent:true}));
        p.position.copy(pos);
        p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2), life: 1.0 };
        scene.add(p);
        particles.push(p);
    }
}

// LÓGICA DE INTERACCIÓN
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove", (e) => {
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    if(universoDespierto) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(photos, true);
        photos.forEach(p => p.scale.set(1,1,1));
        if(intersects.length > 0) {
            const obj = intersects[0].object.parent;
            obj.scale.set(1.2, 1.2, 1.2);
            createHoverParticles(obj.position);
        }
    }
});

window.addEventListener("click", () => {
    raycaster.setFromCamera(mouse, camera);
    if(raycaster.intersectObject(heartMesh).length > 0 && universoDespierto) {
        document.getElementById('modalClave').classList.add('activo');
    }
});

function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Esa no es nuestra fecha... inténtalo de nuevo mi amor"); }
}

// --- ANIMACIÓN DE DESPERTAR (IDEA 3) ---
let music;
document.getElementById("musicBtn").onclick = () => {
    if(!music) { music = new Audio("music.mp3"); music.loop = true; }
    music.play();
    document.getElementById("musicBtn").style.display = "none";
    
    // El despertar
    universoDespierto = true;
    heartMat.color.set(0xff3377);
    ambientLight.intensity = 0.6;
    pLight.intensity = 1.8;
    
    // Aparecer elementos gradualmente
    starsMat.opacity = 0.8;
    cubes.forEach(c => c.material.opacity = 0.6);
    sprites.forEach(s => s.material.opacity = 0.4);
    photos.forEach(p => {
        p.children[0].material.opacity = 1;
        p.children[1].material.opacity = 1;
    });
};

function animate(){
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    if(universoDespierto) {
        stars.rotation.y += 0.0003;
        heartMesh.rotation.y += 0.005;
        heartMesh.scale.setScalar(1 + Math.sin(time*4)*0.12);

        const pulse = 1 + Math.sin(time * 2) * 0.3;
        cubes.forEach((c) => {
            c.scale.setScalar(pulse);
            c.rotation.x += 0.01;
        });

        photos.forEach((p, i) => {
            p.lookAt(camera.position);
            p.position.y += Math.sin(time + i) * 0.05;
        });

        for(let i = particles.length-1; i>=0; i--){
            const p = particles[i];
            p.position.add(p.userData.vel);
            p.userData.life -= 0.02;
            p.material.opacity = p.userData.life;
            if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
        }
    } else {
        // Latido muy débil antes de despertar
        heartMesh.scale.setScalar
