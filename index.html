<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#mensaje{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:40px;
color:#ff6fae;
text-shadow:0 0 25px #ff6fae;
}

#btn{
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#ff2e8b;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2e8b;
}

#musicBtn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:12px 24px;
border:none;
border-radius:20px;
background:#6fa8ff;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 15px #6fa8ff;
}
</style>

</head>

<body>

<div id="mensaje">💖 Nuestro Universo 💖</div>
<button id="btn">💌 Mensaje secreto</button>
<button id="musicBtn">⏸ Pausar música</button>

<audio id="bgMusic" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_9462b0c6a9.mp3?filename=romantic-background-ambient-124008.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=80

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<20000;i++){

const r=Math.random()*220
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:1
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// CORAZON

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2500;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1
})

const heartMesh=new THREE.Points(heartGeo,heartMat)

scene.add(heartMesh)



// FOTOS

const loader=new THREE.TextureLoader()
const photos=[]

function photo(angle){

const tex=loader.load("foto"+(Math.floor(Math.random()*5)+1)+".jpg")

const geo=new THREE.PlaneGeometry(14,14)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(angle)*35
mesh.position.z=Math.sin(angle)*35

mesh.userData={
angle:angle,
radius:35
}

scene.add(mesh)
photos.push(mesh)

}

for(let i=0;i<5;i++){
photo(i*Math.PI*2/5)
}



// FRASES

const frases=[
"Mi princesa hermosa",
"Mi niña preciosa",
"Mi amor eterno",
"Te amo muchísimo",
"Eres mi felicidad",
"Eres mi universo",
"Mi amorcito lindo",
"Siempre contigo",
"Eres mi todo",
"Mi corazón es tuyo"
]

for(let i=0;i<400;i++){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="36px Arial"
ctx.textAlign="center"

const text=frases[Math.floor(Math.random()*frases.length)]

ctx.fillText(text,256,130)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

const angle=Math.random()*Math.PI*2
const radius=100+Math.random()*120

sprite.position.x=Math.cos(angle)*radius
sprite.position.z=Math.sin(angle)*radius
sprite.position.y=(Math.random()-0.5)*80

sprite.scale.set(14,6,1)

scene.add(sprite)

}



// ESTRELLAS (15% MENOS Y MAS PEQUEÑAS)

const stars=[]
const totalStars=2550

for(let i=0;i<totalStars;i++){

const geo=new THREE.SphereGeometry(0.03,6,6)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(
(Math.random()-0.5)*600,
(Math.random()-0.5)*300,
(Math.random()-0.5)*600
)

star.userData.blink=Math.random()*2

scene.add(star)
stars.push(star)

}



// ESTRELLA FUGAZ

function shootingStar(){

const geo=new THREE.SphereGeometry(0.3,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-600,Math.random()*200,-200)

scene.add(star)

const speed=9

function move(){

star.position.x+=speed
star.position.y-=speed*0.4

if(star.position.x<600){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(shootingStar,1500)



// MENSAJE

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")

}



// MUSICA

const music=document.getElementById("bgMusic")
const musicBtn=document.getElementById("musicBtn")

musicBtn.onclick=()=>{

if(music.paused){

music.play()
musicBtn.textContent="⏸ Pausar música"

}else{

music.pause()
musicBtn.textContent="▶ Reproducir música"

}

}



// LUZ

const light=new THREE.PointLight(0xffffff,1.5)
light.position.set(50,50,50)
scene.add(light)



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0006
heartMesh.rotation.y+=0.003

photos.forEach(p=>{
p.userData.angle+=0.002
p.position.x=Math.cos(p.userData.angle)*p.userData.radius
p.position.z=Math.sin(p.userData.angle)*p.userData.radius
})

stars.forEach(s=>{
s.material.opacity=0.5+Math.sin(Date.now()*0.003+s.userData.blink)*0.5
})

controls.update()

renderer.render(scene,camera)

}

animate()



window.addEventListener('resize',()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
