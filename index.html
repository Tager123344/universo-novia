<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}
#mensaje{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:40px;
    color:#ff6fae;
    text-shadow:0 0 25px #ff6fae;
}
#btn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:14px 28px;
    border:none;
    border-radius:25px;
    background:#ff2e8b;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px #ff2e8b;
}
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ★ Fondo de estrellas lejanas (fijas, muy pequeñas, para profundidad)
const bgStarsGeo = new THREE.BufferGeometry();
const bgVertices = [];
const bgCount = 8000;

for (let i = 0; i < bgCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1800 + Math.random() * 1200; // muy lejos

    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);

    bgVertices.push(x, y, z);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));

const bgMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 1.2,          // un poco más grandes que las partículas de galaxia para diferenciar
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.7
});
const bgStars = new THREE.Points(bgStarsGeo, bgMat);
scene.add(bgStars);

// ---------------- GALAXIA (más pequeña y menos densa en el centro) ----------------
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for (let i = 0; i < 15000; i++) {  // reducido de 20000 a 15000 para menos saturación
    const r = Math.random() * 220;
    const spin = r * 0.4;
    const angle = Math.random() * Math.PI * 2;
    vertices.push(
        Math.cos(angle + spin) * r,
        (Math.random() - 0.5) * 20,
        Math.sin(angle + spin) * r
    );
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

const galaxyMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.4,              // ← mucho más pequeño (antes era 1)
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.9
});
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// ---------------- CORAZON ----------------
const heartGeo = new THREE.BufferGeometry();
const heart = [];
for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heart.push(x * 0.8, y * 0.8, (Math.random() - 0.5) * 2);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heart, 3));

const heartMat = new THREE.PointsMaterial({ color: 0xff3377, size: 1 });
const heartMesh = new THREE.Points(heartGeo, heartMat);
scene.add(heartMesh);

// ---------------- FOTOS ----------------
const loader = new THREE.TextureLoader();
const photoFiles = ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg"];
const photos = [];

function photo(angle, file) {
    const tex = loader.load(file);
    const geo = new THREE.PlaneGeometry(14, 14);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = Math.cos(angle) * 35;
    mesh.position.z = Math.sin(angle) * 35;
    mesh.userData = { angle: angle, radius: 35 };
    scene.add(mesh);
    photos.push(mesh);
}

for (let i = 0; i < 5; i++) {
    photo(i * Math.PI * 2 / 5, photoFiles[i]);
}

// ---------------- FRASES ----------------
const frases = [
    "Mi princesa hermosa", "Mi niña preciosa", "Mi amor eterno", "Te amo muchísimo",
    "Eres mi felicidad", "Eres mi universo", "Mi amorcito lindo", "Siempre contigo",
    "Eres mi todo", "Mi corazón es tuyo"
];

for (let i = 0; i < 400; i++) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 512; canvas.height = 256;
    ctx.fillStyle = "white"; ctx.font = "36px Arial"; ctx.textAlign = "center";
    const text = frases[Math.floor(Math.random() * frases.length)];
    ctx.fillText(text, 256, 130);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex });
    const sprite = new THREE.Sprite(mat);
    const angle = Math.random() * Math.PI * 2;
    const radius = 100 + Math.random() * 120;
    sprite.position.x = Math.cos(angle) * radius;
    sprite.position.z = Math.sin(angle) * radius;
    sprite.position.y = (Math.random() - 0.5) * 80;
    sprite.scale.set(14, 6, 1);
    scene.add(sprite);
}

// ---------------- ESTRELLAS (twinkling) ----------------
const stars = [];
const totalStars = 3000;
for (let i = 0; i < totalStars; i++) {
    let x = (Math.random() - 0.5) * 600;
    let y = (Math.random() - 0.5) * 300;
    let z = (Math.random() - 0.5) * 600;
    const radius = Math.sqrt(x * x + y * y + z * z);
    if (radius < 100 && Math.random() < 0.2) continue;
    const geo = new THREE.SphereGeometry(0.02, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const star = new THREE.Mesh(geo, mat);
    star.position.set(x, y, z);
    star.userData.blink = Math.random() * 2;
    scene.add(star);
    stars.push(star);
}

// ---------------- ESTRELLA FUGAZ ----------------
function shootingStar() {
    const geo = new THREE.SphereGeometry(0.03, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const star = new THREE.Mesh(geo, mat);
    star.position.set(-600, Math.random() * 200, -200);
    scene.add(star);
    const speed = 9;
    function move() {
        star.position.x += speed;
        star.position.y -= speed * 0.4;
        if (star.position.x < 600) requestAnimationFrame(move);
        else scene.remove(star);
    }
    move();
}
setInterval(shootingStar, 1500);

// ---------------- MENSAJE ----------------
document.getElementById("btn").onclick = () => {
    alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️");
};

// ---------------- LUZ ----------------
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(50, 50, 50);
scene.add(light);

// ---------------- ANIMACION ----------------
function animate() {
    requestAnimationFrame(animate);
    galaxy.rotation.y += 0.0006;
    heartMesh.rotation.y += 0.003;

    photos.forEach(p => {
        p.userData.angle += 0.002;
        p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
        p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
    });

    stars.forEach(s => {
        s.material.opacity = 0.5 + Math.sin(Date.now() * 0.003 + s.userData.blink) * 0.5;
    });

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
