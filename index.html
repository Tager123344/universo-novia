<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: Arial; }
    #titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 36px; color: #ff7ab6; text-shadow: 0 0 25px #ff7ab6; z-index: 10; pointer-events: none; }
    #musicBtn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border: none; border-radius: 25px; background: #aa44ff; color: white; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px #aa44ff; z-index: 10; }
    #frase { position: absolute; bottom: 120px; width: 100%; text-align: center; font-size: 28px; color: white; text-shadow: 0 0 25px white; opacity: 0; transition: 1s; z-index: 10; }
    
    /* Modales */
    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    .activo { display: flex !important; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff77aa; border: 2px solid #ff77aa; max-width: 400px; color: white; }
    input { padding: 15px; font-size: 18px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; }
    button.pink { padding: 12px 30px; background: #ff77aa; border: none; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo - Para Natasha 💖</div>
<button id="musicBtn">🎵 Activar Música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="pink" onclick="verificarClave()">💖 Desbloquear</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>Mi Natasha Hermosa</h1>
        <p>Eres la luz que ilumina cada día de mi vida ✨<br>Te amo hoy, mañana y siempre. 🌌</p>
        <button class="pink" onclick="document.getElementById('mensajeSecreto').classList.remove('activo')">Cerrar con Amor</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
const TOTAL_FOTOS = 28;

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(0, 50, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUCES
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// GALAXIA Y CUBOS (Originales)
const vertices = [];
for(let i=0; i<10000; i++){
    const r = Math.random()*400;
    const spin = r*0.4;
    const angle = Math.random()*Math.PI*2;
    vertices.push(Math.cos(angle+spin)*r, (Math.random()-0.5)*30, Math.sin(angle+spin)*r);
}
const galaxyGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
scene.add(new THREE.Points(galaxyGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7})));

for(let i=0; i<600; i++){
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color:0xff77aa, transparent:true, opacity:0.4}));
    cube.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*400, (Math.random()-0.5)*800);
    scene.add(cube);
}

// CORAZÓN CENTRAL
const heartPoints = [];
for(let i=0; i<3000; i++){
    const t = Math.random()*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    heartPoints.push(x*1.2, y*1.2 + 30, (Math.random()-0.5)*5);
}
const heartGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3));
const heartMesh = new THREE.Points(heartGeo, new THREE.PointsMaterial({color: 0xff3377, size: 1.5}));
scene.add(heartMesh);

// FOTOS CON MARCO LUMINOSO (28 Slots)
const photos = [];
const loader = new THREE.TextureLoader();

for(let i=1; i<=TOTAL_FOTOS; i++){
    const group = new THREE.Group();
    const tex = loader.load(`foto${i}.jpg`);
    
    // La imagen
    const photo = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 18), 
        new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
    );

    // MARCO LUMINOSO (Solo bordes)
    // Usamos un Torus o un Wireframe para que solo se vea el borde
    const edges = new THREE.EdgesGeometry(new THREE.PlaneGeometry(18.2, 18.2));
    const line = new THREE.LineSegments(
        edges, 
        new THREE.LineBasicMaterial({ color: 0xff7ab6, linewidth: 2 })
    );
    
    // Glow extra para el marco (un plano ligeramente más grande con transparencia)
    const glow = new THREE.Mesh(
        new THREE.PlaneGeometry(19, 19),
        new THREE.MeshBasicMaterial({ color: 0xff7ab6, transparent: true, opacity: 0.2, side: THREE.DoubleSide })
    );
    glow.position.z = -0.05;

    group.add(photo);
    group.add(line);
    group.add(glow);

    // DISTRIBUCIÓN: 14 arriba y 14 abajo
    const isTop = i <= 14;
    const angle = ((i % 14) / 14) * Math.PI * 2;
    const radius = 80;
    const py = isTop ? 50 : 10;
    
    group.position.set(Math.cos(angle)*radius, py, Math.sin(angle)*radius);
    group.lookAt(0, py, 0); // Todas miran al centro
    
    scene.add(group);
    photos.push(group);
}

// LÓGICA DE INTERACCIÓN Y MÚSICA (Igual al original)
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta..."); }
}

window.addEventListener("click", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    if(raycaster.intersectObject(heartMesh).length > 0) document.getElementById('modalClave').classList.add('activo');
});

let music;
document.getElementById("musicBtn").onclick = () => {
    if(!music) { music = new Audio("music.mp3"); music.loop = true; }
    music.play();
    document.getElementById("musicBtn").style.display = "none";
};

// ANIMACIÓN
function animate(){
    requestAnimationFrame(animate);
    heartMesh.rotation.y += 0.01;
    const t = Date.now() * 0.001;
    
    photos.forEach((p, i) => {
        p.position.y += Math.sin(t + i) * 0.05; // Flotan suavemente
    });

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
