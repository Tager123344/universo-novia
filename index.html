```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#titulo{
position:absolute;
top:25px;
width:100%;
text-align:center;
font-size:40px;
color:#ff77aa;
text-shadow:0 0 30px #ff77aa;
}

#btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 25px;
background:#ff2a8b;
border:none;
border-radius:25px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2a8b;
}
</style>

</head>

<body>

<div id="titulo">💖 Nuestro universo infinito 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2f7c9fd5d8.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=70

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true
controls.dampingFactor=0.05


// ESTRELLAS PARPADEANTES

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<60000;i++){

starVertices.push(
(Math.random()-0.5)*8000,
(Math.random()-0.5)*8000,
(Math.random()-0.5)*8000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)


// CORAZON CENTRAL

const heartGeo=new THREE.BufferGeometry()
const heartVertices=[]

for(let i=0;i<2500;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heartVertices.push(x*0.9,y*0.9,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heartVertices,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1
})

const heart=new THREE.Points(heartGeo,heartMat)

scene.add(heart)


// PLANETAS CON TEXTURA

const loader=new THREE.TextureLoader()

function createPlanet(angle,radius){

const geo=new THREE.SphereGeometry(4,64,64)

const tex=loader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth.jpg"
)

const mat=new THREE.MeshStandardMaterial({
map:tex,
emissive:0x333333
})

const planet=new THREE.Mesh(geo,mat)

planet.position.x=Math.cos(angle)*radius
planet.position.z=Math.sin(angle)*radius

scene.add(planet)

}

for(let i=0;i<6;i++){

createPlanet(i*Math.PI/3,45)

}


// FOTOS

function photo(angle){

const tex=loader.load("foto"+(Math.floor(Math.random()*5)+1)+".jpg")

const geo=new THREE.PlaneGeometry(12,12)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(angle)*28
mesh.position.z=Math.sin(angle)*28

scene.add(mesh)

}

for(let i=0;i<5;i++){

photo(i*Math.PI*2/5)

}


// SNOOPY

function snoopy(angle){

const tex=loader.load(
"https://upload.wikimedia.org/wikipedia/en/5/53/Snoopy_Peanuts.png"
)

const geo=new THREE.PlaneGeometry(8,8)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(angle)*60
mesh.position.z=Math.sin(angle)*60

scene.add(mesh)

}

for(let i=0;i<6;i++){

snoopy(i*Math.PI/3)

}


// FRASES

const frases=[

"Mi princesa hermosa",
"Mi niña preciosa",
"Mi amor eterno",
"Mi amorcito lindo",
"Mi cachetoncita hermosa",
"Mi gordita preciosa",
"Mi tesoro más valioso",
"Te amo más que a nada",
"Eres mi felicidad",
"Eres mi estrella favorita",
"Eres mi universo entero",
"Contigo todo es mejor",
"Eres lo mejor que me ha pasado",
"Mi vida es más bonita contigo",
"Eres la luz de mi vida",
"Eres mi razón de sonreír",
"Eres mi sueño hecho realidad",
"Siempre quiero estar contigo",
"Eres mi lugar favorito",
"Mi corazón es tuyo"

]

for(let i=0;i<1000;i++){

const text=frases[Math.floor(Math.random()*frases.length)]

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="36px Arial"
ctx.textAlign="center"
ctx.fillText(text,256,130)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

const angle=Math.random()*Math.PI*2
const radius=130+Math.random()*120

sprite.position.x=Math.cos(angle)*radius
sprite.position.z=Math.sin(angle)*radius
sprite.position.y=(Math.random()-0.5)*60

sprite.scale.set(14,6,1)

scene.add(sprite)

}


// ESTRELLAS FUGACES

function shootingStar(){

const geo=new THREE.SphereGeometry(0.6,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-500,Math.random()*200,-200)

scene.add(star)

const speed=6

function move(){

star.position.x+=speed
star.position.y-=speed*0.4

if(star.position.x<500){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(shootingStar,900)


// CORAZONES AL HACER CLICK

document.addEventListener("click",()=>{

for(let i=0;i<20;i++){

const geo=new THREE.SphereGeometry(0.5,8,8)
const mat=new THREE.MeshBasicMaterial({color:0xff3377})

const heart=new THREE.Mesh(geo,mat)

heart.position.set(
(Math.random()-0.5)*20,
(Math.random()-0.5)*20,
(Math.random()-0.5)*20
)

scene.add(heart)

}

})


// MENSAJE

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")

}


// ANIMACION

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.00005
heart.rotation.y+=0.003

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
```
