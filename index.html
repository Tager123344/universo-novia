<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#titulo{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:42px;
color:#ff77aa;
text-shadow:0 0 40px #ff77aa;
}

#btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 25px;
background:#ff2a8b;
border:none;
border-radius:25px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2a8b;
}

</style>

</head>

<body>

<div id="titulo">💖 Nuestro universo 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

camera.position.z=25

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping=true
controls.dampingFactor=0.05


// ESTRELLAS BONITAS

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<30000;i++){

starVertices.push(
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)


// LUZ

const light=new THREE.PointLight(0xffffff,2)

light.position.set(50,50,50)

scene.add(light)


// PLANETAS CON RELIEVE

function createPlanet(x,y,z){

const geo=new THREE.SphereGeometry(3,64,64)

const textureLoader=new THREE.TextureLoader()

const texture=textureLoader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth.jpg"
)

const mat=new THREE.MeshStandardMaterial({
map:texture,
emissive:0x444444
})

const planet=new THREE.Mesh(geo,mat)

planet.position.set(x,y,z)

scene.add(planet)

}

createPlanet(8,0,-10)
createPlanet(-10,5,-15)
createPlanet(12,-8,-20)
createPlanet(-14,-6,-18)


// SNOOPY PELUCHE

const loader=new THREE.TextureLoader()

function snoopy(x,y,z){

const tex=loader.load(
"https://upload.wikimedia.org/wikipedia/en/5/53/Snoopy_Peanuts.png"
)

const geo=new THREE.PlaneGeometry(5,5)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x,y,z)

scene.add(mesh)

}

snoopy(10,10,-20)
snoopy(-12,8,-18)
snoopy(6,-10,-15)
snoopy(-10,-12,-17)


// FOTOS

function photo(x,y,z,img){

const tex=loader.load(img)

const geo=new THREE.PlaneGeometry(8,8)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x,y,z)

scene.add(mesh)

}

photo(-6,8,-12,"foto1.jpg")
photo(10,-4,-15,"foto2.jpg")
photo(-12,-8,-20,"foto3.jpg")
photo(6,12,-18,"foto4.jpg")
photo(-4,-12,-14,"foto5.jpg")


// MUCHAS FRASES

const frases=[
"Mi princesa",
"Mi niña hermosa",
"Mi amorcito",
"Mi cachetoncita",
"Mi gordita",
"Mi tesoro",
"Te amo mucho",
"Eres mi felicidad",
"Eres mi estrella",
"Eres mi universo",
"Contigo todo es mejor",
"Eres lo mejor que me pasó"
]

for(let i=0;i<200;i++){

const texto=frases[Math.floor(Math.random()*frases.length)]

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="50px Arial"
ctx.fillText(texto,40,120)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

sprite.position.set(
(Math.random()-0.5)*120,
(Math.random()-0.5)*120,
(Math.random()-0.5)*120
)

sprite.scale.set(12,5,1)

scene.add(sprite)

}


// ESTRELLAS FUGACES

function shootingStar(){

const geo=new THREE.SphereGeometry(0.5,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-200,Math.random()*80,-50)

scene.add(star)

const speed=2+Math.random()*2

function move(){

star.position.x+=speed
star.position.y-=speed*0.3

if(star.position.x<200){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(shootingStar,2000)


// MENSAJE

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")

}


// ANIMACIÓN

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
