<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body{ margin:0; overflow:hidden; background:black; font-family:Arial; }
    
    /* BOTÓN ORIGINAL */
    #titulo{ position:absolute; top:20px; width:100%; text-align:center; font-size:36px; color:#ff7ab6; text-shadow:0 0 25px #ff7ab6; z-index:10; }
    #musicBtn{ position:absolute; bottom:40px; left:50%; transform:translateX(-50%); padding:14px 28px; border:none; border-radius:25px; background:#aa44ff; color:white; font-size:18px; cursor:pointer; box-shadow:0 0 20px #aa44ff; z-index:10; }
    #frase{ position:absolute; bottom:120px; width:100%; text-align:center; font-size:28px; color:white; text-shadow:0 0 25px white; opacity:0; transition:1s; z-index:10; }

    /* MODALES */
    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff77aa; border: 2px solid #ff77aa; max-width: 500px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; }
    button { padding: 12px 30px; border: none; border-radius: 25px; background: #ff77aa; color: white; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div id="titulo">💖 Toca el corazón central, mi amor 💖</div>
<button id="musicBtn">🎵 Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button onclick="verificarClave()">💖 Desbloquear Universo</button>
        <button onclick="document.getElementById('modalClave').classList.remove('activo')">Cancelar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p><strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
        Cada detalle aquí es para recordarte lo especial que eres. Eres mi galaxia favorita y la luz de mi vida. 🌌<br><br>
        <strong>¡Te amo infinitamente, Natasha!</strong></p>
        <button onclick="document.getElementById('mensajeSecreto').classList.remove('activo')">💕 Cerrar con amor 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 50, 250);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const light = new THREE.PointLight(0xffffff, 1.6);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// --- EFECTOS MASIVOS (ESTILO CÓDIGO 1) ---

// 1. Galaxia
const vertices = [];
for(let i=0; i<15000; i++){
    const r = Math.random()*500;
    const angle = Math.random()*Math.PI*2;
    vertices.push(Math.cos(angle)*r, (Math.random()-0.5)*30, Math.sin(angle)*r);
}
const galaxy = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3)), new THREE.PointsMaterial({color:0xffffff, size:0.7}));
scene.add(galaxy);

// 2. 1200 Cubos Rosa
for(let i=0; i<1200; i++){
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color:0xff77aa, transparent:true, opacity:0.6}));
    cube.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*600, (Math.random()-0.5)*1000);
    scene.add(cube);
}

// 3. Frases flotantes (600 sprites para llenar el espacio)
const listaFrases = ["Mi amor", "Natasha", "Te amo", "Princesa", "Mi universo", "Siempre juntos", "Eres luz", "Bella"];
function crearTexto(texto){
    const canvas = document.createElement("canvas"); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "24px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "white"; ctx.shadowBlur = 10; ctx.fillText(texto, 128, 32);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas), transparent:true, opacity:0.4}));
    sprite.position.set((Math.random()-0.5)*900, (Math.random()-0.5)*500, (Math.random()-0.5)*900);
    sprite.scale.set(40, 10, 1); scene.add(sprite);
}
for(let i=0; i<600; i++) crearTexto(listaFrases[i % listaFrases.length]);

// 4. Lluvia de corazones
const fallingHearts = [];
function spawnHeart(){
    const s = new THREE.Shape();
    s.moveTo(0,0.5); s.bezierCurveTo(0,0.5,-0.5,0,-0.5,0); s.bezierCurveTo(-0.5,-0.35,0,-0.6,0,-0.8);
    s.bezierCurveTo(0,-0.6,0.5,-0.35,0.5,0); s.bezierCurveTo(0.5,0,0,0.5,0,0.5);
    const h = new THREE.Mesh(new THREE.ShapeGeometry(s), new THREE.MeshBasicMaterial({color:0xff3366, side:THREE.DoubleSide, transparent:true, opacity:0.7}));
    h.position.set((Math.random()-0.5)*400, 300, (Math.random()-0.5)*400);
    h.scale.setScalar(Math.random()*3+2);
    h.userData = { speed: Math.random()*0.5+0.3 };
    scene.add(h); fallingHearts.push(h);
}
setInterval(spawnHeart, 150);

// 5. Corazón Central
const hPts = [];
for(let i=0; i<2000; i++){
    const t = Math.random()*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    hPts.push(x*1.3, y*1.3 + 40, (Math.random()-0.5)*3);
}
const heartMesh = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(hPts, 3)), new THREE.PointsMaterial({color:0xff3377, size:1.8}));
scene.add(heartMesh);

// --- FOTOS: POSICIÓN FIJA (DETERMINISTA) ---
const photos = [];
const loader = new THREE.TextureLoader();

// Geometría marco hueco
const fShape = new THREE.Shape();
fShape.moveTo(-10,-10); fShape.lineTo(10,-10); fShape.lineTo(10,10); fShape.lineTo(-10,10);
const hole = new THREE.Path();
hole.moveTo(-9,-9); hole.lineTo(9,-9); hole.lineTo(9,9); hole.lineTo(-9,9);
fShape.holes.push(hole);
const fGeo = new THREE.ShapeGeometry(fShape);
const fMat = new THREE.MeshBasicMaterial({color:0xff7ab6, side:THREE.DoubleSide});

for(let i=1; i<=28; i++){
    const group = new THREE.Group();
    const photo = new THREE.Mesh(new THREE.PlaneGeometry(18,18), new THREE.MeshBasicMaterial({map: loader.load(`foto${i}.jpg`), side:THREE.DoubleSide}));
    const frame = new THREE.Mesh(fGeo, fMat);
    group.add(photo); group.add(frame);
    
    // Fórmula matemática para que NO sea random al recargar:
    // Usamos el índice 'i' para calcular una posición en una "nube" fija
    const angle = i * 0.5; 
    const radius = 80 + (i * 4);
    group.position.set(
        Math.cos(angle) * radius,
        Math.sin(i * 1.5) * 60 + 40,
        Math.sin(angle) * radius
    );
    
    scene.add(group);
    photos.push(group);
}

// LÓGICA
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta..."); }
}

window.addEventListener("click", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    if(raycaster.intersectObject(heartMesh).length > 0) document.getElementById('modalClave').classList.add('activo');
});

let music;
document.getElementById("musicBtn").onclick = () => {
    if(!music) { music = new Audio("music.mp3"); music.loop = true; }
    music.play();
    document.getElementById("musicBtn").style.display = "none";
};

function animate(){
    requestAnimationFrame(animate);
    galaxy.rotation.y += 0.0005;
    heartMesh.rotation.y += 0.003;
    heartMesh.scale.setScalar(1 + Math.sin(Date.now()*0.004)*0.1);

    fallingHearts.forEach((h, idx) => {
        h.position.y -= h.userData.speed;
        if(h.position.y < -300) h.position.y = 300;
    });

    photos.forEach((p, i) => {
        p.lookAt(camera.position); // Siempre te miran
        p.position.y += Math.sin(Date.now()*0.001 + i)*0.05; // Flotan suavemente en su lugar
    });

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
