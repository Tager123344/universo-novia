<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#aa44ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #aa44ff;
}

#mensaje{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.92);
padding:30px;
border-radius:20px;
color:white;
font-size:22px;
display:none;
box-shadow:0 0 40px #ff2e8b;
text-align:center;
max-width:500px;
}

#frase{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
color:#ff9ad5;
text-shadow:0 0 20px #ff4fb0;
opacity:0;
transition:1s;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff2e8b;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>

<button id="musicBtn">🎵 Activar música</button>

<div id="mensaje">
<div id="mensajeContenido"></div>
<br>
<button id="cerrar">Cerrar</button>
</div>

<div id="frase"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)



// LUZ

const light=new THREE.PointLight(0xffffff,1.6)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// CORAZON CENTRAL (arreglado)

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1.5
})

const heartMesh=new THREE.Points(heartGeo,heartMat)

heartMesh.position.y=35

scene.add(heartMesh)



// FRASES

const frases=[
"💖 Mi gordita hermosa",
"💗 Mi caprichosita",
"👶 Mi bebita",
"🥰 Mi tiquitita",
"🐞 Mi pulguita",
"👑 Mi princecita",
"🌸 Mi niña hermosa",
"💘 Eres mi universo",
"💞 Siempre tú",
"🌹 Contigo todo es más bonito",
"✨ Eres mi estrella favorita",
"💓 Te amo infinitamente"
]

function mostrarFrase(){

const frase=frases[Math.floor(Math.random()*frases.length)]

const div=document.getElementById("frase")

div.innerHTML=frase
div.style.opacity=1

setTimeout(()=>{

div.style.opacity=0

},6000)

}

setInterval(mostrarFrase,10000)



// FRASES EN EL UNIVERSO (1000)

for(let i=0;i<1000;i++){

const div=document.createElement("div")

div.innerHTML=frases[Math.floor(Math.random()*frases.length)]

div.style.position="absolute"
div.style.color="#ff9ad5"
div.style.fontSize="18px"
div.style.opacity="0.5"

div.style.left=Math.random()*window.innerWidth+"px"
div.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(div)

}



// FOTOS

const photos=[]
const loader=new THREE.TextureLoader()

function photo(angle,i){

const group=new THREE.Group()

const tex=loader.load("foto"+i+".jpg")

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const photoMesh=new THREE.Mesh(geo,mat)

group.add(photoMesh)

const edges=new THREE.EdgesGeometry(geo)

const line=new THREE.LineSegments(
edges,
new THREE.LineBasicMaterial({color:0xff77aa})
)

line.scale.set(1.15,1.15,1)

group.add(line)

// BAJAMOS FOTOS CERCA DEL CORAZON

group.position.y=25

group.position.x=Math.cos(angle)*40
group.position.z=Math.sin(angle)*40

scene.add(group)

photos.push(group)

}

for(let i=1;i<=8;i++){
photo(i*Math.PI*2/8,i)
}



// MÁS ESTRELLAS CAYENDO

function lluvia(){

for(let i=0;i<5;i++){

const geo=new THREE.BoxGeometry(0.6,0.6,0.6)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const cube=new THREE.Mesh(geo,mat)

cube.position.set(
(Math.random()-0.5)*200,
120,
(Math.random()-0.5)*200
)

scene.add(cube)

function caer(){

cube.position.y-=2

if(cube.position.y>-120){

requestAnimationFrame(caer)

}else{

scene.remove(cube)

}

}

caer()

}

}

setInterval(lluvia,200)



// MUSICA

let music

document.getElementById("musicBtn").onclick=()=>{

if(!music){

music=new Audio("music.mp3")
music.loop=true
music.volume=0.7

}

music.play()

}



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0005

const pulse=1+Math.sin(Date.now()*0.003)*0.08
heartMesh.scale.set(pulse,pulse,pulse)

photos.forEach((p,i)=>{

const t=Date.now()*0.0002+i
const radius=40

p.position.x=Math.cos(t)*radius
p.position.z=Math.sin(t)*radius

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
