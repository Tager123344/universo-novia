```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universo de Natasha</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:10;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;

}

button{
margin-top:20px;
padding:12px 25px;
border:none;

background:#ff2e8b;

cursor:pointer;
}

#titulo{
position:absolute;
top:20px;
width:100%;

}

</style>
</head>

<body>

<div id="login">

<h1>🔐 Universo secreto</h1>

<p>Introduce la fecha especial</p>

<input id="clave" placeholder="DD/MM/AAAA">

<button onclick="verificar()">Entrar</button>

</div>

<div id="titulo">💖 Nuestro Universo 💖</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

function verificar(){

if(document.getElementById("clave").value==="30/10/2025"){

document.getElementById("login").style.display="none"

}else{

alert("Clave incorrecta")

}

}



const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=80

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)



const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



const light=new THREE.PointLight(0xffffff,1.5)

light.position.set(50,50,50)

scene.add(light)



// CORAZON CENTRAL

const heartGeo=new THREE.BufferGeometry()

const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)

const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1
})

const heartMesh=new THREE.Points(heartGeo,heartMat)

scene.add(heartMesh)



// PLANETAS BONITOS

function planeta(a,c){

const geo=new THREE.SphereGeometry(4,64,64)

const mat=new THREE.MeshStandardMaterial({

color:c,
emissive:c,
emissiveIntensity:0.4

})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(a)*60
mesh.position.z=Math.sin(a)*60

scene.add(mesh)

}

planeta(0,0x44aaff)
planeta(Math.PI/3,0xff77aa)
planeta(Math.PI*2/3,0xffcc33)
planeta(Math.PI,0xaa66ff)
planeta(Math.PI*4/3,0x33ffaa)
planeta(Math.PI*5/3,0xff8844)



// FOTOS

const loader=new THREE.TextureLoader()

const photos=[]

function foto(a,i){

const tex=loader.load("foto"+i+".jpg")

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(a)*35
mesh.position.z=Math.sin(a)*35

scene.add(mesh)

photos.push(mesh)

}

for(let i=1;i<=5;i++){

foto(i*Math.PI*2/5,i)

}



// FRASES

const frases=[

"Mi princesa Natasha",
"Te amo muchísimo",
"Eres mi universo",
"Mi amor eterno",
"Eres mi felicidad",
"Mi tesoro",
"Siempre contigo",
"Eres mi todo"

]

for(let i=0;i<250;i++){

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="34px Arial"
ctx.textAlign="center"

const text=frases[Math.floor(Math.random()*frases.length)]

ctx.fillText(text,256,130)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

const angle=Math.random()*Math.PI*2
const radius=90+Math.random()*30

sprite.position.x=Math.cos(angle)*radius
sprite.position.z=Math.sin(angle)*radius
sprite.position.y=(Math.random()-0.5)*50

sprite.scale.set(14,6,1)

scene.add(sprite)

}



// ESTRELLAS CERCA DE FRASES

for(let i=0;i<400;i++){

const geo=new THREE.SphereGeometry(0.03,6,6)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

const angle=Math.random()*Math.PI*2
const radius=95+Math.random()*35

star.position.x=Math.cos(angle)*radius
star.position.z=Math.sin(angle)*radius
star.position.y=(Math.random()-0.5)*60

scene.add(star)

}



// ESTRELLA FUGAZ

function fugaz(){

const geo=new THREE.SphereGeometry(0.4,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-400,Math.random()*200,-200)

scene.add(star)

const speed=8

function move(){

star.position.x+=speed
star.position.y-=speed*0.4

if(star.position.x<400){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(fugaz,2000)



// BRILLO EN FOTOS

const raycaster=new THREE.Raycaster()

const mouse=new THREE.Vector2()

window.addEventListener("mousemove",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObjects(photos)

photos.forEach(p=>p.scale.set(1,1,1))

if(hit.length>0){

hit[0].object.scale.set(1.3,1.3,1.3)

}

})



// MENSAJE SECRETO

window.addEventListener("dblclick",()=>{

alert("Natasha ❤️ este universo es para ti. Cada estrella representa lo mucho que te amo. Siempre quiero estar contigo.")

})



function animate(){

requestAnimationFrame(animate)

heartMesh.rotation.y+=0.002

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
