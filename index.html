<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para Natasha 💖</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#mensaje{position:absolute;top:20px;width:100%;text-align:center;font-size:40px;color:#ff6fae;text-shadow:0 0 25px #ff6fae;z-index:10;}
#btn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;border:none;border-radius:25px;background:#ff2e8b;color:white;font-size:18px;cursor:pointer;box-shadow:0 0 20px #ff2e8b;z-index:10;}
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 20, 150); // ← más alejada y un poco arriba para ver mejor

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000022); // ← fondo azul oscuro para debug (si ves azul = renderiza)
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Fondo estrellas lejanas
const bgStarsGeo = new THREE.BufferGeometry();
const bgVertices = [];
for (let i = 0; i < 9000; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1800 + Math.random() * 1400;
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);
    bgVertices.push(x, y, z);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));
const bgMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8});
scene.add(new THREE.Points(bgStarsGeo, bgMat));

// Galaxia
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for (let i = 0; i < 15000; i++) {
    const r = Math.random() * 220;
    const spin = r * 0.4;
    const angle = Math.random() * Math.PI * 2;
    vertices.push(Math.cos(angle + spin) * r, (Math.random() - 0.5) * 20, Math.sin(angle + spin) * r);
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const galaxyMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.6, transparent: true, opacity: 0.9});
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// Corazón
const heartGeo = new THREE.BufferGeometry();
const heart = [];
for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heart.push(x * 0.8, y * 0.8, (Math.random() - 0.5) * 2);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heart, 3));
const heartMat = new THREE.PointsMaterial({color: 0xff3377, size: 1.2});
const heartMesh = new THREE.Points(heartGeo, heartMat);
scene.add(heartMesh);

// Planetas (mantengo los tuyos, pero con luz extra se verán)
const planets = [];

// ... (copia aquí la función createPlanet y las creaciones de planetas del código anterior, no las cambié mucho)

// Luces más fuertes
const pointLight = new THREE.PointLight(0xffffff, 3, 1000); // intensidad 3
pointLight.position.set(100, 100, 100);
scene.add(pointLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(-200, 300, -100);
scene.add(dirLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.8)); // ambiente más fuerte

// Resto del código (fotos, frases, estrellas, shootingStar, mensaje, animate) se mantiene igual
// En animate añade esto al inicio para debug:
function animate(){
    requestAnimationFrame(animate);
    console.log("Rendering frame..."); // ← abre consola para ver si se ejecuta

    // ... resto de animaciones

    controls.update();
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
