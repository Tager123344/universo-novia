<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para Natasha 💖</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#mensaje{position:absolute;top:20px;width:100%;text-align:center;font-size:40px;color:#ff6fae;text-shadow:0 0 25px #ff6fae;}
#btn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;border:none;border-radius:25px;background:#ff2e8b;color:white;font-size:18px;cursor:pointer;box-shadow:0 0 20px #ff2e8b;}
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Fondo estrellas lejanas
const bgStarsGeo = new THREE.BufferGeometry();
const bgVertices = [];
const bgCount = 8000;
for (let i = 0; i < bgCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1800 + Math.random() * 1200;
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);
    bgVertices.push(x, y, z);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));
const bgMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.2, sizeAttenuation: true, transparent: true, opacity: 0.7});
scene.add(new THREE.Points(bgStarsGeo, bgMat));

// Galaxia más pequeña y limpia
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for (let i = 0; i < 15000; i++) {
    const r = Math.random() * 220;
    const spin = r * 0.4;
    const angle = Math.random() * Math.PI * 2;
    vertices.push(Math.cos(angle + spin) * r, (Math.random() - 0.5) * 20, Math.sin(angle + spin) * r);
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const galaxyMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.4, sizeAttenuation: true, transparent: true, opacity: 0.9});
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// Corazón de partículas
const heartGeo = new THREE.BufferGeometry();
const heart = [];
for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heart.push(x * 0.8, y * 0.8, (Math.random() - 0.5) * 2);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heart, 3));
const heartMat = new THREE.PointsMaterial({color: 0xff3377, size: 1});
const heartMesh = new THREE.Points(heartGeo, heartMat);
scene.add(heartMesh);

// ★ Planetas románticos bonitos ★
const planets = [];

// Planeta corazón principal "Natasha" (rosa brillante con anillos)
const heartPlanetGeo = new THREE.SphereGeometry(12, 32, 32); // forma esférica pero lo deformamos un poco
const heartPlanetMat = new THREE.MeshStandardMaterial({
    color: 0xff69b4,
    emissive: 0xff1493,
    emissiveIntensity: 0.4,
    metalness: 0.1,
    roughness: 0.6
});
const heartPlanet = new THREE.Mesh(heartPlanetGeo, heartPlanetMat);
heartPlanet.position.set(40, 20, -30); // posición un poco apartada
scene.add(heartPlanet);
planets.push(heartPlanet);

// Anillos para el planeta corazón
const ringGeo = new THREE.RingGeometry(15, 22, 64);
const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffb6c1,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.7
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2.5; // inclinado bonito
heartPlanet.add(ring); // añadido al planeta para que rote con él

// Planeta pastel con anillos dorados
const pastelPlanetGeo = new THREE.SphereGeometry(10, 32, 32);
const pastelPlanetMat = new THREE.MeshStandardMaterial({
    color: 0xd8bfd8, // lila suave
    emissive: 0xffc0cb,
    emissiveIntensity: 0.3
});
const pastelPlanet = new THREE.Mesh(pastelPlanetGeo, pastelPlanetMat);
pastelPlanet.position.set(-50, 10, -20);
scene.add(pastelPlanet);
planets.push(pastelPlanet);

// Anillos dorados/rosa
const pastelRing = new THREE.RingGeometry(12, 18, 64);
const pastelRingMat = new THREE.MeshBasicMaterial({color: 0xffdab9, side: THREE.DoubleSide, transparent: true, opacity: 0.8});
const pring = new THREE.Mesh(pastelRing, pastelRingMat);
pring.rotation.x = Math.PI / 3;
pastelPlanet.add(pring);

// Pequeños planetas flotantes (orbitan alrededor del corazón principal)
for (let i = 0; i < 4; i++) {
    const smallGeo = new THREE.SphereGeometry(4 + Math.random()*3, 24, 24);
    const smallMat = new THREE.MeshStandardMaterial({
        color: [0xffb6c1, 0xadd8e6, 0xe0b0ff, 0xffe4e1][i % 4], // tonos pastel románticos
        emissive: 0xffffff,
        emissiveIntensity: 0.2 + Math.random()*0.2
    });
    const smallPlanet = new THREE.Mesh(smallGeo, smallMat);
    const angle = i * Math.PI * 2 / 4;
    smallPlanet.position.set(Math.cos(angle)*30, Math.sin(angle)*15 + (Math.random()-0.5)*10, Math.sin(angle)*30 - 20);
    smallPlanet.userData = {angle: angle, radiusX: 30 + Math.random()*10, radiusZ: 30 + Math.random()*10, speed: 0.0008 + Math.random()*0.0005};
    scene.add(smallPlanet);
    planets.push(smallPlanet);
}

// Fotos
const loader = new THREE.TextureLoader();
const photoFiles = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];
const photos = [];
function photo(angle, file){
    const tex = loader.load(file);
    const geo = new THREE.PlaneGeometry(14,14);
    const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = Math.cos(angle)*35;
    mesh.position.z = Math.sin(angle)*35;
    mesh.userData = {angle:angle, radius:35};
    scene.add(mesh);
    photos.push(mesh);
}
for(let i=0;i<5;i++) photo(i*Math.PI*2/5, photoFiles[i]);

// Frases de amor
const frases = ["Mi princesa hermosa","Mi niña preciosa","Mi amor eterno","Te amo muchísimo","Eres mi felicidad","Eres mi universo","Mi amorcito lindo","Siempre contigo","Eres mi todo","Mi corazón es tuyo"];
for(let i=0;i<400;i++){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width=512; canvas.height=256;
    ctx.fillStyle="white"; ctx.font="36px Arial"; ctx.textAlign="center";
    const text = frases[Math.floor(Math.random()*frases.length)];
    ctx.fillText(text,256,130);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({map:tex});
    const sprite = new THREE.Sprite(mat);
    const angle = Math.random()*Math.PI*2;
    const radius = 100+Math.random()*120;
    sprite.position.x = Math.cos(angle)*radius;
    sprite.position.z = Math.sin(angle)*radius;
    sprite.position.y = (Math.random()-0.5)*80;
    sprite.scale.set(14,6,1);
    scene.add(sprite);
}

// Estrellas twinkling
const stars = [];
const totalStars = 3000;
for(let i=0;i<totalStars;i++){
    let x = (Math.random()-0.5)*600;
    let y = (Math.random()-0.5)*300;
    let z = (Math.random()-0.5)*600;
    const radius = Math.sqrt(x*x + y*y + z*z);
    if(radius < 100 && Math.random() < 0.2) continue;
    const geo = new THREE.SphereGeometry(0.02,6,6);
    const mat = new THREE.MeshBasicMaterial({color:0xffffff});
    const star = new THREE.Mesh(geo, mat);
    star.position.set(x,y,z);
    star.userData.blink = Math.random()*2;
    scene.add(star);
    stars.push(star);
}

// Estrella fugaz
function shootingStar(){
    const geo = new THREE.SphereGeometry(0.03,8,8);
    const mat = new THREE.MeshBasicMaterial({color:0xffffff});
    const star = new THREE.Mesh(geo, mat);
    star.position.set(-600,Math.random()*200,-200);
    scene.add(star);
    const speed = 9;
    function move(){
        star.position.x += speed;
        star.position.y -= speed*0.4;
        if(star.position.x<600) requestAnimationFrame(move);
        else scene.remove(star);
    }
    move();
}
setInterval(shootingStar,1500);

// Mensaje secreto personalizado
document.getElementById("btn").onclick = ()=>{
    alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo, Natasha ❤️");
};

// Luz suave para resaltar planetas
const light = new THREE.PointLight(0xffffff, 2, 500);
light.position.set(50,50,50);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambient);

// Animación
function animate(){
    requestAnimationFrame(animate);
    galaxy.rotation.y += 0.0006;
    heartMesh.rotation.y += 0.003;

    photos.forEach(p=>{
        p.userData.angle += 0.002;
        p.position.x = Math.cos(p.userData.angle)*p.userData.radius;
        p.position.z = Math.sin(p.userData.angle)*p.userData.radius;
    });

    stars.forEach(s=>{
        s.material.opacity = 0.5 + Math.sin(Date.now()*0.003 + s.userData.blink)*0.5;
    });

    // Rotación y pulso de planetas
    planets.forEach((p, i) => {
        if (p.userData.angle !== undefined) { // pequeños orbitando
            p.userData.angle += p.userData.speed;
            p.position.x = Math.cos(p.userData.angle) * p.userData.radiusX;
            p.position.z = Math.sin(p.userData.angle) * p.userData.radiusZ;
            p.position.y = Math.sin(p.userData.angle * 2) * 10; // ondulación suave
        }
        // Pulso de brillo (latido romántico)
        const pulse = 1 + Math.sin(Date.now() * 0.001 + i) * 0.05;
        if (p.scale) p.scale.set(pulse, pulse, pulse);
        else p.scale.set(pulse, pulse, pulse);
    });

    controls.update();
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
