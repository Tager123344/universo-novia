<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para mi Natasha 💖</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
  #title {
    position: absolute; top: 20%; left: 0; right: 0;
    text-align: center; font-size: 4vw; color: #ff69b4;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    pointer-events: none; z-index: 5;
  }
  #btn {
    position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
    padding: 20px 60px; font-size: 2.5vw; color: white;
    background: #ff2e8b; border: none; border-radius: 60px;
    cursor: pointer; box-shadow: 0 0 30px #ff2e8b; z-index: 10;
  }
  #secret {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    color: #ffb6c1; font-size: 3vw; display: none;
    align-items: center; justify-content: center; text-align: center;
    padding: 5%; z-index: 20;
  }
  #secret button { padding: 15px 40px; font-size: 2vw; background: #ff69b4; color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 30px; }
  #error-msg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: red; font-size: 2vw; text-align: center; z-index: 100;
  }
</style>
</head>
<body>
<div id="title">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">❤️ Mensaje secreto</button>

<div id="secret">
  Mi amor Natasha...<br><br>
  Tú eres mi galaxia completa.<br>
  Te amo con todo mi ser ❤️<br><br>
  <button onclick="document.getElementById('secret').style.display='none'">Cerrar 💕</button>
</div>

<!-- Three.js desde CDN muy confiable (cdnjs) - versión estable 0.180.0 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.min.js"></script>

<script>
// Verificamos si cargó correctamente
if (typeof THREE === 'undefined') {
  document.body.innerHTML += '<div id="error-msg">Error grave: Three.js no cargó.<br>Desactiva bloqueadores de anuncios, prueba modo incógnito u otro navegador (Firefox/Edge), o verifica tu conexión.</div>';
} else {
  // Escena básica con corazón y estrellas (sin bloom para evitar más fallos)
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 4;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Corazón rosa pulsante
  const heartGeo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i < 1200; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3) * 0.15;
    const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.15;
    positions.push(x, y, (Math.random() - 0.5) * 0.6);
  }
  heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const heartMat = new THREE.PointsMaterial({ color: 0xff1493, size: 0.07, transparent: true });
  const heart = new THREE.Points(heartGeo, heartMat);
  scene.add(heart);

  // Estrellas de fondo twinkling
  const starsGeo = new THREE.BufferGeometry();
  const starsPos = [];
  for (let i = 0; i < 2000; i++) {
    starsPos.push((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 12, (Math.random() - 0.5) * 12);
  }
  starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true });
  scene.add(new THREE.Points(starsGeo, starsMat));

  function animate() {
    requestAnimationFrame(animate);
    heart.rotation.y += 0.006;
    heart.scale.setScalar(1 + Math.sin(Date.now() * 0.0015) * 0.08);
    renderer.render(scene, camera);
  }
  animate();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// Mensaje secreto
document.getElementById('btn').onclick = () => {
  document.getElementById('secret').style.display = 'flex';
};
</script>
</body>
</html>
