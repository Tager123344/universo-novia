<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para Natasha 💖</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
  #mensaje {
    position: absolute; top: 25px; left: 0; right: 0;
    text-align: center; font-size: 42px; color: #ff6fae;
    text-shadow: 0 0 30px #ff6fae, 0 0 60px #ff1493;
    pointer-events: none; z-index: 5;
  }
  #btn {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 18px 45px; font-size: 22px; color: white;
    background: linear-gradient(135deg, #ff2e8b, #ff6fae);
    border: 2px solid #ff69b4; border-radius: 50px;
    cursor: pointer; box-shadow: 0 0 35px rgba(255,46,139,0.7);
    z-index: 10; transition: all 0.3s;
  }
  #btn:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 0 50px #ff2e8b; }

  #secret {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    color: #ff9ec7; font-size: 28px; line-height: 1.5;
    display: none; align-items: center; justify-content: center;
    text-align: center; padding: 40px; z-index: 20;
  }
  #secret button {
    margin-top: 30px; padding: 14px 35px; font-size: 20px;
    background: #ff2e8b; color: white; border: none; border-radius: 30px;
    cursor: pointer; box-shadow: 0 0 25px #ff2e8b;
  }
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<div id="secret">
  Mi Natasha preciosa...<br><br>
  Desde que llegaste a mi vida, todo brilla más fuerte.<br>
  Eres mi galaxia entera, mi razón para sonreír cada día.<br>
  Te amo con todo lo que soy y siempre voy a estar a tu lado ❤️<br><br>
  <button onclick="document.getElementById('secret').style.display='none'">Cerrar 💕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// Escena básica
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 10, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Post-procesamiento (BLOOM para glow mágico)
const composer = new THREE.EffectComposer(renderer);
const renderPass = new THREE.RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.4,   // strength
  0.5,   // radius
  0.8    // threshold
);
composer.addPass(bloomPass);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Fondo estrellas lejanas (más sutil)
const bgStarsGeo = new THREE.BufferGeometry();
const bgVertices = [];
for (let i = 0; i < 6000; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2000 + Math.random() * 1500;
  bgVertices.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));
const bgMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.6, transparent: true, opacity: 0.45 });
scene.add(new THREE.Points(bgStarsGeo, bgMat));

// Galaxia central (menos densa, más elegante)
const galaxyGeo = new THREE.BufferGeometry();
const galaxyVerts = [];
for (let i = 0; i < 8000; i++) {
  const r = Math.random() * 180;
  const spin = r * 0.45;
  const angle = Math.random() * Math.PI * 2;
  galaxyVerts.push(
    Math.cos(angle + spin) * r,
    (Math.random() - 0.5) * 15,
    Math.sin(angle + spin) * r
  );
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(galaxyVerts, 3));
const galaxyMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.85 });
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// Corazón latente (con bloom se ve hermoso)
const heartGeo = new THREE.BufferGeometry();
const heartVerts = [];
for (let i = 0; i < 2200; i++) {
  const t = Math.random() * Math.PI * 2;
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  heartVerts.push(x * 0.9, y * 0.9, (Math.random() - 0.5) * 3);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heartVerts, 3));
const heartMat = new THREE.PointsMaterial({ color: 0xff2e8b, size: 1.2, transparent: true });
const heartMesh = new THREE.Points(heartGeo, heartMat);
scene.add(heartMesh);

// Fotos orbitando (más grandes y con rotación propia)
const loader = new THREE.TextureLoader();
const photoFiles = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"]; // ¡cambia por tus fotos reales!
const photos = [];
function createPhoto(angle, file) {
  const tex = loader.load(file);
  const geo = new THREE.PlaneGeometry(20, 20);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = Math.cos(angle) * 45;
  mesh.position.z = Math.sin(angle) * 45;
  mesh.userData = { angle, radius: 45 };
  scene.add(mesh);
  photos.push(mesh);
}
for (let i = 0; i < photoFiles.length; i++) {
  createPhoto(i * Math.PI * 2 / photoFiles.length, photoFiles[i]);
}

// Frases flotantes (menos cantidad, más grandes y elegantes)
const frases = [
  "Mi princesa hermosa", "Mi niña preciosa", "Mi amor eterno",
  "Te amo muchísimo", "Eres mi felicidad", "Eres mi universo",
  "Mi amorcito lindo", "Siempre contigo", "Eres mi todo", "Mi corazón es tuyo"
];
for (let i = 0; i < 90; i++) {
  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext("2d");
  ctx.font = "bold 42px Arial"; ctx.fillStyle = "#ff9ec7"; ctx.textAlign = "center";
  const text = frases[Math.floor(Math.random() * frases.length)];
  ctx.fillText(text, 256, 140);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.75 });
  const sprite = new THREE.Sprite(mat);
  const angle = Math.random() * Math.PI * 2;
  const radius = 110 + Math.random() * 140;
  sprite.position.set(
    Math.cos(angle) * radius,
    (Math.random() - 0.5) * 90,
    Math.sin(angle) * radius
  );
  sprite.scale.set(24, 10, 1);
  scene.add(sprite);
}

// Estrellas twinkling suaves
const stars = [];
for (let i = 0; i < 1800; i++) {
  const x = (Math.random() - 0.5) * 700;
  const y = (Math.random() - 0.5) * 350;
  const z = (Math.random() - 0.5) * 700;
  const geo = new THREE.SphereGeometry(0.03, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const star = new THREE.Mesh(geo, mat);
  star.position.set(x, y, z);
  star.userData.blink = Math.random() * Math.PI * 2;
  scene.add(star);
  stars.push(star);
}

// Estrella fugaz ocasional
function shootingStar() {
  const geo = new THREE.SphereGeometry(0.04, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const star = new THREE.Mesh(geo, mat);
  star.position.set(-800, 100 + Math.random() * 200, -300);
  scene.add(star);
  let progress = 0;
  function move() {
    progress += 0.016;
    star.position.x += 12;
    star.position.y -= 5;
    star.position.z += 3;
    if (progress < 2) requestAnimationFrame(move);
    else scene.remove(star);
  }
  move();
}
setInterval(shootingStar, 2200);

// Luz suave
const light = new THREE.PointLight(0xffffff, 1.8, 1000);
light.position.set(80, 100, 120);
scene.add(light);

// Animación principal
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  galaxy.rotation.y += 0.0005;

  // Latido suave del corazón
  const pulse = 1 + Math.sin(time * 1.6) * 0.07;
  heartMesh.scale.set(pulse, pulse, pulse);
  heartMesh.rotation.y += 0.002;

  // Fotos orbitan + rotan
  photos.forEach(p => {
    p.userData.angle += 0.0015;
    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
    p.rotation.y += 0.004;
  });

  // Twinkle estrellas
  stars.forEach(s => {
    s.material.opacity = 0.6 + Math.sin(time * 3 + s.userData.blink) * 0.4;
  });

  controls.update();
  composer.render(); // ¡Usamos composer para bloom!
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Mensaje secreto overlay
document.getElementById("btn").onclick = () => {
  document.getElementById("secret").style.display = "flex";
};
</script>
</body>
</html>
