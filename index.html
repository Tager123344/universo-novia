<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
body { margin: 0; overflow: hidden; background: black; font-family: 'Arial'; }
#titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; color: #ff7ab6; text-shadow: 0 0 20px #ff7ab6; z-index: 10; }
#musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border-radius: 30px; background: #aa44ff; color: white; font-size: 20px; cursor: pointer; box-shadow: 0 0 25px #aa44ff; z-index: 100; }
#frase { position: absolute; bottom: 130px; width: 100%; text-align: center; font-size: 26px; color: white; opacity: 0; transition: 1.5s; }

#modalClave, #mensajeSecreto { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
#modalClave.activo, #mensajeSecreto.activo { display:flex; }

.modal-contenido { background:#111; padding:40px; border-radius:25px; text-align:center; box-shadow:0 0 40px #ff77aa; color:white; }
input { padding:10px; border-radius:10px; margin:10px; }
.btn-modal { padding:10px 20px; border-radius:15px; background:#ff77aa; color:white; cursor:pointer; }
</style>
</head>

<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">Activar música</button>
<div id="frase"></div>

<div id="modalClave">
<div class="modal-contenido">
<h2>🔐 Clave Secreta</h2>
<input type="password" id="inputClave" placeholder="DDMMAAAA">
<br>
<button class="btn-modal" onclick="verificarClave()">Abrir</button>
</div>
</div>

<div id="mensajeSecreto">
<div class="modal-contenido">
<h1>Hola mi amor 💖</h1>
<p>Desde el 30/10/2025 cambiaste mi vida...<br>Te amo infinitamente 💕</p>
<button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
<script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

<script>

const CLAVE_SECRETA = "30102025";
let despierto = false;
let nivelFade = 0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 10000);
camera.position.z = 1200;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.3));

const light = new THREE.PointLight(0xff77aa,2);
light.position.set(0,100,200);
scene.add(light);

// ESTRELLAS
const starGeo = new THREE.BufferGeometry();
let starPos = [];
for(let i=0;i<20000;i++){
starPos.push((Math.random()-0.5)*2000,(Math.random()-0.5)*2000,(Math.random()-0.5)*2000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const starsMat = new THREE.PointsMaterial({color:0xffffff, size:1, transparent:true, opacity:0});
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// CORAZÓN
const shape = new THREE.Shape();
shape.moveTo(0,0);
shape.bezierCurveTo(0,0,0,-3,-5,-3);
shape.bezierCurveTo(-10,-3,-10,5,-10,5);
shape.bezierCurveTo(-10,10,-5,15,0,18);
shape.bezierCurveTo(5,15,10,10,10,5);
shape.bezierCurveTo(10,5,10,-3,5,-3);
shape.bezierCurveTo(2,-3,0,0,0,0);

const heart = new THREE.Mesh(
new THREE.ExtrudeGeometry(shape,{depth:4, bevelEnabled:true}),
new THREE.MeshStandardMaterial({color:0xff3377, emissive:0xff0044})
);
heart.scale.set(4,4,4);
scene.add(heart);

// TEXTO EN CORAZÓN
const loaderFont = new THREE.FontLoader();
loaderFont.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
const textGeo = new THREE.TextGeometry("Natasha 💖",{font:font,size:8,height:1});
const text = new THREE.Mesh(textGeo,new THREE.MeshBasicMaterial({color:0xffffff}));
text.position.set(-30,10,10);
heart.add(text);
});

// FOTOS (55)
const photos = [];
const loader = new THREE.TextureLoader();
const distribucion = [18,18,19];
let index=1;

distribucion.forEach((cant,ring)=>{
let radius = ring==0?180:(ring==1?270:360);
let y = ring==0?120:(ring==1?0:-120);

for(let i=0;i<cant;i++){
let group=new THREE.Group();

let mat=new THREE.MeshBasicMaterial({
map:loader.load(`foto${index}.jpg`),
side:THREE.DoubleSide,
transparent:true,
opacity:0
});

group.add(new THREE.Mesh(new THREE.PlaneGeometry(25,25),mat));

let angle=i*(Math.PI*2/cant);
group.position.set(Math.cos(angle)*radius,y,Math.sin(angle)*radius);

scene.add(group);
photos.push(group);
index++;
}
});

// SONIDO
let audio;
const clickSound = new Audio("click.mp3");

document.getElementById("musicBtn").onclick=function(){
if(!audio){audio=new Audio("music.mp3");audio.loop=true;}
audio.play();
this.style.display="none";
despierto=true;

// ZOOM
let z=1200;
let zoom=setInterval(()=>{
z-=10;
camera.position.z=z;
if(z<=500) clearInterval(zoom);
},16);
};

// CLICK
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("click",(e)=>{
mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;

if(despierto){
ray.setFromCamera(mouse,camera);

if(ray.intersectObject(heart).length>0){
document.getElementById("modalClave").classList.add("activo");
}

let hit=ray.intersectObjects(photos,true);
if(hit.length>0){
clickSound.currentTime=0;
clickSound.play();
}
}
});

// ANIMACIÓN
function animate(){
requestAnimationFrame(animate);
let t=Date.now()*0.001;

if(despierto){

if(nivelFade<1){
nivelFade+=0.005;
starsMat.opacity=nivelFade;
photos.forEach(p=>p.children[0].material.opacity=nivelFade);
}

const beat = Math.sin(t*2)+Math.sin(t*4)*0.5;
heart.scale.setScalar(4+beat*0.25);

heart.rotation.y+=0.01;
stars.rotation.y+=0.0003;

photos.forEach(p=>{
p.lookAt(camera.position);
});
}

controls.update();
renderer.render(scene,camera);
}

animate();

// FRASES
const frases=["Te amo","Mi vida","Mi todo","Natasha 💖"];

setInterval(()=>{
if(despierto && nivelFade>0.8){
let d=document.getElementById("frase");
d.innerHTML=frases[Math.floor(Math.random()*frases.length)];
d.style.opacity=0;
setTimeout(()=>d.style.opacity=1,200);
setTimeout(()=>d.style.opacity=0,5000);
}
},7000);

// MODALES
function verificarClave(){
if(document.getElementById('inputClave').value===CLAVE_SECRETA){
document.getElementById('modalClave').classList.remove('activo');
document.getElementById('mensajeSecreto').classList.add('activo');
}else alert("Incorrecto");
}

function cerrarModales(){
document.getElementById('modalClave').classList.remove('activo');
document.getElementById('mensajeSecreto').classList.remove('activo');
}

</script>
</body>
</html>
