<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#aa44ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #aa44ff;
}

#frase{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
color:white;
text-shadow:0 0 25px white;
opacity:0;
transition:1s;
}

</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>

<button id="musicBtn">🎵 Activar música</button>

<div id="frase"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// LUZ

const light=new THREE.PointLight(0xffffff,1.6)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// CORAZON CENTRAL

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1.5
})

const heartMesh=new THREE.Points(heartGeo,heartMat)
heartMesh.position.y=35

scene.add(heartMesh)



// FRASES

const frases=[
"💖 Mi gordita hermosa",
"💗 Mi caprichosita",
"👶 Mi bebita",
"🥰 Mi tiquitita",
"🐞 Mi pulguita",
"👑 Mi princesita",
"🌸 Mi niña hermosa",
"💘 Eres mi universo",
"💞 Siempre tú",
"🌹 Contigo todo es más bonito",
"✨ Eres mi estrella favorita",
"💓 Te amo infinitamente"
]

function mostrarFrase(){

const frase=frases[Math.floor(Math.random()*frases.length)]

const div=document.getElementById("frase")

div.innerHTML=frase
div.style.opacity=1

setTimeout(()=>{
div.style.opacity=0
},6000)

}

setInterval(mostrarFrase,9000)



// FOTOS CON MARCO BRILLANTE

const photos=[]
const loader=new THREE.TextureLoader()

function photo(angle,i){

const group=new THREE.Group()

const tex=loader.load("foto"+i+".jpg")

// FOTO

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const photoMesh=new THREE.Mesh(geo,mat)

group.add(photoMesh)


// MARCO

const frameGeo=new THREE.PlaneGeometry(18,18)

const frameMat=new THREE.MeshBasicMaterial({
color:0xff7ab6,
transparent:true,
opacity:0.9
})

const frame=new THREE.Mesh(frameGeo,frameMat)

frame.position.z=-0.1

group.add(frame)



group.position.y=28
group.position.x=Math.cos(angle)*40
group.position.z=Math.sin(angle)*40

scene.add(group)

photos.push(group)

}

for(let i=1;i<=8;i++){
photo(i*Math.PI*2/8,i)
}



// HOVER FOTOS

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("mousemove",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(photos,true)

photos.forEach(p=>{
p.scale.set(1,1,1)
p.children[1].material.color.set(0xff7ab6)
})

if(intersects.length>0){

const obj=intersects[0].object.parent

obj.scale.set(1.35,1.35,1.35)

obj.children[1].material.color.set(0xffffff)

setTimeout(()=>{
obj.children[1].material.color.set(0xff7ab6)
},200)

crearCorazones(obj.position)

}

})



// CORAZONES

function crearCorazones(pos){

for(let i=0;i<5;i++){

const geo=new THREE.SphereGeometry(0.4,6,6)

const mat=new THREE.MeshBasicMaterial({
color:0xff66aa,
transparent:true
})

const h=new THREE.Mesh(geo,mat)

h.position.copy(pos)

scene.add(h)

const vx=(Math.random()-0.5)*2
const vy=Math.random()*2
const vz=(Math.random()-0.5)*2

function anim(){

h.material.opacity-=0.02

h.position.x+=vx
h.position.y+=vy
h.position.z+=vz

if(h.material.opacity>0){
requestAnimationFrame(anim)
}else{
scene.remove(h)
}

}

anim()

}

}



// MUSICA

let music

document.getElementById("musicBtn").onclick=()=>{

if(!music){

music=new Audio("music.mp3")
music.loop=true
music.volume=0.7

}

music.play()

}



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0005
heartMesh.rotation.y+=0.002

const pulse=1+Math.sin(Date.now()*0.003)*0.08
heartMesh.scale.set(pulse,pulse,pulse)

photos.forEach((p,i)=>{

const t=Date.now()*0.0002+i
const radius=35+(i*5)

p.position.x=Math.cos(t)*radius
p.position.z=Math.sin(t)*radius

})

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
