<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestro Universo - Natasha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020005; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #titulo {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 32px; color: #ff7ab6; text-shadow: 0 0 25px #ff7ab6; z-index: 10;
            pointer-events: none;
        }

        #musicBtn {
            position: absolute; bottom: 30px; left: 30px; padding: 15px 30px;
            border: none; border-radius: 30px; background: linear-gradient(45deg, #aa44ff, #ff44aa);
            color: white; font-size: 16px; cursor: pointer; box-shadow: 0 0 20px #aa44ff; z-index: 20;
            transition: 0.3s;
        }

        #frase {
            position: absolute; bottom: 100px; width: 100%; text-align: center;
            font-size: 26px; color: white; text-shadow: 0 0 20px #ff77aa;
            opacity: 0; transition: 1.5s; z-index: 10; font-weight: bold;
        }

        /* Modales Mejorados */
        #modalClave, #mensajeSecreto {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center;
        }
        
        .activo { display: flex !important; animation: fadeIn 0.5s; }

        .modal-contenido {
            background: rgba(20, 20, 40, 0.95); padding: 50px;
            border-radius: 30px; text-align: center; border: 2px solid #ff77aa;
            box-shadow: 0 0 50px rgba(255, 119, 170, 0.5); max-width: 500px;
        }

        input {
            padding: 15px; font-size: 20px; border-radius: 15px; border: 2px solid #ff77aa;
            background: rgba(255,255,255,0.05); color: white; margin-bottom: 25px; text-align: center;
            width: 80%; outline: none;
        }

        button.pink {
            padding: 12px 35px; background: #ff77aa; border: none; color: white;
            border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px;
            transition: 0.3s;
        }
        button.pink:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff77aa; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="titulo">✨ Toca el corazón central para Natasha ✨</div>
<button id="musicBtn">🎵 Activar Música Mágica</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2 style="color: #ff77aa;">🔐 Nuestra Fecha Especial 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="pink" onclick="verificarClave()">Desbloquear</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1 style="color: #ff77aa; text-shadow: 0 0 15px #ff77aa;">Mi Natasha Hermosa</h1>
        <p style="color: white; font-size: 18px; line-height: 1.8;">
            Eres la luz que ilumina cada rincón de mi existencia.<br>
            Desde que estás conmigo, mi universo es más brillante.<br><br>
            <strong>Te amo infinitamente. 🌌💖</strong>
        </p>
        <button class="pink" onclick="document.getElementById('mensajeSecreto').classList.remove('activo')">Cerrar con Amor</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// --- CONFIGURACIÓN ---
const CLAVE_SECRETA = "30102025";
const TOTAL_FOTOS = 28; // Ahora configurado para las 28 fotos
let music;

// --- ESCENA Y NIEBLA ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020005);
scene.fog = new THREE.FogExp2(0x020005, 0.0015);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 50, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- LUCES DE NEÓN ---
const light1 = new THREE.PointLight(0xff00ff, 2, 300);
light1.position.set(50, 50, 50);
scene.add(light1);

const light2 = new THREE.PointLight(0x00ffff, 2, 300);
light2.position.set(-50, -50, 50);
scene.add(light2);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));

// --- ESTRELLAS ---
const starGeo = new THREE.BufferGeometry();
const starCoords = [];
for(let i=0; i<15000; i++) {
    starCoords.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, transparent: true });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- CORAZÓN CENTRAL RESPLANDECIENTE ---
const heartShape = new THREE.BufferGeometry();
const heartPoints = [];
for(let i=0; i<5000; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    heartPoints.push(x*1.5, y*1.5, (Math.random()-0.5)*8);
}
heartShape.setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3));
const heartMat = new THREE.PointsMaterial({ 
    color: 0xff0066, size: 1.2, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
});
const heartMesh = new THREE.Points(heartShape, heartMat);
scene.add(heartMesh);

// --- CARRUSEL ESPIRAL PARA 28 FOTOS ---
const photos = [];
const loader = new THREE.TextureLoader();

for(let i=1; i<=TOTAL_FOTOS; i++) {
    const group = new THREE.Group();
    const tex = loader.load(`foto${i}.jpg`);

    const photoMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(18, 18), photoMat);
    
    // Marco con brillo
    const frameMat = new THREE.MeshStandardMaterial({ 
        color: 0xff7ab6, emissive: 0xff33aa, emissiveIntensity: 0.5 
    });
    const frame = new THREE.Mesh(new THREE.PlaneGeometry(19.5, 19.5), frameMat);
    frame.position.z = -0.2;

    group.add(mesh);
    group.add(frame);
    
    // Posicionamiento en espiral de ADN (para que quepan las 28 sin estorbar)
    const angle = i * 0.8; 
    const radius = 70 + (i * 2);
    const py = (i * 4) - 60;
    group.position.set(Math.cos(angle)*radius, py, Math.sin(angle)*radius);
    group.lookAt(0, py, 0); // Miran hacia el centro
    
    scene.add(group);
    photos.push(group);
}

// --- LLUVIA DE CORAZONES 3D ---
const heartsList = [];
function createFallingHeart() {
    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.bezierCurveTo(0, -0.3, -0.6, -0.3, -0.6, 0);
    shape.bezierCurveTo(-0.6, 0.3, 0, 0.6, 0, 1);
    shape.bezierCurveTo(0, 0.6, 0.6, 0.3, 0.6, 0);
    shape.bezierCurveTo(0.6, -0.3, 0, -0.3, 0, 0);
    
    const geo = new THREE.ShapeGeometry(shape);
    const mat = new THREE.MeshStandardMaterial({ 
        color: 0xff44aa, emissive: 0xff0044, transparent: true, opacity: 0.6 
    });
    const h = new THREE.Mesh(geo, mat);
    h.position.set((Math.random()-0.5)*600, 300, (Math.random()-0.5)*600);
    h.scale.set(5, 5, 5);
    h.rotation.x = Math.PI;
    scene.add(h);
    heartsList.push(h);
}
setInterval(createFallingHeart, 250);

// --- LÓGICA DE INTERACCIÓN ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersect = raycaster.intersectObject(heartMesh);
    if(intersect.length > 0) {
        document.getElementById('modalClave').classList.add('activo');
    }
});

function verificarClave() {
    const val = document.getElementById('inputClave').value;
    if(val === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else {
        alert("Clave incorrecta... pista: la fecha 30/10/2025");
    }
}

document.getElementById("musicBtn").onclick = () => {
    if(!music) {
        music = new Audio("music.mp3");
        music.loop = true;
    }
    music.play();
    document.getElementById("musicBtn").style.display = "none";
};

// --- FRASES FLOTANTES ---
const frases = ["Eres mi mundo", "Te amo Natasha", "Mi niña caprichosa", "Mi tesoro", "Siempre juntos", "Eres arte"];
setInterval(() => {
    const f = document.getElementById("frase");
    f.innerText = frases[Math.floor(Math.random()*frases.length)];
    f.style.opacity = 1;
    setTimeout(() => f.style.opacity = 0, 3000);
}, 5000);

// --- BUCLE DE ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;
    
    // Latido y rotación del corazón
    heartMesh.rotation.y += 0.005;
    const beat = 1 + Math.sin(t * 4) * 0.1;
    heartMesh.scale.set(beat, beat, beat);
    
    // Rotación del universo
    stars.rotation.y += 0.0001;

    // Animación de fotos
    photos.forEach((p, i) => {
        p.position.y += Math.sin(t + i) * 0.02;
        // Hacer que las fotos orbiten lentamente
        const angle = t * 0.1 + (i * 0.8);
        const radius = 70 + (i * 2);
        p.position.x = Math.cos(angle) * radius;
        p.position.z = Math.sin(angle) * radius;
        p.lookAt(0, p.position.y, 0);
    });

    // Caída de corazones
    for(let i=0; i<heartsList.length; i++) {
        heartsList[i].position.y -= 1.2;
        heartsList[i].rotation.z += 0.01;
        if(heartsList[i].position.y < -300) {
            scene.remove(heartsList[i]);
            heartsList.splice(i, 1);
        }
    }

    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
