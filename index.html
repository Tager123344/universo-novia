<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#aa44ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #aa44ff;
}

#frase{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
color:white;
text-shadow:0 0 25px white;
opacity:0;
transition:1s;
}
</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>
<button id="musicBtn">🎵 Activar música</button>
<div id="frase"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,10000)
camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// LUZ

const light=new THREE.PointLight(0xffffff,1.6)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3))

const galaxyMat=new THREE.PointsMaterial({color:0xffffff,size:0.7})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// CUADROS ROSA

for(let i=0;i<1200;i++){

const size=Math.random()*2+0.5

const geo=new THREE.BoxGeometry(size,size,size)

const mat=new THREE.MeshBasicMaterial({
color:0xff77aa,
transparent:true,
opacity:0.7
})

const cube=new THREE.Mesh(geo,mat)

cube.position.set(
(Math.random()-0.5)*800,
(Math.random()-0.5)*500,
(Math.random()-0.5)*800
)

scene.add(cube)

}



// CORAZON

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute('position',new THREE.Float32BufferAttribute(heart,3))

const heartMat=new THREE.PointsMaterial({color:0xff3377,size:1.5})

const heartMesh=new THREE.Points(heartGeo,heartMat)
heartMesh.position.y=35

scene.add(heartMesh)



// FRASES

const frases=[
"💖 Mi gordita hermosa","💗 Mi caprichosita","👶 Mi bebita","🥰 Mi tiquitita",
"🐞 Mi pulguita","👑 Mi princesita","🌸 Mi niña hermosa","💘 Eres mi universo",
"💞 Siempre tú","🌹 Contigo todo es más bonito","✨ Eres mi estrella favorita",
"💓 Te amo infinitamente"
]



// FOTOS

const photos=[]
const loader=new THREE.TextureLoader()

function photo(angle,i){

const group=new THREE.Group()

const tex=loader.load("foto"+i+".jpg")

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const photoMesh=new THREE.Mesh(geo,mat)
group.add(photoMesh)



// ===== MARCO REAL (4 BORDES) =====

const frameMaterial=new THREE.MeshBasicMaterial({
color:0xff7ab6,
side:THREE.DoubleSide
})

// arriba
const topFrame=new THREE.Mesh(new THREE.BoxGeometry(18,0.6,0.2),frameMaterial)
topFrame.position.y=8.3
group.add(topFrame)

// abajo
const bottomFrame=new THREE.Mesh(new THREE.BoxGeometry(18,0.6,0.2),frameMaterial)
bottomFrame.position.y=-8.3
group.add(bottomFrame)

// izquierda
const leftFrame=new THREE.Mesh(new THREE.BoxGeometry(0.6,18,0.2),frameMaterial)
leftFrame.position.x=-8.3
group.add(leftFrame)

// derecha
const rightFrame=new THREE.Mesh(new THREE.BoxGeometry(0.6,18,0.2),frameMaterial)
rightFrame.position.x=8.3
group.add(rightFrame)



group.position.y=28
group.position.x=Math.cos(angle)*40
group.position.z=Math.sin(angle)*40

scene.add(group)
photos.push(group)

}

for(let i=1;i<=5;i++){
photo(i*Math.PI*2/5,i)
}



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0005
heartMesh.rotation.y+=0.002

const pulse=1+Math.sin(Date.now()*0.003)*0.08
heartMesh.scale.set(pulse,pulse,pulse)

photos.forEach((p,i)=>{

const t=Date.now()*0.0002+i
const radius=35+(i*5)

p.position.x=Math.cos(t)*radius
p.position.z=Math.sin(t)*radius

})

controls.update()
renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
