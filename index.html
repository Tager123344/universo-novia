```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

#mensaje{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:28px;
color:#ff77aa;
}

#sub{
position:absolute;
top:70px;
width:100%;
text-align:center;
font-size:18px;
color:white;
}
</style>

</head>

<body>

<div id="mensaje">💖 Nuestro pequeño universo 💖</div>
<div id="sub">Eres el centro de mi universo</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.z = 20

const starsGeometry = new THREE.BufferGeometry()
const starVertices = []

for (let i = 0; i < 2000; i++) {
const x = (Math.random() - 0.5) * 600
const y = (Math.random() - 0.5) * 600
const z = (Math.random() - 0.5) * 600
starVertices.push(x, y, z)
}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starsMaterial = new THREE.PointsMaterial({color:0xffffff})
const stars = new THREE.Points(starsGeometry,starsMaterial)

scene.add(stars)

const centerGeometry = new THREE.SphereGeometry(2,32,32)
const centerMaterial = new THREE.MeshBasicMaterial({color:0xff3399})
const center = new THREE.Mesh(centerGeometry,centerMaterial)

scene.add(center)

const planets = []

function createPlanet(radius,color){

const geometry = new THREE.SphereGeometry(0.5,32,32)
const material = new THREE.MeshBasicMaterial({color})
const mesh = new THREE.Mesh(geometry,material)

scene.add(mesh)

planets.push({
mesh,
radius,
angle:Math.random()*Math.PI*2,
speed:0.01+Math.random()*0.01
})

}

createPlanet(5,0xff6699)
createPlanet(7,0xff99cc)
createPlanet(9,0xff4477)

function animate(){

requestAnimationFrame(animate)

center.rotation.y += 0.01

planets.forEach(p=>{

p.angle += p.speed

p.mesh.position.x = Math.cos(p.angle) * p.radius
p.mesh.position.z = Math.sin(p.angle) * p.radius

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
```
