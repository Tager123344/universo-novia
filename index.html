<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo - Natasha</title>
    <style>
        /* =========================================
           1. ESTILOS VISUALES (CSS)
           =========================================
        */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            cursor: default; 
        }

        #titulo { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(20px, 5vw, 32px); 
            color: #ff7ab6; 
            text-shadow: 0 0 20px #ff7ab6; 
            z-index: 10; 
            pointer-events: none; 
            opacity: 0; /* Inicia oculto para el efecto de sorpresa */
            transition: opacity 2.5s ease-in;
        }
        
        #musicBtn { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 18px 45px; 
            border: none; 
            border-radius: 40px; 
            background: #aa44ff; 
            color: white; 
            font-size: 22px; 
            cursor: pointer; 
            box-shadow: 0 0 30px #aa44ff; 
            z-index: 100; 
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #musicBtn:hover { 
            transform: translateX(-50%) scale(1.15); 
            box-shadow: 0 0 50px #ff77aa; 
            background: #ff77aa; 
        }

        #frase { 
            position: absolute; 
            bottom: 130px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(18px, 4vw, 26px); 
            color: white; 
            text-shadow: 0 0 20px white; 
            opacity: 0; 
            transition: 2s; 
            z-index: 10; 
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* =========================================
           2. VENTANAS MODALES Y FORMULARIOS
           =========================================
        */
        #modalClave, #mensajeSecreto { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(15px); 
        }

        #modalClave.activo, #mensajeSecreto.activo { 
            display: flex; 
        }

        .modal-contenido { 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            padding: 50px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 0 80px #ff77aa; 
            border: 3px solid #ff77aa; 
            max-width: 85%; 
            width: 480px; 
            color: white; 
        }
        
        input { 
            padding: 18px; 
            border: 2px solid #ff77aa; 
            border-radius: 20px; 
            background: rgba(255,255,255,0.05); 
            color: white; 
            text-align: center; 
            margin-bottom: 25px; 
            width: 90%; 
            font-size: 20px; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px #ff77aa;
        }

        .btn-modal { 
            padding: 15px 30px; 
            border: none; 
            border-radius: 25px; 
            background: #ff77aa; 
            color: white; 
            cursor: pointer; 
            font-size: 18px; 
            margin: 10px; 
            font-weight: bold;
            transition: 0.4s; 
        }

        .btn-modal:hover { 
            background: #ff3377; 
            transform: scale(1.1); 
            box-shadow: 0 0 20px #ff3377;
        }
    </style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">✨ Activar Magia ✨</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <p style="margin-bottom: 20px; color: #ffcae3;">Nuestra fecha especial (DDMMAAAA)</p>
        <input type="password" id="inputClave" placeholder="Escribe aquí...">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Volver</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1 style="color: #ff7ab6;">¡Hola mi amor! ✨</h1>
        <p style="line-height: 1.8; font-size: 1.1em;">
            <strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
            Tú eres mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
            <span style="font-size: 1.4em; color: #ff7ab6; font-weight: bold; text-shadow: 0 0 10px #ff7ab6;">
                Te amo mucho mi gordita gracias por existir ❤️
            </span>
        </p>
        <br>
        <button class="btn-modal" onclick="cerrarMensaje()">💕 Te amo mucho ❤️</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
/**
 * =========================================
 * 3. LÓGICA DEL UNIVERSO (JAVASCRIPT)
 * =========================================
 */

// --- Variables de Configuración ---
const CLAVE_SECRETA = "30102025";
let despierto = false;
let nivelFade = 0; 
let camaraEnVuelo = false;
let universoExpandido = false;

// Listado de frases románticas aleatorias
const frasesList = [
    "💖 Mi amor", "🥰 Eres mi todo", "💘 Natasha", "✨ Mi vida", 
    "💍 Siempre tú", "🧸 Mi bebita", "👑 Mi reina", "🌹 Te amo", 
    "🌙 Mi luna", "🌸 Mi gordita", "🎀 Mi caprichosita", "👑 Mi princesita", 
    "✨ Mi niña hermosa", "🍭 Mi tiquitita", "🦋 Mi pulguita", "💎 Mi tesorito"
];

// --- Inicialización de la Escena 3D ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 2500); // Inicia lejos para el zoom inicial

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- Controles de Cámara ---
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.autoRotate = false; // Se activa al pulsar el botón
controls.autoRotateSpeed = 0.5; // Rotación lenta y romántica

// --- Iluminación de la Escena ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const pLight = new THREE.PointLight(0xff77aa, 2.5, 1500);
pLight.position.set(0, 150, 250);
scene.add(pLight);

/**
 * CREACIÓN DE OBJETOS DEL ESPACIO
 */

// 1. Estrellas de fondo (20,000 partículas)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i = 0; i < 20000; i++) {
    starPos.push(
        (Math.random() - 0.5) * 4000, 
        (Math.random() - 0.5) * 3500, 
        (Math.random() - 0.5) * 4000
    );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// 2. Cubos flotantes decorativos
const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
for(let i = 0; i < 800; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), cubeMat.clone());
    c.position.set(
        (Math.random() - 0.5) * 1800, 
        (Math.random() - 0.5) * 1400, 
        (Math.random() - 0.5) * 1800
    );
    scene.add(c);
    cubes.push(c);
}

// 3. El Corazón Central Principal
const heartShape = new THREE.Shape();
heartShape.moveTo(5, 5); 
heartShape.bezierCurveTo(5, 5, 4, 0, 0, 0); 
heartShape.bezierCurveTo(-6, 0, -6, 7, -6, 7); 
heartShape.bezierCurveTo(-6, 11, -3, 15.4, 5, 19); 
heartShape.bezierCurveTo(12, 15.4, 16, 11, 16, 7); 
heartShape.bezierCurveTo(16, 7, 16, 0, 10, 0); 
heartShape.bezierCurveTo(7, 0, 5, 5, 5, 5);

const heartGeo = new THREE.ExtrudeGeometry(heartShape, { 
    depth: 5, 
    bevelEnabled: true, 
    bevelSize: 1.5, 
    bevelThickness: 1.5 
});
const heartMat = new THREE.MeshStandardMaterial({ 
    color: 0xff3377, 
    emissive: 0xff1144, 
    emissiveIntensity: 2.2, 
    transparent: true, 
    opacity: 0, 
    roughness: 0.1, 
    metalness: 0.2 
});
const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.rotation.z = Math.PI; 
heartMesh.scale.set(4, 4, 4); 
heartMesh.position.set(20, 40, 0);
scene.add(heartMesh);

// 4. Galería de Fotos (55 elementos)
const photos = [];
const loader = new THREE.TextureLoader();

// Marco de las fotos
const fShape = new THREE.Shape(); 
fShape.moveTo(-14, -14); fShape.lineTo(14, -14); fShape.lineTo(14, 14); fShape.lineTo(-14, 14);
const hole = new THREE.Path(); 
hole.moveTo(-12.5, -12.5); hole.lineTo(12.5, -12.5); hole.lineTo(12.5, 12.5); hole.lineTo(-12.5, 12.5); fShape.holes.push(hole);
const frameGeo = new THREE.ShapeGeometry(fShape);
const frMat = new THREE.MeshBasicMaterial({ color: 0xff7ab6, side: THREE.DoubleSide, transparent: true, opacity: 0 });

for(let i = 1; i <= 55; i++) {
    const group = new THREE.Group();
    const photoMat = new THREE.MeshBasicMaterial({ 
        map: loader.load(`foto${i}.jpg`), 
        side: THREE.DoubleSide, 
        transparent: true, 
        opacity: 0 
    });
    group.add(new THREE.Mesh(new THREE.PlaneGeometry(25, 25), photoMat));
    group.add(new THREE.Mesh(frameGeo, frMat));
    
    let ring = i <= 18 ? 0 : (i <= 36 ? 1 : 2);
    let radius = ring === 0 ? 250 : (ring === 1 ? 420 : 580);
    let yPos = ring === 0 ? 160 : (ring === 1 ? 0 : -160);
    let angle = (i % 18) * (Math.PI * 2 / 18);
    
    group.position.set(Math.cos(angle) * radius, yPos + (Math.random() - 0.5) * 70, Math.sin(angle) * radius);
    scene.add(group); 
    photos.push(group);
}

// 5. Sistema de Partículas para explosiones
const pCount = 600; 
const particlesGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(pCount * 3);
const velArray = new Float32Array(pCount * 3);
particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMat = new THREE.PointsMaterial({ color: 0xffff00, size: 3.5, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particlesGeo, particlesMat);
scene.add(particleSystem);

function explosion(x, y, z, speedMultiplier = 8) {
    particlesMat.opacity = 1;
    const pos = particlesGeo.attributes.position.array;
    for(let i = 0; i < pCount; i++) {
        pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
        velArray[i*3] = (Math.random() - 0.5) * speedMultiplier;
        velArray[i*3+1] = (Math.random() - 0.5) * speedMultiplier;
        velArray[i*3+2] = (Math.random() - 0.5) * speedMultiplier;
    }
}

// 6. Lluvia de Estrellas Final
const rCount = 500;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(rCount * 3);
for(let i = 0; i < rCount; i++) { 
    rainPos[i*3] = (Math.random() - 0.5) * 2500; 
    rainPos[i*3+1] = Math.random() * 1500; 
    rainPos[i*3+2] = (Math.random() - 0.5) * 2500; 
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({ color: 0xffffcc, size: 2.2, transparent: true, opacity: 0 });
scene.add(new THREE.Points(rainGeo, rainMat));

/**
 * CONTROL DE AUDIO E INTERACCIONES
 */
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let audio, clickSound;

document.getElementById("musicBtn").onclick = function() {
    if(!audio) {
        audio = new Audio("music.mp3");
        audio.loop = true;
        clickSound = new Audio("click.mp3");
    }
    audio.play();
    this.style.opacity = "0";
    setTimeout(() => {
        this.style.display = "none";
        document.getElementById("titulo").style.opacity = "1";
    }, 500);
    despierto = true;
    camera.position.set(0, 50, 2000); 
    controls.autoRotate = true; 
    camaraEnVuelo = true; 
};

window.addEventListener("pointermove", (e) => { 
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; 
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; 
});

window.addEventListener("click", () => {
    if(!despierto) return;
    ray.setFromCamera(mouse, camera);
    
    // Clic en el corazón abre la clave
    if(ray.intersectObject(heartMesh).length > 0) {
        document.getElementById('modalClave').classList.add('activo');
    }

    // Clic en las fotos genera una pequeña explosión
    const hitPhotos = ray.intersectObjects(photos, true);
    if(hitPhotos.length > 0) {
        const p = hitPhotos[0].object.parent.position;
        explosion(p.x, p.y, p.z);
        if(clickSound) { clickSound.currentTime = 0; clickSound.play(); }
    }
});

/**
 * BUCLE PRINCIPAL DE ANIMACIÓN
 */
function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;
    
    if(despierto) {
        // Zoom suave al inicio
        if(camaraEnVuelo && camera.position.z > 650) camera.position.z -= 15; else camaraEnVuelo = false;
        
        // Aparición gradual de elementos
        if(nivelFade < 1) {
            nivelFade += 0.004; 
            starsMat.opacity = nivelFade * 0.8; 
            heartMat.opacity = nivelFade; 
            frMat.opacity = nivelFade;
            photos.forEach(p => p.children[0].material.opacity = nivelFade);
        }

        // Efecto de lluvia al final
        if(universoExpandido) {
            const rArray = rainGeo.attributes.position.array;
            for(let i = 0; i < rCount; i++) { 
                rArray[i*3+1] -= 2.5; 
                if(rArray[i*3+1] < -1200) rArray[i*3+1] = 1200; 
            }
            rainGeo.attributes.position.needsUpdate = true;
            if(rainMat.opacity < 1) rainMat.opacity += 0.01;
        }

        // Latido del corazón y rotación suave
        let pulseFactor = Math.sin(t * 5.0) * Math.sin(t * 5.0); 
        heartMesh.scale.setScalar((universoExpandido ? 6.2 : 4.1) + pulseFactor * 0.25);
        heartMat.emissiveIntensity = 2.0 + pulseFactor * 1.5;
        heartMesh.rotation.y += (universoExpandido ? 0.05 : 0.01); // 0.01 es la rotación romántica
        
        stars.rotation.y += 0.00015;

        // Partículas de explosión
        if(particlesMat.opacity > 0) {
            const pArray = particlesGeo.attributes.position.array;
            for(let i = 0; i < pCount; i++){ 
                pArray[i*3] += velArray[i*3]; 
                pArray[i*3+1] += velArray[i*3+1]; 
                pArray[i*3+2] += velArray[i*3+2]; 
            }
            particlesGeo.attributes.position.needsUpdate = true; 
            particlesMat.opacity -= 0.012; 
        }

        // Fotos flotando y mirando a cámara
        photos.forEach((p, i) => { 
            p.lookAt(camera.position); 
            p.position.y += Math.sin(t + i) * 0.35; 
        });
    }
    
    controls.update(); 
    renderer.render(scene, camera);
}

// --- Lógica de Modales ---
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else alert("Esa no es nuestra fecha... Intenta de nuevo 💕");
}

function cerrarMensaje() {
    document.getElementById('mensajeSecreto').classList.remove('activo');
    universoExpandido = true;
    explosion(0, 0, 0, 20); 
    pLight.intensity = 7;
    pLight.color.setHex(0xffffff); 
}

function cerrarModales() { 
    document.querySelectorAll('.activo').forEach(m => m.classList.remove('activo')); 
}

window.addEventListener('resize', () => { 
    camera.aspect = window.innerWidth / window.innerHeight; 
    camera.updateProjectionMatrix(); 
    renderer.setSize(window.innerWidth, window.innerHeight); 
});

animate();

// Frases automáticas en la parte inferior
setInterval(() => {
    if(despierto && nivelFade > 0.8) {
        const d = document.getElementById("frase");
        d.innerHTML = frasesList[Math.floor(Math.random() * frasesList.length)];
        d.style.opacity = 1; 
        setTimeout(() => d.style.opacity = 0, 4000);
    }
}, 7500);

</script>
</body>
</html>
