<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para Natasha 💖</title>
<style>
  body { margin:0; overflow:hidden; background: radial-gradient(circle at center, #0a0015, #000); font-family:Arial, sans-serif; }
  #mensaje {
    position: absolute; top: 30px; left: 0; right: 0; z-index: 5;
    text-align: center; font-size: 48px; color: #ff69b4;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493, 0 0 60px #ff007f;
    pointer-events: none; animation: glow 3s infinite alternate;
  }
  @keyframes glow { from { text-shadow: 0 0 20px #ff69b4; } to { text-shadow: 0 0 50px #ff1493, 0 0 80px #ff007f; } }

  #btn {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    padding: 18px 50px; font-size: 24px; color: white; cursor: pointer; z-index: 10;
    background: linear-gradient(135deg, #ff2e8b, #ff69b4); border: none; border-radius: 60px;
    box-shadow: 0 0 40px rgba(255,105,180,0.8); transition: all 0.4s;
  }
  #btn:hover { transform: translateX(-50%) scale(1.12); box-shadow: 0 0 60px #ff1493; }

  #secret {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); color: #ffb6c1;
    font-size: 32px; line-height: 1.6; display: none; align-items: center; justify-content: center;
    text-align: center; padding: 50px; z-index: 20;
  }
  #secret button {
    margin-top: 40px; padding: 16px 40px; font-size: 22px;
    background: #ff69b4; color: white; border: none; border-radius: 50px;
    cursor: pointer; box-shadow: 0 0 30px #ff69b4;
  }
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<div id="secret">
  Mi amor, Natasha...<br><br>
  En este universo infinito, tú eres la estrella más brillante.<br>
  Cada latido de mi corazón lleva tu nombre.<br>
  Gracias por hacer mi mundo tan hermoso. Te amo eternamente ❤️<br><br>
  <button onclick="document.getElementById('secret').style.display='none'">Cerrar 💕</button>
</div>

<script src="https://unpkg.com/three@0.167.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.167.1/examples/js/controls/OrbitControls.min.js"></script>
<script src="https://unpkg.com/three@0.167.1/examples/js/postprocessing/EffectComposer.min.js"></script>
<script src="https://unpkg.com/three@0.167.1/examples/js/postprocessing/RenderPass.min.js"></script>
<script src="https://unpkg.com/three@0.167.1/examples/js/postprocessing/UnrealBloomPass.min.js"></script>

<script>
// Escena
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
camera.position.set(0, 20, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Bloom (glow neón fuerte)
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8,  // strength (más glow)
  0.6,
  0.7
);
composer.addPass(bloom);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// Fondo estrellas lejanas sutil
const bgGeo = new THREE.BufferGeometry();
const bgPos = [];
for (let i = 0; i < 5000; i++) {
  const r = 3000 + Math.random() * 2000;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  bgPos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
}
bgGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgPos, 3));
scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.8, transparent: true, opacity: 0.4})));

// Galaxia rosa/neón
const galGeo = new THREE.BufferGeometry();
const galPos = [];
for (let i = 0; i < 6000; i++) {
  const r = Math.random() * 150;
  const spin = r * 0.5;
  const a = Math.random() * Math.PI * 2;
  galPos.push(Math.cos(a + spin) * r, (Math.random() - 0.5) * 12, Math.sin(a + spin) * r);
}
galGeo.setAttribute('position', new THREE.Float32BufferAttribute(galPos, 3));
scene.add(new THREE.Points(galGeo, new THREE.PointsMaterial({color: 0xffb6c1, size: 0.6, transparent: true})));

// Corazón central con latido
const heartGeo = new THREE.BufferGeometry();
const heartPos = [];
for (let i = 0; i < 1800; i++) {
  const t = Math.random() * Math.PI * 2;
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  heartPos.push(x * 1, y * 1, (Math.random() - 0.5) * 4);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heartPos, 3));
const heartMat = new THREE.PointsMaterial({color: 0xff1493, size: 1.4, transparent: true});
const heart = new THREE.Points(heartGeo, heartMat);
scene.add(heart);

// Fotos (cambia por tus rutas reales o URLs)
const loader = new THREE.TextureLoader();
const photos = [];
const photoFiles = ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg"]; // ¡Pon tus fotos aquí!
photoFiles.forEach((file, i) => {
  const angle = i * Math.PI * 2 / photoFiles.length;
  const tex = loader.load(file, undefined, undefined, () => console.log(`Foto ${file} cargada`));
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide});
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(24, 24), mat);
  mesh.position.set(Math.cos(angle) * 60, 0, Math.sin(angle) * 60);
  mesh.userData = {angle, radius: 60};
  scene.add(mesh);
  photos.push(mesh);
});

// Frases flotantes (pocas pero grandes)
const frases = ["Te amo Natasha ❤️", "Mi universo entero", "Siempre tuya", "Eres mi todo", "Mi princesa"];
for (let i = 0; i < 60; i++) {
  const c = document.createElement('canvas'); c.width=512; c.height=256;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 50px Arial'; ctx.fillStyle = '#ff9ec7'; ctx.textAlign = 'center';
  ctx.fillText(frases[i % frases.length], 256, 140);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex, transparent: true, opacity: 0.8}));
  const a = Math.random() * Math.PI * 2;
  const r = 120 + Math.random() * 150;
  sprite.position.set(Math.cos(a)*r, (Math.random()-0.5)*100, Math.sin(a)*r);
  sprite.scale.set(30, 12, 1);
  scene.add(sprite);
}

// Estrellas twinkling
const twinkles = [];
for (let i = 0; i < 1200; i++) {
  const star = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 6, 6),
    new THREE.MeshBasicMaterial({color: 0xffffff})
  );
  star.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*400, (Math.random()-0.5)*800);
  star.userData.phase = Math.random() * Math.PI * 2;
  scene.add(star);
  twinkles.push(star);
}

// Luz
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
scene.add(new THREE.PointLight(0xff69b4, 2, 500).position.set(100, 100, 100));

// Animar
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  heart.scale.setScalar(1 + Math.sin(t * 2) * 0.08);
  heart.rotation.y += 0.003;

  photos.forEach(p => {
    p.userData.angle += 0.001;
    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
    p.rotation.y += 0.005;
  });

  twinkles.forEach(s => {
    s.material.opacity = 0.7 + Math.sin(t * 4 + s.userData.phase) * 0.3;
  });

  controls.update();
  composer.render();
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Mensaje
document.getElementById('btn').onclick = () => {
  document.getElementById('secret').style.display = 'flex';
};
</script>
</body>
</html>
