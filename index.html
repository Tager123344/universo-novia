```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#titulo{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:42px;
color:#ff77aa;
text-shadow:0 0 40px #ff77aa;
}

#btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 25px;
background:#ff2a8b;
border:none;
border-radius:25px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2a8b;
}

</style>

</head>

<body>

<div id="titulo">💖 Nuestro universo infinito 💖</div>

<button id="btn">💌 Mensaje secreto</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2f7c9fd5d8.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// escena

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

camera.position.z=25

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


// controles 360

const controls=new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping=true
controls.dampingFactor=0.05
controls.rotateSpeed=0.6
controls.zoomSpeed=0.8


// estrellas

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<25000;i++){

starVertices.push(
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:1.3
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)


// nebulosa

const nebulaGeo=new THREE.SphereGeometry(300,64,64)

const nebulaMat=new THREE.MeshBasicMaterial({
color:0x7722ff,
transparent:true,
opacity:0.08,
side:THREE.BackSide
})

const nebula=new THREE.Mesh(nebulaGeo,nebulaMat)

scene.add(nebula)


// luz

const light=new THREE.PointLight(0xffffff,2)

light.position.set(50,50,50)

scene.add(light)


// planetas con anillos

function createPlanet(x,y,z,color){

const geo=new THREE.SphereGeometry(2.5,64,64)

const mat=new THREE.MeshStandardMaterial({
color:color,
emissive:color,
emissiveIntensity:0.8
})

const planet=new THREE.Mesh(geo,mat)

planet.position.set(x,y,z)

scene.add(planet)

const ringGeo=new THREE.RingGeometry(3.5,5,64)

const ringMat=new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide
})

const ring=new THREE.Mesh(ringGeo,ringMat)

ring.rotation.x=Math.PI/2

planet.add(ring)

}

createPlanet(8,0,-10,0xff77aa)
createPlanet(-10,5,-15,0x77aaff)
createPlanet(12,-8,-20,0xffaa00)
createPlanet(-14,-6,-18,0xaa44ff)


// corazones

const hearts=[]

for(let i=0;i<200;i++){

const geo=new THREE.SphereGeometry(0.4,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xff66aa})

const heart=new THREE.Mesh(geo,mat)

heart.position.set(
(Math.random()-0.5)*80,
(Math.random()-0.5)*80,
(Math.random()-0.5)*80
)

scene.add(heart)

hearts.push(heart)

}


// fotos

const loader=new THREE.TextureLoader()

function photo(x,y,z,img){

const tex=loader.load(img)

const geo=new THREE.PlaneGeometry(8,8)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x,y,z)

scene.add(mesh)

}

photo(-6,8,-12,"foto1.jpg")
photo(10,-4,-15,"foto2.jpg")
photo(-12,-8,-20,"foto3.jpg")
photo(6,12,-18,"foto4.jpg")
photo(-4,-12,-14,"foto5.jpg")


// frases

const frases=[
"Mi princesa",
"Mi niña hermosa",
"Te amo mucho",
"Mi amorcito",
"Mi cachetoncita",
"Mi gordita",
"Mi tesoro",
"Eres mi felicidad",
"Eres mi universo",
"Contigo todo es mejor"
]

frases.forEach((f,i)=>{

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="50px Arial"
ctx.fillText(f,40,120)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

sprite.position.set(
(Math.random()-0.5)*60,
(Math.random()-0.5)*60,
(Math.random()-0.5)*60
)

sprite.scale.set(12,5,1)

scene.add(sprite)

})


// estrellas fugaces

function shootingStar(){

const geo=new THREE.SphereGeometry(0.5,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-100,Math.random()*50,-50)

scene.add(star)

const speed=1+Math.random()

function move(){

star.position.x+=speed
star.position.y-=speed*0.2

if(star.position.x<100){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(shootingStar,3000)


// mensaje

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")

}


// animación

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
```
