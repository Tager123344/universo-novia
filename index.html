<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>

<style>
body{ margin:0; overflow:hidden; background:black; font-family:Arial; }
#titulo{ position:absolute; top:20px; width:100%; text-align:center; font-size:36px; color:#ff7ab6; text-shadow:0 0 25px #ff7ab6; z-index:10; }
#musicBtn{ position:absolute; bottom:40px; left:50%; transform:translateX(-50%); padding:14px 28px; border:none; border-radius:25px; background:#aa44ff; color:white; font-size:18px; cursor:pointer; box-shadow:0 0 20px #aa44ff; z-index:10; }
#frase{ position:absolute; bottom:120px; width:100%; text-align:center; font-size:28px; color:white; text-shadow:0 0 25px white; opacity:0; transition:1s; z-index:10; }
#modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
.activo { display: flex !important; }
.modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff77aa; border: 2px solid #ff77aa; max-width: 400px; color: white; }
input { padding: 15px; font-size: 18px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; }
button { padding: 12px 30px; border: none; border-radius: 25px; background: #ff77aa; color: white; cursor: pointer; transition: 0.3s; }
button:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff77aa; }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo - Para Natasha 💖</div>
<button id="musicBtn">🎵 Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Ingresa la clave secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="••••••••">
        <br>
        <button onclick="verificarClave()">💖 Desbloquear</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>Mi Natasha Hermosa</h1>
        <p>Eres la luz que ilumina cada día de mi vida ✨<br><br>Te amo hoy, mañana y siempre 💕</p>
        <button onclick="document.getElementById('mensajeSecreto').classList.remove('activo')">Cerrar con amor</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.set(0, 50, 150);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUZ
const light = new THREE.PointLight(0xffffff, 1.6);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// --- EFECTOS ORIGINALES ---

// GALAXIA
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for(let i=0; i<15000; i++){
    const r = Math.random()*200;
    const spin = r*0.4;
    const angle = Math.random()*Math.PI*2;
    vertices.push(Math.cos(angle+spin)*r, (Math.random()-0.5)*20, Math.sin(angle+spin)*r);
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
scene.add(new THREE.Points(galaxyGeo, new THREE.PointsMaterial({color:0xffffff, size:0.7})));

// CUADROS ROSA
for(let i=0; i<1200; i++){
    const size = Math.random()*2+0.5;
    const cube = new THREE.Mesh(new THREE.BoxGeometry(size,size,size), new THREE.MeshBasicMaterial({color:0xff77aa, transparent:true, opacity:0.7}));
    cube.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*500, (Math.random()-0.5)*800);
    scene.add(cube);
}

// PARTÍCULAS BRILLANTES
const sparkleGeo = new THREE.BufferGeometry();
const sparklePos = [];
for(let i=0; i<3000; i++) sparklePos.push((Math.random()-0.5)*600, (Math.random()-0.5)*400, (Math.random()-0.5)*600);
sparkleGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparklePos, 3));
const sparkles = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({size:1.2, color:0xffffff, transparent:true, opacity:0.8}));
scene.add(sparkles);

// LLUVIA DE CORAZONES (Lógica original)
const fallingHearts = [];
function createHeartShape(){
    const s = new THREE.Shape();
    s.moveTo(0, 0.5);
    s.bezierCurveTo(0, 0.5, -0.5, 0, -0.5, 0);
    s.bezierCurveTo(-0.5, -0.35, 0, -0.6, 0, -0.8);
    s.bezierCurveTo(0, -0.6, 0.5, -0.35, 0.5, 0);
    s.bezierCurveTo(0.5, 0, 0, 0.5, 0, 0.5);
    return s;
}
function spawnFallingHeart(){
    const heart = new THREE.Mesh(new THREE.ShapeGeometry(createHeartShape()), new THREE.MeshBasicMaterial({color:0xff3366, transparent:true, opacity:0.8, side:THREE.DoubleSide}));
    const scale = Math.random()*3+1; heart.scale.set(scale, scale, scale);
    heart.position.set((Math.random()-0.5)*300, 200, (Math.random()-0.5)*300);
    heart.userData = { speedY: Math.random()*0.5+0.3 };
    scene.add(heart); fallingHearts.push(heart);
}
setInterval(spawnFallingHeart, 200);

// CORAZÓN CENTRAL
const heartPoints = [];
for(let i=0; i<2000; i++){
    const t = Math.random()*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    heartPoints.push(x*0.8, y*0.8 + 35, (Math.random()-0.5)*2);
}
const heartMesh = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3)), new THREE.PointsMaterial({color:0xff3377, size:1.5}));
scene.add(heartMesh);

// FRASES
const frases = ["💖 Mi gordita hermosa", "💗 Mi caprichosita", "🥰 Mi tiquitita", "💘 Eres mi universo", "✨ Eres mi estrella"];
function mostrarFrase(){
    const div = document.getElementById("frase");
    div.innerHTML = frases[Math.floor(Math.random()*frases.length)];
    div.style.opacity = 1;
    setTimeout(() => div.style.opacity = 0, 6000);
}
setInterval(mostrarFrase, 9000);

// FOTOS CON MARCO DE CORTE (Sin solapamiento morado)
const photos = [];
const loader = new THREE.TextureLoader();

for(let i=1; i<=28; i++){
    const group = new THREE.Group();
    const tex = loader.load(`foto${i}.jpg`);
    
    // 1. La Foto
    const photoMesh = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshBasicMaterial({map:tex, side:THREE.DoubleSide}));
    
    // 2. El Marco Rosa Estilo Original (Pero con un hueco en medio)
    const frameShape = new THREE.Shape();
    frameShape.moveTo(-9, -9); frameShape.lineTo(9, -9); frameShape.lineTo(9, 9); frameShape.lineTo(-9, 9);
    const hole = new THREE.Path();
    hole.moveTo(-8, -8); hole.lineTo(8, -8); hole.lineTo(8, 8); hole.lineTo(-8, 8);
    frameShape.holes.push(hole);

    const frameMesh = new THREE.Mesh(new THREE.ShapeGeometry(frameShape), new THREE.MeshBasicMaterial({color:0xff7ab6, side:THREE.DoubleSide, transparent:true, opacity:0.9}));

    group.add(photoMesh);
    group.add(frameMesh);
    scene.add(group);
    photos.push(group);
}

// ANIMACIÓN Y LÓGICA
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    }
}

function animate(){
    requestAnimationFrame(animate);
    heartMesh.rotation.y += 0.002;
    galaxy.rotation.y += 0.0005;

    // Lluvia corazones
    fallingHearts.forEach((h, idx) => {
        h.position.y -= h.userData.speedY;
        if(h.position.y < -200) { scene.remove(h); fallingHearts.splice(idx, 1); }
    });

    // Órbita Fotos
    const time = Date.now()*0.0001;
    photos.forEach((p, i) => {
        const isTop = i < 14;
        const angle = ((i % 14) / 14) * Math.PI * 2 + time;
        const radius = isTop ? 65 : 85;
        const py = isTop ? 50 : 15;
        p.position.set(Math.cos(angle)*radius, py, Math.sin(angle)*radius);
        p.lookAt(0, 35, 0);
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Eventos
window.addEventListener("click", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    if(raycaster.intersectObject(heartMesh).length > 0) document.getElementById('modalClave').classList.add('activo');
});

let music;
document.getElementById("musicBtn").onclick = () => {
    if(!music) { music = new Audio("music.mp3"); music.loop = true; }
    music.play();
};
</script>
</body>
</html>
