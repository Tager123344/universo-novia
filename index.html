<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ffffff;
text-shadow:0 0 25px #ffffff;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#ff3ca6;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff3ca6;
}

#mensaje{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.92);
padding:30px;
border-radius:20px;
color:white;
font-size:22px;
display:none;
box-shadow:0 0 40px #ff2e8b;
text-align:center;
max-width:500px;
}

#frase{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
color:white;
text-shadow:0 0 25px white;
opacity:0;
transition:1s;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff2e8b;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>
<button id="musicBtn">🎵 Activar música</button>

<div id="mensaje">
<div id="mensajeContenido"></div>
<br>
<button id="cerrar">Cerrar</button>
</div>

<div id="frase"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)



// LUZ

const light=new THREE.PointLight(0xffffff,1.5)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// CORAZON CENTRAL

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1.5
})

const heartMesh=new THREE.Points(heartGeo,heartMat)
heartMesh.position.y=35
scene.add(heartMesh)



// FRASES

const frases=[
"Mi gordita hermosa",
"Mi caprichosita",
"Mi bebita",
"Mi tiquitita",
"Eres mi universo",
"Siempre tú",
"Contigo todo es más bonito",
"Eres mi estrella favorita",
"Te amo infinitamente"
]

function mostrarFrase(){

const frase=frases[Math.floor(Math.random()*frases.length)]

const div=document.getElementById("frase")

div.innerHTML=frase
div.style.opacity=1

setTimeout(()=>{

div.style.opacity=0

},6000)

}

setInterval(mostrarFrase,9000)



// FRASES EN UNIVERSO

function crearTexto(frase){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=128

ctx.fillStyle="#ffffff"
ctx.shadowColor="#ffffff"
ctx.shadowBlur=20

ctx.font="40px Arial"
ctx.textAlign="center"
ctx.fillText(frase,256,64)

const texture=new THREE.CanvasTexture(canvas)

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true,
opacity:0.5
})

const sprite=new THREE.Sprite(material)

sprite.position.set(
(Math.random()-0.5)*800,
(Math.random()-0.5)*400,
(Math.random()-0.5)*800
)

sprite.scale.set(60,15,1)

scene.add(sprite)

}

for(let i=0;i<200;i++){
crearTexto(frases[Math.floor(Math.random()*frases.length)])
}



// CORAZONES FLOTANTES

const floatingHearts=[]

function crearCorazonesUniverso(){

for(let i=0;i<1200;i++){

const geo=new THREE.SphereGeometry(0.8,6,6)

const mat=new THREE.MeshBasicMaterial({
color:0xff4fa3
})

const heart=new THREE.Mesh(geo,mat)

heart.position.set(
(Math.random()-0.5)*800,
(Math.random()-0.5)*400,
(Math.random()-0.5)*800
)

scene.add(heart)
floatingHearts.push(heart)

}

}



// EXPLOSION

const explosions=[]

function explosion(pos){

const particles=[]

for(let i=0;i<30;i++){

const geo=new THREE.SphereGeometry(0.2,4,4)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const p=new THREE.Mesh(geo,mat)

p.position.copy(pos)

p.velocity=new THREE.Vector3(
(Math.random()-0.5)*2,
(Math.random()-0.5)*2,
(Math.random()-0.5)*2
)

scene.add(p)

particles.push(p)

}

explosions.push(particles)

}



// CLICK

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(floatingHearts)

if(intersects.length>0){

const obj=intersects[0].object

explosion(obj.position)

scene.remove(obj)

}

})



// MUSICA

let music

document.getElementById("musicBtn").onclick=()=>{

if(!music){

music=new Audio("music.mp3")
music.loop=true
music.volume=0.7

crearCorazonesUniverso()

}

music.play()

}



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0006

const pulse=1+Math.sin(Date.now()*0.003)*0.08
heartMesh.scale.set(pulse,pulse,pulse)

floatingHearts.forEach(h=>{

h.position.y+=0.03

if(h.position.y>200){
h.position.y=-200
}

})

explosions.forEach(group=>{

group.forEach(p=>{

p.position.add(p.velocity)

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
