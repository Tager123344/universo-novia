<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Para Natasha 💖</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#mensaje{position:absolute;top:20px;width:100%;text-align:center;font-size:40px;color:#ff6fae;text-shadow:0 0 25px #ff6fae;}
#btn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;border:none;border-radius:25px;background:#ff2e8b;color:white;font-size:18px;cursor:pointer;box-shadow:0 0 20px #ff2e8b;}
</style>
</head>
<body>
<div id="mensaje">💖 Nuestro Universo - Para mi Natasha 💖</div>
<button id="btn">💌 Mensaje secreto</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Fondo estrellas lejanas
const bgStarsGeo = new THREE.BufferGeometry();
const bgVertices = [];
const bgCount = 9000; // un poquito más para profundidad
for (let i = 0; i < bgCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1800 + Math.random() * 1400;
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);
    bgVertices.push(x, y, z);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));
const bgMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.1, sizeAttenuation: true, transparent: true, opacity: 0.65});
scene.add(new THREE.Points(bgStarsGeo, bgMat));

// Galaxia limpia
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for (let i = 0; i < 15000; i++) {
    const r = Math.random() * 220;
    const spin = r * 0.4;
    const angle = Math.random() * Math.PI * 2;
    vertices.push(Math.cos(angle + spin) * r, (Math.random() - 0.5) * 20, Math.sin(angle + spin) * r);
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const galaxyMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.4, sizeAttenuation: true, transparent: true, opacity: 0.9});
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// Corazón central
const heartGeo = new THREE.BufferGeometry();
const heart = [];
for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heart.push(x * 0.8, y * 0.8, (Math.random() - 0.5) * 2);
}
heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heart, 3));
const heartMat = new THREE.PointsMaterial({color: 0xff3377, size: 1});
const heartMesh = new THREE.Points(heartGeo, heartMat);
scene.add(heartMesh);

// ★ Más planetas variados y bonitos ★
const planets = [];

function createPlanet(size, color, emissive, posX, posY, posZ, hasRing = false, ringColor, ringInner, ringOuter, ringTilt, hasMoon = false) {
    const geo = new THREE.SphereGeometry(size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: emissive,
        emissiveIntensity: 0.35,
        metalness: 0.15,
        roughness: 0.65
    });
    const planet = new THREE.Mesh(geo, mat);
    planet.position.set(posX, posY, posZ);
    scene.add(planet);
    planets.push(planet);

    if (hasRing) {
        const ringGeo = new THREE.RingGeometry(ringInner, ringOuter, 64);
        const ringMat = new THREE.MeshBasicMaterial({color: ringColor, side: THREE.DoubleSide, transparent: true, opacity: 0.7});
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = ringTilt;
        planet.add(ring);
    }

    if (hasMoon) {
        const moonGeo = new THREE.SphereGeometry(size * 0.25, 16, 16);
        const moonMat = new THREE.MeshStandardMaterial({color: 0xeeeeee, emissive: 0xdddddd, emissiveIntensity: 0.2});
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.position.set(size * 1.4, 0, 0);
        planet.add(moon);
        // Luna orbitará en animate
        moon.userData = {parent: planet, angle: 0, speed: 0.003};
        planets.push(moon); // para animar
    }

    return planet;
}

// Planetas nuevos y variados
createPlanet(4.2, 0xffb6c1, 0xff69b4,  80,  30,  40, true,  0xffdab9, 6, 10, Math.PI/3.2);   // rosa con anillo dorado
createPlanet(5.5, 0xd8bfd8, 0xc71585, -110, 40, -60, true,  0xe6e6fa, 8, 13, Math.PI/2.5);   // lila con anillo claro
createPlanet(3.8, 0xadd8e6, 0x87cefa,  50,  70, -90, false, null, null, null, null, true);   // azul bebé con luna
createPlanet(6.0, 0xffdab9, 0xffa07a, -70, -30, -150, true,  0xffe4c4, 9, 15, Math.PI/2);    // melocotón con anillo
createPlanet(4.8, 0xff69b4, 0xff1493,  20, -10, -200, false, null, null, null, null);        // rosa intenso sin anillo
createPlanet(5.0, 0xe0ffff, 0xb0e0e6, -40,  60,  80,  false, null, null, null, null, true);  // celeste con luna
createPlanet(4.0, 0xffc0cb, 0xff69b4,  100, -50, -50, true,  0xffffff, 5.5, 9, Math.PI/4);  // rosa claro con anillo blanco brillante

// Fotos
const loader = new THREE.TextureLoader();
const photoFiles = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];
const photos = [];
function photo(angle, file){
    const tex = loader.load(file);
    const geo = new THREE.PlaneGeometry(14,14);
    const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = Math.cos(angle)*35;
    mesh.position.z = Math.sin(angle)*35;
    mesh.userData = {angle:angle, radius:35};
    scene.add(mesh);
    photos.push(mesh);
}
for(let i=0;i<5;i++) photo(i*Math.PI*2/5, photoFiles[i]);

// Frases con emojis personalizados según el significado
const frases = [
    "Mi princesa hermosa 👑💗",
    "Mi niña preciosa 😍✨",
    "Mi amor eterno ♾️❤️",
    "Te amo muchísimo 😘💕",
    "Eres mi felicidad 🌸🥰",
    "Eres mi universo 🌌💖",
    "Mi amorcito lindo 🥺💞",
    "Siempre contigo 🤝❤️",
    "Eres mi todo 🌹💑",
    "Mi corazón es tuyo 💘🔒"
];

for(let i=0;i<450;i++){  // un poquito más de frases
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width=512; canvas.height=256;
    ctx.fillStyle="white"; ctx.font="bold 38px Arial"; ctx.textAlign="center";
    const text = frases[Math.floor(Math.random()*frases.length)];
    ctx.fillText(text,256,140);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({map:tex, transparent:true});
    const sprite = new THREE.Sprite(mat);
    const angle = Math.random()*Math.PI*2;
    const radius = 90 + Math.random()*140;
    sprite.position.x = Math.cos(angle)*radius;
    sprite.position.z = Math.sin(angle)*radius;
    sprite.position.y = (Math.random()-0.5)*90;
    sprite.scale.set(16,7,1);
    scene.add(sprite);
}

// Estrellas twinkling
const stars = [];
const totalStars = 3000;
for(let i=0;i<totalStars;i++){
    let x = (Math.random()-0.5)*700;
    let y = (Math.random()-0.5)*350;
    let z = (Math.random()-0.5)*700;
    const radius = Math.sqrt(x*x + y*y + z*z);
    if(radius < 100 && Math.random() < 0.2) continue;
    const geo = new THREE.SphereGeometry(0.02,6,6);
    const mat = new THREE.MeshBasicMaterial({color:0xffffff});
    const star = new THREE.Mesh(geo, mat);
    star.position.set(x,y,z);
    star.userData.blink = Math.random()*2;
    scene.add(star);
    stars.push(star);
}

// Estrella fugaz
function shootingStar(){
    const geo = new THREE.SphereGeometry(0.03,8,8);
    const mat = new THREE.MeshBasicMaterial({color:0xffffff});
    const star = new THREE.Mesh(geo, mat);
    star.position.set(-700,Math.random()*250,-250);
    scene.add(star);
    const speed = 10;
    function move(){
        star.position.x += speed;
        star.position.y -= speed*0.35;
        if(star.position.x<700) requestAnimationFrame(move);
        else scene.remove(star);
    }
    move();
}
setInterval(shootingStar, 1800);

// Mensaje secreto
document.getElementById("btn").onclick = ()=>{
    alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo, Natasha ❤️🌟");
};

// Luces
scene.add(new THREE.PointLight(0xffffff, 2.2, 600).setPosition(60,60,60));
scene.add(new THREE.AmbientLight(0x404040, 0.7));

// Animación
function animate(){
    requestAnimationFrame(animate);
    galaxy.rotation.y += 0.0006;
    heartMesh.rotation.y += 0.003;

    photos.forEach(p=>{
        p.userData.angle += 0.002;
        p.position.x = Math.cos(p.userData.angle)*p.userData.radius;
        p.position.z = Math.sin(p.userData.angle)*p.userData.radius;
    });

    stars.forEach(s=>{
        s.material.opacity = 0.5 + Math.sin(Date.now()*0.003 + s.userData.blink)*0.5;
    });

    // Animación planetas y lunas
    planets.forEach(p => {
        if (p.userData.parent) { // lunas
            p.userData.angle += p.userData.speed;
            p.position.x = p.userData.parent.position.x + Math.cos(p.userData.angle) * (p.userData.parent.geometry.parameters.radius * 1.4);
            p.position.z = p.userData.parent.position.z + Math.sin(p.userData.angle) * (p.userData.parent.geometry.parameters.radius * 1.4);
        }
        p.rotation.y += 0.0009;
        const pulse = 1 + Math.sin(Date.now() * 0.0007) * 0.015;
        p.scale.set(pulse, pulse, pulse);
    });

    controls.update();
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
