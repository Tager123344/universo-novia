<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Efecto de Corazones</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            overflow: hidden; /* Evita el scroll por los corazones */
            height: 100vh;
        }

        /* Contenedor del corazón principal (Menos volumen, más plano) */
        .corazon-flat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 90px;
            background-color: #ff4d4d;
            clip-path: path('M50 85c-20-15-45-30-45-55 0-15 11-25 25-25 10 0 17 5 20 12 3-7 10-12 20-12 14 0 25 10 25 25 0 25-25 40-45 55z');
            box-shadow: none; /* Quitamos sombras pesadas para evitar el volumen */
            animation: latido 1.5s infinite ease-in-out;
        }

        /* Animación de latido suave */
        @keyframes latido {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Corazones pequeños (Efecto lluvia/flotante) */
        .particula {
            position: absolute;
            background-color: rgba(255, 77, 77, 0.7);
            clip-path: path('M50 85c-20-15-45-30-45-55 0-15 11-25 25-25 10 0 17 5 20 12 3-7 10-12 20-12 14 0 25 10 25 25 0 25-25 40-45 55z');
            pointer-events: none;
        }

        /* Animación para que caigan y floten */
        @keyframes caer {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="corazon-flat"></div>

    <script>
        function crearCorazon() {
            const corazon = document.createElement('div');
            corazon.classList.add('particula');
            
            // Tamaño aleatorio pequeño para que se vean planos
            const size = Math.random() * 15 + 10 + 'px';
            corazon.style.width = size;
            corazon.style.height = size;

            // Posición horizontal aleatoria
            corazon.style.left = Math.random() * 100 + 'vw';
            
            // Duración aleatoria para que no caigan todos igual
            const duracion = Math.random() * 3 + 4 + 's';
            corazon.style.animation = `caer ${duracion} linear forwards`;

            document.body.appendChild(corazon);

            // Borrar el elemento después de que termine la animación
            setTimeout(() => {
                corazon.remove();
            }, 6000);
        }

        // Crear corazones constantemente
        setInterval(crearCorazon, 300);
    </script>
</body>
</html>
