<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Arial', sans-serif; }
    #titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; color: #ff7ab6; text-shadow: 0 0 20px #ff7ab6; z-index: 10; pointer-events: none; }
    
    #musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border: none; border-radius: 30px; background: #aa44ff; color: white; font-size: 20px; cursor: pointer; box-shadow: 0 0 25px #aa44ff; z-index: 100; transition: 0.5s; }
    #musicBtn:hover { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 40px #ff77aa; background: #ff77aa; }

    #frase { position: absolute; bottom: 130px; width: 100%; text-align: center; font-size: 26px; color: white; text-shadow: 0 0 20px white; opacity: 0; transition: 1.5s; z-index: 10; }

    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #ff77aa; border: 2px solid #ff77aa; max-width: 450px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; font-size: 18px; outline: none; }
    .btn-modal { padding: 12px 25px; border: none; border-radius: 20px; background: #ff77aa; color: white; cursor: pointer; font-size: 16px; margin: 10px; transition: 0.3s; }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p><strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
        Tú eres mi universo, mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
        <strong>¡Te amo infinitamente! 💕</strong></p>
        <button class="btn-modal" onclick="cerrarModales()">💕 Te amo 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
let despierto = false;
let nivelFade = 0; 

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
// Alejar un poco la cámara inicial para abarcar más fotos
camera.position.set(0, 0, 1200); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// LUCES
const ambLight = new THREE.AmbientLight(0xffffff, 0.1);
scene.add(ambLight);
const pLight = new THREE.PointLight(0xff77aa, 1.2);
pLight.position.set(0, 50, 100);
scene.add(pLight);

const frases = [
    "💖 Mi amor", "🥰 Eres mi todo", "💘 Natasha", "✨ Mi vida", 
    "💍 Siempre tú", "🧸 Mi bebita", "👑 Mi reina", "🌹 Te amo", 
    "🌙 Mi luna", "🌸 Mi gordita", "🎀 Mi caprichosita", "👑 Mi princesita", 
    "✨ Mi niña hermosa", "🍭 Mi tiquitita", "🦋 Mi pulguita", 
    "💖 Tu mi tiquitita", "💎 Mi tesorito"
];

const starGeo = new THREE.BufferGeometry();
const starPos = [];
// Aumentar el área de estrellas
for(let i=0; i<20000; i++) {
    starPos.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1200, (Math.random()-0.5)*1500);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.9, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
// Aumentar cubos
for(let i=0; i<1000; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), cubeMat.clone());
    c.position.set((Math.random()-0.5)*1200, (Math.random()-0.5)*900, (Math.random()-0.5)*1200);
    scene.add(c);
    cubes.push(c);
}

const heartPoints = [];
for (let i = 0; i < 3500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heartPoints.push(x * 2, y * 2 + 20, (Math.random() - 0.5) * 8);
}
const heartMat = new THREE.PointsMaterial({ color: 0x330011, size: 2.5, transparent: true, opacity: 0.8 });
const heart = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3)), heartMat);
scene.add(heart);

const sprites = [];
function crearSprite(texto) {
    const canvas = document.createElement("canvas"); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "#ff77aa"; ctx.shadowBlur = 8;
    ctx.fillText(texto, 128, 32);
    const sMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 });
    const s = new THREE.Sprite(sMat);
    // Esparcir más las frases
    s.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*800, (Math.random()-0.5)*1000);
    s.scale.set(70, 18, 1);
    scene.add(s);
    sprites.push(s);
}
for(let i=0; i<300; i++) crearSprite(frases[i % frases.length]);

// --- SECCIÓN DE FOTOS ACTUALIZADA PARA 51 FOTOS ---
const photos = [];
const loader = new THREE.TextureLoader();

// Geometría del marco (mismo tamaño 25x25)
const fShape = new THREE.Shape();
fShape.moveTo(-13.5,-13.5); fShape.lineTo(13.5,-13.5); fShape.lineTo(13.5,13.5); fShape.lineTo(-13.5,13.5);
const hole = new THREE.Path(); hole.moveTo(-12.5,-12.5); hole.lineTo(12.5,-12.5); hole.lineTo(12.5,12.5); hole.lineTo(-12.5,12.5);
fShape.holes.push(hole);
const fGeo = new THREE.ShapeGeometry(fShape);
const frMat = new THREE.MeshBasicMaterial({ color: 0xff7ab6, side: THREE.DoubleSide, transparent: true, opacity: 0 });

const totalFotos = 51;
// Distribuir fotos en 3 anillos para que se vea bien
const fotosPorAnillo = 17; 

for(let i=1; i<=totalFotos; i++) {
    const group = new THREE.Group();
    // Carga foto desde foto1.jpg hasta foto51.jpg
    const pMat = new THREE.MeshBasicMaterial({ map: loader.load(`foto${i}.jpg`), side: THREE.DoubleSide, transparent: true, opacity: 0 });
    
    group.add(new THREE.Mesh(new THREE.PlaneGeometry(25, 25), pMat)); 
    group.add(new THREE.Mesh(fGeo, frMat)); 
    
    // Lógica de distribución en 3 anillos (orbitales)
    let anillo, radius, yPos;
    
    if (i <= 17) {
        anillo = 0; radius = 160; yPos = 80; // Anillo superior/interno
    } else if (i <= 34) {
        anillo = 1; radius = 230; yPos = 0;  // Anillo central
    } else {
        anillo = 2; radius = 300; yPos = -80; // Anillo inferior/externo
    }
    
    // Calcular ángulo basado en el número de fotos por anillo
    const indiceEnAnillo = (i - 1) % fotosPorAnillo;
    const angle = indiceEnAnillo * (Math.PI * 2 / fotosPorAnillo);
    
    // Añadir una pequeña variación aleatoria en Y para un look más orgánico
    const variacionY = (Math.random() - 0.5) * 20;

    group.position.set(
        Math.cos(angle) * radius, 
        yPos + variacionY, 
        Math.sin(angle) * radius
    );
    
    scene.add(group);
    photos.push(group);
}
// ----------------------------------------------------

function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta..."); }
}
function cerrarModales() {
    document.getElementById('modalClave').classList.remove('activo');
    document.getElementById('mensajeSecreto').classList.remove('activo');
}

let audio;
document.getElementById("musicBtn").onclick = function() {
    if(!audio) { audio = new Audio("music.mp3"); audio.loop = true; }
    audio.play();
    this.style.opacity = "0";
    setTimeout(() => this.style.display = "none", 500);
    despierto = true;
};

function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    if(despierto) {
        camera.position.x += (Math.sin(t * 0.4) * 0.4);
        camera.position.y += (Math.cos(t * 0.3) * 0.4);
        // Ajustar el zoom final para acomodar más fotos
        if(camera.position.z > 450) camera.position.z -= 2;

        if(nivelFade < 1) {
            nivelFade += 0.005;
            starsMat.opacity = nivelFade * 0.8;
            heartMat.color.set(0xff3377);
            ambLight.intensity = 0.1 + (nivelFade * 0.5);
            pLight.intensity = 1 + (nivelFade * 2);
            frMat.opacity = nivelFade;
            photos.forEach(p => p.children[0].material.opacity = nivelFade);
            sprites.forEach(s => s.material.opacity = nivelFade * 0.5);
            cubes.forEach(c => c.material.opacity = nivelFade * 0.6);
        }

        heart.rotation.y += 0.005;
        heart.scale.setScalar(1 + Math.sin(t * 4) * 0.15);
        stars.rotation.y += 0.0003;
        cubes.forEach((c, i) => {
            c.scale.setScalar(1 + Math.sin(t * 2 + i) * 0.3);
            c.rotation.x += 0.01;
        });
        photos.forEach((p, i) => {
            p.lookAt(camera.position);
            // Flotación sutil individual
            p.position.y += Math.sin(t + i) * 0.08; 
        });
    } else {
        heart.scale.setScalar(1 + Math.sin(t * 1.5) * 0.05);
    }
    controls.update();
    renderer.render(scene, camera);
}
animate();

const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click", (e) => {
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    if(despierto) {
        ray.setFromCamera(mouse, camera);
        if(ray.intersectObject(heart).length > 0) {
            document.getElementById('modalClave').classList.add('activo');
        }
    }
});

setInterval(() => {
    if(despierto && nivelFade > 0.8) {
        const d = document.getElementById("frase");
        d.innerHTML = frases[Math.floor(Math.random()*frases.length)];
        d.style.opacity = 1;
        setTimeout(() => d.style.opacity = 0, 4000);
    }
}, 7000);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
