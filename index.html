<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>
body{ margin:0; overflow:hidden; background:black; font-family:Arial; }
#titulo{ position:absolute; top:20px; width:100%; text-align:center; font-size:36px; color:#ff7ab6; text-shadow:0 0 25px #ff7ab6; z-index:10; }
#musicBtn{ position:absolute; bottom:40px; left:50%; transform:translateX(-50%); padding:14px 28px; border:none; border-radius:25px; background:#aa44ff; color:white; font-size:18px; cursor:pointer; box-shadow:0 0 20px #aa44ff; z-index:10; }
#frase{ position:absolute; bottom:120px; width:100%; text-align:center; font-size:28px; color:white; text-shadow:0 0 25px white; opacity:0; transition:1s; z-index:10; }

#modalClave, #mensajeSecreto {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
}
#modalClave.activo, #mensajeSecreto.activo { display: flex; }
.modal-contenido {
    background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 20px;
    text-align: center; box-shadow: 0 0 50px #ff77aa; border: 2px solid #ff77aa; max-width: 400px; color: white;
}
input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; }
button { padding: 12px 30px; border: none; border-radius: 25px; background: #ff77aa; color: white; cursor: pointer; transition: 0.3s; }
button:hover { transform: scale(1.1); }
</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>
<button id="musicBtn">🎵 Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Ingresa la clave secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="••••••••">
        <br>
        <button onclick="verificarClave()">💖 Desbloquear</button>
        <button onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>Mi Natasha Hermosa</h1>
        <p>Eres la luz que ilumina cada día de mi vida ✨<br>Te amo hoy, mañana y siempre 💕</p>
        <button onclick="cerrarMensaje()">Cerrar con amor</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
camera.position.z = 250;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const light = new THREE.PointLight(0xffffff, 1.6);
light.position.set(50,50,50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// --- EFECTOS (MANTENIDOS TODOS) ---

// GALAXIA
const galaxyGeo = new THREE.BufferGeometry();
const vertices = [];
for(let i=0; i<15000; i++){
    const r = Math.random()*400;
    const spin = r*0.4;
    const angle = Math.random()*Math.PI*2;
    vertices.push(Math.cos(angle+spin)*r, (Math.random()-0.5)*30, Math.sin(angle+spin)*r);
}
galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const galaxy = new THREE.Points(galaxyGeo, new THREE.PointsMaterial({color:0xffffff, size:0.7}));
scene.add(galaxy);

// CUADROS ROSA
for(let i=0; i<1200; i++){
    const size = Math.random()*2+0.5;
    const cube = new THREE.Mesh(new THREE.BoxGeometry(size,size,size), new THREE.MeshBasicMaterial({color:0xff77aa, transparent:true, opacity:0.7}));
    cube.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*600, (Math.random()-0.5)*1000);
    scene.add(cube);
}

// PARTÍCULAS BRILLANTES
const sparkleGeo = new THREE.BufferGeometry();
const sparklePos = [];
for(let i=0; i<3000; i++) sparklePos.push((Math.random()-0.5)*800, (Math.random()-0.5)*500, (Math.random()-0.5)*800);
sparkleGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparklePos, 3));
const sparkles = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({size:1.2, color:0xffffff, transparent:true, opacity:0.8}));
scene.add(sparkles);

// LLUVIA DE CORAZONES
const fallingHearts = [];
function createHeartShape(){
    const s = new THREE.Shape();
    s.moveTo(0, 0.5); s.bezierCurveTo(0, 0.5, -0.5, 0, -0.5, 0);
    s.bezierCurveTo(-0.5, -0.35, 0, -0.6, 0, -0.8);
    s.bezierCurveTo(0, -0.6, 0.5, -0.35, 0.5, 0);
    s.bezierCurveTo(0.5, 0, 0, 0.5, 0, 0.5);
    return s;
}
function spawnFallingHeart(){
    const heart = new THREE.Mesh(new THREE.ShapeGeometry(createHeartShape()), new THREE.MeshBasicMaterial({color:0xff3366, transparent:true, opacity:0.8, side:THREE.DoubleSide}));
    const scale = Math.random()*3+1; heart.scale.set(scale, scale, scale);
    heart.position.set((Math.random()-0.5)*400, 300, (Math.random()-0.5)*400);
    heart.userData = { speedY: Math.random()*0.5+0.3 };
    scene.add(heart); fallingHearts.push(heart);
}
setInterval(spawnFallingHeart, 200);

// CORAZÓN CENTRAL
const heartPoints = [];
for(let i=0; i<2000; i++){
    const t = Math.random()*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t), 3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    heartPoints.push(x*1.2, y*1.2 + 35, (Math.random()-0.5)*2);
}
const heartMesh = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3)), new THREE.PointsMaterial({color:0xff3377, size:1.8}));
scene.add(heartMesh);

// FRASES FLOTANTES
const frases = ["💖 Mi gordita", "💗 Mi amor", "🥰 Mi tiquitita", "💘 Eres mi universo", "🌹 Mi vida", "✨ Mi estrella"];
function crearTextoEspacial(texto){
    const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d");
    canvas.width = 512; canvas.height = 128;
    ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "white"; ctx.shadowBlur = 15; ctx.fillText(texto, 256, 64);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas), transparent:true, opacity:0.5}));
    sprite.position.set((Math.random()-0.5)*800, (Math.random()-0.5)*600, (Math.random()-0.5)*800);
    sprite.scale.set(60, 15, 1); scene.add(sprite);
}
for(let i=0; i<30; i++) crearTextoEspacial(frases[Math.floor(Math.random()*frases.length)]);

// --- FOTOS DISPERSAS CON MARCO DOBLE (FRONT/BACK) ---

const photos = [];
const loader = new THREE.TextureLoader();

// Geometría del marco con hueco (para que no tape la foto)
const frameShape = new THREE.Shape();
frameShape.moveTo(-9, -9); frameShape.lineTo(9, -9); frameShape.lineTo(9, 9); frameShape.lineTo(-9, 9);
const hole = new THREE.Path();
hole.moveTo(-8, -8); hole.lineTo(8, -8); hole.lineTo(8, 8); hole.lineTo(-8, 8);
frameShape.holes.push(hole);
const frameGeo = new THREE.ShapeGeometry(frameShape);
const frameMat = new THREE.MeshBasicMaterial({color: 0xff7ab6, side: THREE.DoubleSide, transparent: true, opacity: 0.9});

for(let i=1; i<=28; i++){
    const group = new THREE.Group();
    
    // Foto
    const tex = loader.load("foto"+i+".jpg");
    const photoMesh = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshBasicMaterial({map:tex, side: THREE.DoubleSide}));
    
    // Marco (DoubleSide lo hace visible adelante y atrás)
    const frameMesh = new THREE.Mesh(frameGeo, frameMat);
    
    group.add(photoMesh);
    group.add(frameMesh);
    
    // Posición Dispersa Aleatoria
    group.position.set(
        (Math.random() - 0.5) * 600,
        (Math.random() - 0.5) * 400,
        (Math.random() - 0.5) * 600
    );
    
    scene.add(group);
    photos.push(group);
}

// LÓGICA MODALES
function abrirModal() { document.getElementById('modalClave').classList.add('activo'); }
function cerrarModal() { document.getElementById('modalClave').classList.remove('activo'); }
function cerrarMensaje() { document.getElementById('mensajeSecreto').classList.remove('activo'); }
function verificarClave() {
    if (document.getElementById('inputClave').value === CLAVE_SECRETA) {
        cerrarModal(); document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta"); }
}

// INTERACCIÓN MOUSE
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click", (e) => {
    mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    if(raycaster.intersectObject(heartMesh).length > 0) abrirModal();
});

let music;
document.getElementById("musicBtn").onclick = () => {
    if(!music) { music = new Audio("music.mp3"); music.loop = true; }
    music.play();
    document.getElementById("musicBtn").style.display = "none";
};

// ANIMACIÓN
function animate(){
    requestAnimationFrame(animate);
    galaxy.rotation.y += 0.0005;
    heartMesh.rotation.y += 0.002;
    heartMesh.scale.setScalar(1 + Math.sin(Date.now()*0.003)*0.1);

    // Lluvia corazones
    fallingHearts.forEach((h, idx) => {
        h.position.y -= h.userData.speedY;
        if(h.position.y < -300) h.position.y = 300;
    });

    // Fotos: Orientación a la cámara y flotación suave
    photos.forEach((p, i) => {
        p.lookAt(camera.position); // Siempre te miran
        p.position.y += Math.sin(Date.now()*0.001 + i)*0.05; // Flotan
    });

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
