<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle,#050010,#000000);
font-family:sans-serif;
color:white;
}

#titulo{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:40px;
color:#ff77aa;
text-shadow:0 0 20px #ff77aa;
}

</style>

</head>

<body>

<div id="titulo">💖 Eres mi universo 💖</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.z=25

// estrellas

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<10000;i++){

starVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars=new THREE.Points(starGeo,starMat)
scene.add(stars)

// luz

const light=new THREE.PointLight(0xffffff,2)
light.position.set(20,20,20)
scene.add(light)

// planeta central brillante

const centerGeo=new THREE.SphereGeometry(4,64,64)
const centerMat=new THREE.MeshStandardMaterial({
color:0xff2a8b,
emissive:0xff2a8b,
emissiveIntensity:1
})

const center=new THREE.Mesh(centerGeo,centerMat)
scene.add(center)

// cargar fotos

const loader=new THREE.TextureLoader()

const planets=[]

function createPhotoPlanet(radius,image){

const texture=loader.load(image)

const geo=new THREE.SphereGeometry(1.5,32,32)

const mat=new THREE.MeshBasicMaterial({
map:texture
})

const mesh=new THREE.Mesh(geo,mat)

scene.add(mesh)

planets.push({
mesh,
radius,
angle:Math.random()*Math.PI*2,
speed:0.004
})

}

createPhotoPlanet(10,"foto1.jpg")
createPhotoPlanet(16,"foto2.jpg")

// palabras románticas

const words=[
"Mi princesa",
"Mi niña hermosa",
"Te amo mucho",
"Mi amorcito",
"Mi cachetoncita",
"Mi gordita",
"Mi tesoro"
]

const texts=[]

function createWord(text,radius){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="40px Arial"
ctx.fillText(text,50,120)

const texture=new THREE.CanvasTexture(canvas)

const material=new THREE.SpriteMaterial({map:texture})

const sprite=new THREE.Sprite(material)

sprite.scale.set(6,3,1)

scene.add(sprite)

texts.push({
sprite,
radius,
angle:Math.random()*Math.PI*2,
speed:0.002
})

}

words.forEach((w,i)=>{
createWord(w,20+i*2)
})

// zoom con rueda del mouse

document.addEventListener("wheel",e=>{

camera.position.z+=e.deltaY*0.01

})

// animación

function animate(){

requestAnimationFrame(animate)

center.rotation.y+=0.01

stars.rotation.y+=0.0003

planets.forEach(p=>{

p.angle+=p.speed

p.mesh.position.x=Math.cos(p.angle)*p.radius
p.mesh.position.z=Math.sin(p.angle)*p.radius

})

texts.forEach(t=>{

t.angle+=t.speed

t.sprite.position.x=Math.cos(t.angle)*t.radius
t.sprite.position.z=Math.sin(t.angle)*t.radius

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
