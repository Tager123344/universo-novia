```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universo de Natasha</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:40px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
color:white;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
text-align:center;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff2e8b;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="titulo">💖 Nuestro Universo 💖</div>

<div id="login">

<h2>🔐 Fecha especial</h2>

<input id="clave" placeholder="30/10/2025">

<button onclick="verificar()">Entrar</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=80

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// LUZ

const light=new THREE.PointLight(0xffffff,1.6)
light.position.set(50,50,50)
scene.add(light)



// CORAZON RELLENO BONITO

const heartShape=new THREE.Shape()

heartShape.moveTo(0,5)

heartShape.bezierCurveTo(0,5,-5,0,-10,5)
heartShape.bezierCurveTo(-15,10,-10,18,0,22)
heartShape.bezierCurveTo(10,18,15,10,10,5)
heartShape.bezierCurveTo(5,0,0,5,0,5)

const heartGeo=new THREE.ExtrudeGeometry(
heartShape,
{depth:2,bevelEnabled:true,bevelSize:0.5}
)

const heartMat=new THREE.MeshStandardMaterial({
color:0xff3377,
emissive:0xff3377,
emissiveIntensity:0.5
})

const heart=new THREE.Mesh(heartGeo,heartMat)

heart.scale.set(1.3,1.3,1.3)

scene.add(heart)



// CLICK EN CORAZON PARA CLAVE

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObject(heart)

if(hit.length>0){

document.getElementById("login").style.display="flex"

}

})



function verificar(){

if(document.getElementById("clave").value==="30/10/2025"){

document.getElementById("login").style.display="none"

}else{

alert("Fecha incorrecta ❤️")

}

}



// PLANETAS

function planeta(a,c){

const geo=new THREE.SphereGeometry(4,64,64)

const mat=new THREE.MeshStandardMaterial({
color:c,
emissive:c,
emissiveIntensity:0.4
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(a)*60
mesh.position.z=Math.sin(a)*60

scene.add(mesh)

}

planeta(0,0x44aaff)
planeta(Math.PI/3,0xff77aa)
planeta(Math.PI*2/3,0xffcc33)
planeta(Math.PI,0xaa66ff)
planeta(Math.PI*4/3,0x33ffaa)
planeta(Math.PI*5/3,0xff8844)



// FOTOS

const loader=new THREE.TextureLoader()

const photos=[]

function foto(a,i){

const tex=loader.load("foto"+i+".jpg")

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=Math.cos(a)*35
mesh.position.z=Math.sin(a)*35

scene.add(mesh)

photos.push(mesh)

}

for(let i=1;i<=5;i++){

foto(i*Math.PI*2/5,i)

}



// FRASES

const frases=[

"Mi princesa Natasha",
"Te amo muchísimo",
"Eres mi universo",
"Mi amor eterno",
"Eres mi felicidad",
"Mi tesoro",
"Siempre contigo",
"Eres mi todo"

]

for(let i=0;i<250;i++){

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="34px Arial"
ctx.textAlign="center"

const text=frases[Math.floor(Math.random()*frases.length)]

ctx.fillText(text,256,130)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

const angle=Math.random()*Math.PI*2
const radius=90+Math.random()*30

sprite.position.x=Math.cos(angle)*radius
sprite.position.z=Math.sin(angle)*radius
sprite.position.y=(Math.random()-0.5)*50

sprite.scale.set(14,6,1)

scene.add(sprite)

}



// ESTRELLAS (SOLO CERCA FRASES Y POCAS)

for(let i=0;i<200;i++){

const geo=new THREE.SphereGeometry(0.03,6,6)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

const angle=Math.random()*Math.PI*2
const radius=95+Math.random()*30

star.position.x=Math.cos(angle)*radius
star.position.z=Math.sin(angle)*radius
star.position.y=(Math.random()-0.5)*60

scene.add(star)

}



// ESTRELLAS FUGACES

function fugaz(){

const geo=new THREE.SphereGeometry(0.4,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(geo,mat)

star.position.set(-400,Math.random()*200,-200)

scene.add(star)

const speed=8

function move(){

star.position.x+=speed
star.position.y-=speed*0.4

if(star.position.x<400){

requestAnimationFrame(move)

}else{

scene.remove(star)

}

}

move()

}

setInterval(fugaz,2000)



// BRILLO FOTOS

window.addEventListener("mousemove",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObjects(photos)

photos.forEach(p=>p.scale.set(1,1,1))

if(hit.length>0){

hit[0].object.scale.set(1.3,1.3,1.3)

}

})



function animate(){

requestAnimationFrame(animate)

heart.rotation.y+=0.01

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
