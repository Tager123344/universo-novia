<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Arial', sans-serif; }
    #titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; color: #ff7ab6; text-shadow: 0 0 20px #ff7ab6; z-index: 10; pointer-events: none; }
    
    #musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border: none; border-radius: 30px; background: #aa44ff; color: white; font-size: 20px; cursor: pointer; box-shadow: 0 0 25px #aa44ff; z-index: 100; transition: 0.5s; }
    #musicBtn:hover { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 40px #ff77aa; background: #ff77aa; }

    #frase { position: absolute; bottom: 130px; width: 100%; text-align: center; font-size: 26px; color: white; text-shadow: 0 0 20px white; opacity: 0; transition: 1.5s; z-index: 10; }

    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #ff77aa; border: 2px solid #ff77aa; max-width: 450px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; font-size: 18px; outline: none; }
    .btn-modal { padding: 12px 25px; border: none; border-radius: 20px; background: #ff77aa; color: white; cursor: pointer; font-size: 16px; margin: 10px; transition: 0.3s; }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p><strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
        Tú eres mi universo, mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
        <strong style="color: #ff7ab6; font-size: 1.3em;">Te amo mi gordita preciosa ❤️</strong></p>
        <button class="btn-modal" onclick="cerrarModales()">💕 Te amo 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
let despierto = false;
let nivelFade = 0; 

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 1200); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// AUDIOS
let audioBackground;
const clickSound = new Audio("click.mp3");

// LUCES
const ambLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambLight);
const pLight = new THREE.PointLight(0xff77aa, 1.5);
pLight.position.set(0, 100, 200);
scene.add(pLight);

const frases = [
    "💖 Mi amor", "🥰 Eres mi todo", "💘 Natasha", "✨ Mi vida", 
    "💍 Siempre tú", "🧸 Mi bebita", "👑 Mi reina", "🌹 Te amo", 
    "🌙 Mi luna", "🌸 Mi gordita", "🎀 Mi caprichosita", "👑 Mi princesita", 
    "✨ Mi niña hermosa", "🍭 Mi tiquitita", "🦋 Mi pulguita", 
    "💖 Tu mi tiquitita", "💎 Mi tesorito"
];

// 1. ESTRELLAS
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<20000; i++) {
    starPos.push((Math.random()-0.5)*1800, (Math.random()-0.5)*1500, (Math.random()-0.5)*1800);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// 2. CUBOS ROSAS
const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
for(let i=0; i<800; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), cubeMat);
    c.position.set((Math.random()-0.5)*1100, (Math.random()-0.5)*900, (Math.random()-0.5)*1100);
    scene.add(c);
    cubes.push(c);
}

// 3. CORAZÓN 3D
const heartShape = new THREE.Shape();
heartShape.moveTo( 5, 5 );
heartShape.bezierCurveTo( 5, 5, 4, 0, 0, 0 );
heartShape.bezierCurveTo( -6, 0, -6, 7, -6, 7 );
heartShape.bezierCurveTo( -6, 11, -3, 15.4, 5, 19 );
heartShape.bezierCurveTo( 12, 15.4, 16, 11, 16, 7 );
heartShape.bezierCurveTo( 16, 7, 16, 0, 10, 0 );
heartShape.bezierCurveTo( 7, 0, 5, 5, 5, 5 );

const extrudeSettings = { depth: 4, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 1, bevelThickness: 1 };
const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
const heartMat = new THREE.MeshStandardMaterial({ 
    color: 0xff3377, emissive: 0xff0044, emissiveIntensity: 1.5,
    metalness: 0.5, roughness: 0.2, transparent: true, opacity: 0.9
});
const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.rotation.z = Math.PI;
heartMesh.scale.set(4, 4, 4);
heartMesh.position.set(20, 40, 0);
scene.add(heartMesh);

// 4. FRASES FLOTANTES
const sprites = [];
function crearSprite(texto) {
    const canvas = document.createElement("canvas"); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "#ff77aa"; ctx.shadowBlur = 8;
    ctx.fillText(texto, 128, 32);
    const sMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 });
    const s = new THREE.Sprite(sMat);
    s.position.set((Math.random()-0.5)*900, (Math.random()-0.5)*800, (Math.random()-0.5)*900);
    s.scale.set(70, 18, 1);
    scene.add(s);
    sprites.push(s);
}
for(let i=0; i<300; i++) crearSprite(frases[i % frases.length]);

// 5. SISTEMA DE PARTÍCULAS (EXPLOSIÓN)
const particlesGeo = new THREE.BufferGeometry();
const particleCount = 100;
const posArray = new Float32Array(particleCount * 3);
const velArray = new Float32Array(particleCount * 3);
particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particlesGeo, particlesMat);
scene.add(particleSystem);

function explosion(x, y, z) {
    // Reproducir sonido de clic
    clickSound.currentTime = 0;
    clickSound.play();

    particlesMat.opacity = 1;
    const positions = particlesGeo.attributes.position.array;
    for(let i=0; i<particleCount; i++) {
        positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
        velArray[i*3] = (Math.random()-0.5)*4; velArray[i*3+1] = (Math.random()-0.5)*4; velArray[i*3+2] = (Math.random()-0.5)*4;
    }
}

// 6. FOTOS (Actualizado a 55 FOTOS)
const photos = [];
const loader = new THREE.TextureLoader();
const fShape = new THREE.Shape();
fShape.moveTo(-13.5,-13.5); fShape.lineTo(13.5,-13.5); fShape.lineTo(13.5,13.5); fShape.lineTo(-13.5,13.5);
const hole = new THREE.Path(); hole.moveTo(-12.5,-12.5); hole.lineTo(12.5,-12.5); hole.lineTo(12.5,12.5); hole.lineTo(-12.5,12.5);
fShape.holes.push(hole);
const fGeo = new THREE.ShapeGeometry(fShape);
const frMat = new THREE.MeshBasicMaterial({ color: 0xff7ab6, side: THREE.DoubleSide, transparent: true, opacity: 0 });

for(let i=1; i<=55; i++) {
    const group = new THREE.Group();
    const pMat = new THREE.MeshBasicMaterial({ map: loader.load(`foto${i}.jpg`), side: THREE.DoubleSide, transparent: true, opacity: 0 });
    group.add(new THREE.Mesh(new THREE.PlaneGeometry(25, 25), pMat)); 
    group.add(new THREE.Mesh(fGeo, frMat)); 
    
    // Distribución en 3 niveles para 55 fotos
    let ring = i <= 18 ? 0 : (i <= 36 ? 1 : 2);
    let totalInRing = ring === 0 ? 18 : (ring === 1 ? 18 : 19);
    let radius = ring === 0 ? 180 : (ring === 1 ? 260 : 340);
    let yPos = ring === 0 ? 100 : (ring === 1 ? 0 : -100);
    
    let indexInRing = ring === 0 ? i-1 : (ring === 1 ? i-19 : i-37);
    let angle = indexInRing * (Math.PI * 2 / totalInRing);

    group.position.set(Math.cos(angle)*radius, yPos + (Math.random()-0.5)*30, Math.sin(angle)*radius);
    scene.add(group);
    photos.push(group);
}

// LÓGICA DE INTERACCIÓN
document.getElementById("musicBtn").onclick = function() {
    if(!audioBackground) { audioBackground = new Audio("music.mp3"); audioBackground.loop = true; }
    audioBackground.play();
    this.style.opacity = "0";
    setTimeout(() => this.style.display = "none", 500);
    despierto = true;
};

const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (e) => {
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    if(despierto) {
        ray.setFromCamera(mouse, camera);
        
        // Clic en Corazón
        const interHeart = ray.intersectObject(heartMesh);
        if(interHeart.length > 0) document.getElementById('modalClave').classList.add('activo');
        
        // Clic en Fotos
        const interPhotos = ray.intersectObjects(photos, true);
        if(interPhotos.length > 0) {
            const p = interPhotos[0].object.parent.position;
            explosion(p.x, p.y, p.z);
        }
    }
});

function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    if(despierto) {
        // Movimiento de cámara
        camera.position.x += (Math.sin(t * 0.4) * 0.4);
        camera.position.y += (Math.cos(t * 0.3) * 0.4);
        if(camera.position.z > 500) camera.position.z -= 2;

        if(nivelFade < 1) {
            nivelFade += 0.005;
            starsMat.opacity = nivelFade * 0.8;
            frMat.opacity = nivelFade;
            photos.forEach(p => p.children[0].material.opacity = nivelFade);
            sprites.forEach(s => s.material.opacity = nivelFade * 0.5);
            cubeMat.opacity = nivelFade * 0.6;
        }

        // Animación cubitos
        cubes.forEach((c, i) => {
            c.rotation.x += 0.01;
            c.rotation.y += 0.01;
            c.position.y += Math.sin(t + i) * 0.05;
        });

        // Corazón Latido
        heartMesh.rotation.y += 0.01;
        heartMesh.scale.setScalar(4 + Math.sin(t * 4) * 0.2);
        heartMat.emissiveIntensity = 1.5 + Math.sin(t*3)*0.5;

        // Estrellas
        stars.rotation.y += 0.0003;
        
        // Partículas explosión
        if(particlesMat.opacity > 0) {
            const pos = particlesGeo.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                pos[i*3] += velArray[i*3]; pos[i*3+1] += velArray[i*3+1]; pos[i*3+2] += velArray[i*3+2];
            }
            particlesGeo.attributes.position.needsUpdate = true;
            particlesMat.opacity -= 0.015;
        }

        // Fotos mirando a cámara
        photos.forEach((p, i) => {
            p.lookAt(camera.position);
            p.position.y += Math.sin(t + i) * 0.15;
        });
    }

    controls.update();
    renderer.render(scene, camera);
}

function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta..."); }
}
function cerrarModales() {
    document.getElementById('modalClave').classList.remove('activo');
    document.getElementById('mensajeSecreto').classList.remove('activo');
}

animate();

setInterval(() => {
    if(despierto && nivelFade > 0.8) {
        const d = document.getElementById("frase");
        d.innerHTML = frases[Math.floor(Math.random()*frases.length)];
        d.style.opacity = 1;
        setTimeout(() => d.style.opacity = 0, 4000);
    }
}, 7000);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
