<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

#mensaje{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:40px;
color:#ff77aa;
font-weight:bold;
text-shadow:0 0 30px #ff77aa;
}

#sub{
position:absolute;
top:95px;
width:100%;
text-align:center;
font-size:22px;
}

#btn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
background:#ff2a8b;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff2a8b;
}

</style>

</head>

<body>

<div id="mensaje">💖 Eres mi universo 💖</div>
<div id="sub">Todo gira alrededor de ti ✨</div>

<button id="btn">💌 Mensaje secreto</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2f7c9fd5d8.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.z = 20

// estrellas

const starGeometry = new THREE.BufferGeometry()
const starVertices = []

for (let i=0;i<8000;i++){

const x=(Math.random()-0.5)*1500
const y=(Math.random()-0.5)*1500
const z=(Math.random()-0.5)*1500

starVertices.push(x,y,z)

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:1
})

const stars = new THREE.Points(starGeometry,starMaterial)
scene.add(stars)

// luz

const light = new THREE.PointLight(0xffffff,2)
light.position.set(10,10,10)
scene.add(light)

// planeta central

const centerGeometry = new THREE.SphereGeometry(3,64,64)

const centerMaterial = new THREE.MeshStandardMaterial({
color:0xff2a8b,
emissive:0xff2a8b,
emissiveIntensity:0.8
})

const center = new THREE.Mesh(centerGeometry,centerMaterial)

scene.add(center)

// planetas con fotos

const planets=[]

function createPhotoPlanet(radius,image){

const loader=new THREE.TextureLoader()
const texture=loader.load(image)

const geometry=new THREE.SphereGeometry(1.2,32,32)

const material=new THREE.MeshBasicMaterial({
map:texture
})

const mesh=new THREE.Mesh(geometry,material)

scene.add(mesh)

planets.push({
mesh,
radius,
angle:Math.random()*Math.PI*2,
speed:0.003+Math.random()*0.01
})

}

createPhotoPlanet(8,"foto1.jpg")
createPhotoPlanet(12,"foto2.jpg")

// corazones flotando

const hearts=[]

function createHeart(){

const geometry=new THREE.SphereGeometry(0.2,8,8)

const material=new THREE.MeshBasicMaterial({
color:0xff66aa
})

const heart=new THREE.Mesh(geometry,material)

heart.position.x=(Math.random()-0.5)*50
heart.position.y=(Math.random()-0.5)*50
heart.position.z=(Math.random()-0.5)*50

scene.add(heart)

hearts.push(heart)

}

for(let i=0;i<100;i++){
createHeart()
}

// mover con mouse

document.addEventListener("mousemove",e=>{

camera.position.x=(e.clientX/window.innerWidth-0.5)*10
camera.position.y=-(e.clientY/window.innerHeight-0.5)*10

})

// mensaje secreto

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Te amo ❤️")

}

// animación

function animate(){

requestAnimationFrame(animate)

center.rotation.y+=0.01

stars.rotation.y+=0.0005

planets.forEach(p=>{

p.angle+=p.speed

p.mesh.position.x=Math.cos(p.angle)*p.radius
p.mesh.position.z=Math.sin(p.angle)*p.radius

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
