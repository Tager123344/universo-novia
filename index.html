<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#aa44ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #aa44ff;
}

#mensaje{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.92);
padding:30px;
border-radius:20px;
color:white;
font-size:22px;
display:none;
box-shadow:0 0 40px #ff2e8b;
text-align:center;
max-width:500px;
}

#frase{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
color:#ff9ad5;
text-shadow:0 0 20px #ff4fb0;
opacity:0;
transition:1s;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff2e8b;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>

<button id="musicBtn">🎵 Activar música</button>

<div id="mensaje">
<div id="mensajeContenido"></div>
<br>
<button id="cerrar">Cerrar</button>
</div>

<div id="frase"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// LUZ

const light=new THREE.PointLight(0xffffff,1.6)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// NEBULOSA

const nebulaGeo=new THREE.BufferGeometry()
const nebulaVertices=[]
const nebulaColors=[]

for(let i=0;i<9000;i++){

const x=(Math.random()-0.5)*600
const y=(Math.random()-0.5)*300
const z=(Math.random()-0.5)*600

nebulaVertices.push(x,y,z)

const color=new THREE.Color()
color.setHSL(0.9,0.8,0.7)

nebulaColors.push(color.r,color.g,color.b)

}

nebulaGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(nebulaVertices,3)
)

nebulaGeo.setAttribute(
'color',
new THREE.Float32BufferAttribute(nebulaColors,3)
)

const nebulaMat=new THREE.PointsMaterial({
size:2,
vertexColors:true,
transparent:true,
opacity:0.45
})

const nebula=new THREE.Points(nebulaGeo,nebulaMat)
scene.add(nebula)



// CORAZON CENTRAL (ARREGLADO)

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1.5
})

const heartMesh=new THREE.Points(heartGeo,heartMat)

heartMesh.position.y=35
// QUITAMOS la rotación que lo ponía al revés

scene.add(heartMesh)



// FRASES

const frases=[
"💖 Mi gordita hermosa",
"💗 Mi caprichosita",
"👶 Mi bebita",
"🥰 Mi tiquitita",
"🐞 Mi pulguita",
"👑 Mi princecita",
"🌸 Mi niña hermosa",
"💘 Eres mi universo",
"💞 Siempre tú",
"🌹 Contigo todo es más bonito",
"✨ Eres mi estrella favorita",
"💓 Te amo infinitamente"
]

function mostrarFrase(){

const frase=frases[Math.floor(Math.random()*frases.length)]

const div=document.getElementById("frase")

div.innerHTML=frase
div.style.opacity=1

setTimeout(()=>{

div.style.opacity=0

},6000)

}

setInterval(mostrarFrase,9000)



// FRASES EN EL UNIVERSO (3D)

function crearTexto(frase){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=128

ctx.fillStyle="#ff9ad5"
ctx.font="40px Arial"
ctx.textAlign="center"
ctx.fillText(frase,256,64)

const texture=new THREE.CanvasTexture(canvas)

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true,
opacity:0.35
})

const sprite=new THREE.Sprite(material)

sprite.position.set(
(Math.random()-0.5)*800,
(Math.random()-0.5)*400,
(Math.random()-0.5)*800
)

sprite.scale.set(60,15,1)

scene.add(sprite)

}

for(let i=0;i<200;i++){
crearTexto(frases[Math.floor(Math.random()*frases.length)])
}



// FOTOS (BAJADAS CERCA DEL CORAZON)

const photos=[]
const loader=new THREE.TextureLoader()

function photo(angle,i){

const group=new THREE.Group()

const tex=loader.load("foto"+i+".jpg")

const geo=new THREE.PlaneGeometry(16,16)

const mat=new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const photoMesh=new THREE.Mesh(geo,mat)

group.add(photoMesh)

const edges=new THREE.EdgesGeometry(geo)

const line=new THREE.LineSegments(
edges,
new THREE.LineBasicMaterial({color:0xff77aa})
)

line.scale.set(1.15,1.15,1)

group.add(line)

group.position.y=28

group.position.x=Math.cos(angle)*40
group.position.z=Math.sin(angle)*40

scene.add(group)

photos.push(group)

}

for(let i=1;i<=8;i++){
photo(i*Math.PI*2/8,i)
}



// MÁS ESTRELLAS CAYENDO

function lluvia(){

for(let i=0;i<4;i++){

const geo=new THREE.BoxGeometry(0.5,0.5,0.5)

const mat=new THREE.MeshBasicMaterial({color:0xffffff})

const cube=new THREE.Mesh(geo,mat)

cube.position.set(
(Math.random()-0.5)*200,
120,
(Math.random()-0.5)*200
)

scene.add(cube)

function caer(){

cube.position.y-=2

if(cube.position.y>-120){

requestAnimationFrame(caer)

}else{

scene.remove(cube)

}

}

caer()

}

}

setInterval(lluvia,200)



// MUSICA

let music

document.getElementById("musicBtn").onclick=()=>{

if(!music){

music=new Audio("music.mp3")
music.loop=true
music.volume=0.7

crearCubos()

}

music.play()

}



// MENSAJE SECRETO

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersect=raycaster.intersectObject(heartMesh)

if(intersect.length>0){

const clave=prompt("Ingresa la clave secreta")

if(clave==="30102025"){

document.getElementById("mensajeContenido").innerHTML=
"Mi amor ❤️ desde que llegaste a mi vida todo es más bonito.<br><br>Eres mi universo."

document.getElementById("mensaje").style.display="block"

}else{

alert("Clave incorrecta")

}

}

})

document.getElementById("cerrar").onclick=()=>{
document.getElementById("mensaje").style.display="none"
}



// ANIMACION

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0005
heartMesh.rotation.y+=0.002

const pulse=1+Math.sin(Date.now()*0.003)*0.08
heartMesh.scale.set(pulse,pulse,pulse)

photos.forEach((p,i)=>{

const t=Date.now()*0.0002+i
const radius=35+(i*5)

p.position.x=Math.cos(t)*radius
p.position.z=Math.sin(t)*radius

})

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
