<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Arial', sans-serif; }
    #titulo { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; color: #ff7ab6; text-shadow: 0 0 20px #ff7ab6; z-index: 10; pointer-events: none; }
    
    /* BOTÓN PEDIDO */
    #musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border: none; border-radius: 30px; background: #aa44ff; color: white; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px #aa44ff; z-index: 100; transition: 0.3s; }
    #musicBtn:hover { transform: translateX(-50%) scale(1.1); background: #ff77aa; }

    #frase { position: absolute; bottom: 130px; width: 100%; text-align: center; font-size: 26px; color: white; text-shadow: 0 0 20px white; opacity: 0; transition: 1s; z-index: 10; }

    /* MODALES */
    #modalClave, #mensajeSecreto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
    #modalClave.activo, #mensajeSecreto.activo { display: flex; }
    .modal-contenido { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #ff77aa; border: 2px solid #ff77aa; max-width: 450px; color: white; }
    input { padding: 15px; border: 2px solid #ff77aa; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; width: 80%; font-size: 18px; outline: none; }
    .btn-modal { padding: 12px 25px; border: none; border-radius: 20px; background: #ff77aa; color: white; cursor: pointer; font-size: 16px; margin: 10px; transition: 0.3s; }
    .btn-modal:hover { background: #ff4488; transform: scale(1.05); }
</style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico 💖</div>
<button id="musicBtn">Activar música</button>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p><strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
        Tú eres mi universo, mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
        <strong>¡Te amo infinitamente, Natasha! 💕</strong></p>
        <button class="btn-modal" onclick="cerrarModales()">💕 Te amo 💕</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const CLAVE_SECRETA = "30102025";
let despierto = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 50, 280);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUCES
const aLight = new THREE.AmbientLight(0xffffff, 0.1);
scene.add(aLight);
const pLight = new THREE.PointLight(0xffffff, 0.2);
pLight.position.set(50, 50, 50);
scene.add(pLight);

const frases = ["💖 Mi amor", "🥰 Eres única", "💘 Natasha", "✨ Mi vida", "🌸 Princesa", "💍 Siempre", "🧸 Mi bebita", "👑 Mi reina", "🦋 Eres magia", "🌹 Te amo"];

// 1. ESTRELLAS (Invisibles al inicio)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<15000; i++) {
    starPos.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1000, (Math.random()-0.5)*1500);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// 2. CUBOS ROSAS (Invisibles al inicio)
const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
for(let i=0; i<1000; i++) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), cubeMat);
    c.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*800, (Math.random()-0.5)*1000);
    scene.add(c);
    cubes.push(c);
}

// 3. CORAZÓN CENTRAL (Gris al inicio)
const heartPoints = [];
for (let i = 0; i < 2500; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    heartPoints.push(x * 1.5, y * 1.5 + 40, (Math.random() - 0.5) * 5);
}
const heartMat = new THREE.PointsMaterial({ color: 0x333333, size: 2 });
const heart = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(heartPoints, 3)), heartMat);
scene.add(heart);

// 4. FRASES FLOTANTES
const sprites = [];
function crearSprite(texto) {
    const canvas = document.createElement("canvas"); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
    ctx.fillText(texto, 128, 32);
    const sMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 });
    const s = new THREE.Sprite(sMat);
    s.position.set((Math.random()-0.5)*1200, (Math.random()-0.5)*700, (Math.random()-0.5)*1200);
    s.scale.set(50, 12, 1);
    scene.add(s);
    sprites.push(s);
}
for(let i=0; i<400; i++) crearSprite(frases[i % frases.length]);

// 5. FOTOS ORDENADAS (Doble círculo fijo)
const photos = [];
const loader = new THREE.TextureLoader();
const fShape = new THREE.Shape();
fShape.moveTo(-10.5,-10.5); fShape.lineTo(10.5,-10.5); fShape.lineTo(10.5,10.5); fShape.lineTo(-10.5,10.5);
const hole = new THREE.Path(); hole.moveTo(-9.5,-9.5); hole.lineTo(9.5,-9.5); hole.lineTo(9.5,9.5); hole.lineTo(-9.5,9.5);
fShape.holes.push(hole);
const fGeo = new THREE.ShapeGeometry(fShape);

for(let i=1; i<=28; i++) {
    const group = new THREE.Group();
    const pMat = new THREE.MeshBasicMaterial({ map: loader.load(`foto${i}.jpg`), side: THREE.DoubleSide, transparent: true, opacity: 0 });
    const frMat = new THREE.MeshBasicMaterial({ color: 0xff7ab6, side: THREE.DoubleSide, transparent: true, opacity: 0 });
    
    group.add(new THREE.Mesh(new THREE.PlaneGeometry(19, 19), pMat));
    group.add(new THREE.Mesh(fGeo, frMat));
    
    const angle = (i % 14) * (Math.PI * 2 / 14);
    const radius = i <= 14 ? 110 : 150;
    const yPos = i <= 14 ? 60 : -20;
    group.position.set(Math.cos(angle)*radius, yPos, Math.sin(angle)*radius);
    
    scene.add(group);
    photos.push(group);
}

// 6. PARTÍCULAS HOVER
const particles = [];
function createP(pos) {
    if(!despierto) return;
    for(let i=0; i<5; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffffff, transparent:true}));
        p.position.copy(pos);
        p.userData = { v: new THREE.Vector3((Math.random()-0.5), Math.random(), (Math.random()-0.5)), l: 1.0 };
        scene.add(p); particles.push(p);
    }
}

// LOGICA CLAVE
function verificarClave() {
    if(document.getElementById('inputClave').value === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { alert("Clave incorrecta mi amor..."); }
}
function cerrarModales() {
    document.getElementById('modalClave').classList.remove('activo');
    document.getElementById('mensajeSecreto').classList.remove('activo');
}

// INTERACCION
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove", (e) => {
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    if(despierto) {
        ray.setFromCamera(mouse, camera);
        const hits = ray.intersectObjects(photos, true);
        photos.forEach(p => p.scale.set(1,1,1));
        if(hits.length > 0) {
            const o = hits[0].object.parent;
            o.scale.set(1.15, 1.15, 1.15);
            createP(o.position);
        }
    }
});

window.addEventListener("click", () => {
    ray.setFromCamera(mouse, camera);
    if(ray.intersectObject(heart).length > 0 && despierto) document.getElementById('modalClave').classList.add('activo');
});

// DESPERTAR
let audio;
document.getElementById("musicBtn").onclick = function() {
    if(!audio) { audio = new Audio("music.mp3"); audio.loop = true; }
    audio.play();
    this.style.display = "none";
    despierto = true;
    
    // Animación de encendido
    heartMat.color.set(0xff3377);
    aLight.intensity = 0.6;
    pLight.intensity = 1.5;
    starsMat.opacity = 0.8;
    cubeMat.opacity = 0.5;
    sprites.forEach(s => s.material.opacity = 0.4);
    photos.forEach(p => {
        p.children[0].material.opacity = 1;
        p.children[1].material.opacity = 1;
    });
};

function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    if(despierto) {
        heart.rotation.y += 0.005;
        heart.scale.setScalar(1 + Math.sin(t * 4) * 0.1);
        stars.rotation.y += 0.0002;
        
        const p = 1 + Math.sin(t * 2) * 0.2;
        cubes.forEach(c => { c.scale.setScalar(p); c.rotation.y += 0.01; });
        
        photos.forEach((p, i) => {
            p.lookAt(camera.position);
            p.position.y += Math.sin(t + i) * 0.05;
        });

        for(let i=particles.length-1; i>=0; i--) {
            const pt = particles[i];
            pt.position.add(pt.userData.v);
            pt.userData.l -= 0.02;
            pt.material.opacity = pt.userData.l;
            if(pt.userData.l <= 0) { scene.remove(pt); particles.splice(i, 1); }
        }
    } else {
        heart.scale.setScalar(1 + Math.sin(t * 1) * 0.03);
    }

    controls.update();
    renderer.render(scene, camera);
}
animate();

setInterval(() => {
    if(despierto) {
        const d = document.getElementById("frase");
        d.innerHTML = frases[Math.floor(Math.random()*frases.length)];
        d.style.opacity = 1;
        setTimeout(() => d.style.opacity = 0, 4000);
    }
}, 7000);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
