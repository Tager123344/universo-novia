<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
color:#ff7ab6;
text-shadow:0 0 25px #ff7ab6;
}

#musicBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
border:none;
border-radius:25px;
background:#aa44ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #aa44ff;
}

#mensaje{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.92);
padding:30px;
border-radius:20px;
color:white;
font-size:22px;
display:none;
box-shadow:0 0 40px #ff2e8b;
text-align:center;
max-width:500px;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff2e8b;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="titulo">💖 Toca el corazón para desbloquear un mensaje 💖</div>

<button id="musicBtn">🎵 Activar música</button>

<div id="mensaje">
<div id="mensajeContenido"></div>
<br>
<button id="cerrar">Cerrar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=90

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true



// LUZ

const light=new THREE.PointLight(0xffffff,1.8)
light.position.set(50,50,50)
scene.add(light)



// GALAXIA

const galaxyGeo=new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<15000;i++){

const r=Math.random()*200
const spin=r*0.4
const angle=Math.random()*Math.PI*2

vertices.push(
Math.cos(angle+spin)*r,
(Math.random()-0.5)*20,
Math.sin(angle+spin)*r
)

}

galaxyGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const galaxyMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.7
})

const galaxy=new THREE.Points(galaxyGeo,galaxyMat)
scene.add(galaxy)



// NEBULOSA

const nebulaGeo=new THREE.BufferGeometry()
const nebulaVertices=[]
const nebulaColors=[]

for(let i=0;i<9000;i++){

const x=(Math.random()-0.5)*600
const y=(Math.random()-0.5)*300
const z=(Math.random()-0.5)*600

nebulaVertices.push(x,y,z)

const color=new THREE.Color()
color.setHSL(0.9,0.8,0.7)

nebulaColors.push(color.r,color.g,color.b)

}

nebulaGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(nebulaVertices,3)
)

nebulaGeo.setAttribute(
'color',
new THREE.Float32BufferAttribute(nebulaColors,3)
)

const nebulaMat=new THREE.PointsMaterial({
size:2,
vertexColors:true,
transparent:true,
opacity:0.45
})

const nebula=new THREE.Points(nebulaGeo,nebulaMat)
scene.add(nebula)



// CORAZON CENTRAL

const heartGeo=new THREE.BufferGeometry()
const heart=[]

for(let i=0;i<2000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

heart.push(x*0.8,y*0.8,(Math.random()-0.5)*2)

}

heartGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(heart,3)
)

const heartMat=new THREE.PointsMaterial({
color:0xff3377,
size:1.5,
transparent:true
})

const heartMesh=new THREE.Points(heartGeo,heartMat)
heartMesh.position.y=35
heartMesh.rotation.z=Math.PI

scene.add(heartMesh)



// CORAZONES PEQUEÑOS

const miniHearts=[]

function createHeartShape(){

const heartShape=new THREE.Shape()

heartShape.moveTo(0,0)
heartShape.bezierCurveTo(0,0,-0.5,-0.5,-1,0)
heartShape.bezierCurveTo(-1.5,0.5,-1,1.2,0,1.6)
heartShape.bezierCurveTo(1,1.2,1.5,0.5,1,0)
heartShape.bezierCurveTo(0.5,-0.5,0,0,0,0)

return heartShape

}

for(let i=0;i<120;i++){

const geo=new THREE.ShapeGeometry(createHeartShape())

const mat=new THREE.MeshBasicMaterial({
color:0xff4fa3,
side:THREE.DoubleSide
})

const heart=new THREE.Mesh(geo,mat)

heart.scale.set(1.5,1.5,1)
heart.rotation.z=Math.PI

heart.position.set(
(Math.random()-0.5)*400,
(Math.random()-0.5)*200,
(Math.random()-0.5)*400
)

scene.add(heart)

miniHearts.push(heart)

}



// ESTRELLAS QUE CHOCAN

const starGeo=new THREE.SphereGeometry(1.5,16,16)
const starMat=new THREE.MeshBasicMaterial({color:0xffffff})

const star1=new THREE.Mesh(starGeo,starMat)
const star2=new THREE.Mesh(starGeo,starMat)

star1.position.set(-120,50,-200)
star2.position.set(120,50,-200)

scene.add(star1)
scene.add(star2)



// CORAZON GIGANTE

let bigHeart

function createBigHeart(){

const geo=new THREE.BufferGeometry()
const points=[]

for(let i=0;i<4000;i++){

const t=Math.random()*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

points.push(x*3,y*3,(Math.random()-0.5)*2)

}

geo.setAttribute(
'position',
new THREE.Float32BufferAttribute(points,3)
)

const mat=new THREE.PointsMaterial({
color:0xff66cc,
size:2,
transparent:true
})

bigHeart=new THREE.Points(geo,mat)

bigHeart.position.set(0,40,-200)
bigHeart.rotation.z=Math.PI

scene.add(bigHeart)

}



// EXPLOSION BONITA CORAZONES

function heartExplosion(position){

for(let i=0;i<40;i++){

const geo=new THREE.SphereGeometry(0.2,6,6)

const mat=new THREE.MeshBasicMaterial({
color:0xff77cc,
transparent:true
})

const star=new THREE.Mesh(geo,mat)

star.position.copy(position)

scene.add(star)

const vx=(Math.random()-0.5)*2
const vy=(Math.random())*2
const vz=(Math.random()-0.5)*2

function animate(){

star.material.opacity-=0.02

star.position.x+=vx
star.position.y+=vy
star.position.z+=vz

if(star.material.opacity>0){

requestAnimationFrame(animate)

}else{

scene.remove(star)

}

}

animate()

}

}



// CLICK

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const heartHits=raycaster.intersectObjects(miniHearts)

if(heartHits.length>0){

const obj=heartHits[0].object

heartExplosion(obj.position)

scene.remove(obj)

miniHearts.splice(miniHearts.indexOf(obj),1)

}

})



// MUSICA

let music

document.getElementById("musicBtn").onclick=()=>{

if(!music){

music=new Audio("music.mp3")
music.loop=true
music.volume=0.7

}

music.play()

}



// ANIMACION

let collisionDone=false

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y+=0.0005
heartMesh.rotation.y+=0.002

if(!collisionDone){

star1.position.x+=0.2
star2.position.x-=0.2

if(star1.position.x>=0){

collisionDone=true

scene.remove(star1)
scene.remove(star2)

createBigHeart()

}

}

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
