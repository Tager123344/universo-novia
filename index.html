<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo - Natasha</title>
    <style>
        /* =========================================
           ESTILOS BASE
           ========================================= */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            cursor: default; 
        }

        #titulo { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(20px, 5vw, 32px); 
            color: #ff7ab6; 
            text-shadow: 0 0 20px #ff7ab6; 
            z-index: 10; 
            pointer-events: none; 
        }
        
        #musicBtn { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px 35px; 
            border: none; 
            border-radius: 30px; 
            background: #aa44ff; 
            color: white; 
            font-size: 20px; 
            cursor: pointer; 
            box-shadow: 0 0 25px #aa44ff; 
            z-index: 100; 
            transition: 0.5s; 
        }

        #musicBtn:hover { 
            transform: translateX(-50%) scale(1.1); 
            box-shadow: 0 0 40px #ff77aa; 
            background: #ff77aa; 
        }

        #frase { 
            position: absolute; 
            bottom: 20px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(14px, 3vw, 20px); 
            color: rgba(255,255,255,0.7); 
            text-shadow: 0 0 10px white; 
            opacity: 0; 
            transition: 1.5s; 
            z-index: 10; 
            pointer-events: none; 
        }

        /* =========================================
           NUEVO: ESTILOS DEL KARAOKE
           ========================================= */
        #karaoke { 
            position: absolute; 
            bottom: 120px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(22px, 4vw, 36px); 
            color: #ffffff; 
            text-shadow: 0 0 15px #ff7ab6, 0 0 30px #ff7ab6, 0 0 45px #ff7ab6; 
            font-style: italic;
            font-weight: bold;
            opacity: 0; 
            transform: translateY(15px);
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-out; 
            z-index: 50; 
            pointer-events: none; 
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* =========================================
           MODALES (CLAVE Y MENSAJE FINAL)
           ========================================= */
        #modalClave, #mensajeSecreto { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.92); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(10px); 
        }

        #modalClave.activo, #mensajeSecreto.activo { 
            display: flex; 
        }

        .modal-contenido { 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 0 60px #ff77aa; 
            border: 2px solid #ff77aa; 
            max-width: 90%; 
            width: 450px; 
            color: white; 
        }
        
        input { 
            padding: 15px; 
            border: 2px solid #ff77aa; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            text-align: center; 
            margin-bottom: 20px; 
            width: 85%; 
            font-size: 18px; 
            outline: none; 
        }

        .btn-modal { 
            padding: 12px 25px; 
            border: none; 
            border-radius: 20px; 
            background: #ff77aa; 
            color: white; 
            cursor: pointer; 
            font-size: 16px; 
            margin: 10px; 
            transition: 0.3s; 
        }

        .btn-modal:hover { 
            background: #ff4488; 
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

<div id="titulo">💖 Nuestro Universo Mágico - Natasha 💖</div>
<button id="musicBtn">✨ Activar Magia ✨</button>

<div id="karaoke"></div>
<div id="frase"></div>

<div id="modalClave">
    <div class="modal-contenido">
        <h2>🔐 Clave Secreta 💕</h2>
        <p style="font-size: 0.9em; margin-bottom: 15px;">Ingresa nuestra fecha especial (DDMMAAAA)</p>
        <input type="password" id="inputClave" placeholder="DDMMAAAA">
        <br>
        <button class="btn-modal" onclick="verificarClave()">💖 Abrir mi corazón</button>
        <button class="btn-modal" onclick="cerrarModales()">Cerrar</button>
    </div>
</div>

<div id="mensajeSecreto">
    <div class="modal-contenido">
        <h1>¡Hola mi amor! ✨</h1>
        <p style="line-height: 1.6;">
            <strong>Este universo es tuyo, porque tú eres mi universo.</strong><br><br>
            Tú eres mi principio y mi fin. Cada estrella brilla porque tú existes.<br><br>
            <span style="font-size: 1.3em; color: #ff7ab6; font-weight: bold;">te amo mucho mi gordita gracias por existir ❤️</span>
        </p>
        <button class="btn-modal" onclick="cerrarMensaje()">💕 Te amo ❤️</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
/**
 * =========================================
 * 1. LETRA DE LA CANCIÓN Y TIEMPOS
 * =========================================
 */
const letraCancion = [
    { time: 0, text: "" },
    { time: 13.5, text: "I’ve been walking around" },
    { time: 17.0, text: "Waiting for you to shine my love" },
    { time: 20.5, text: "People passes me by" },
    { time: 24.0, text: "Doesn’t feel like I belong" },
    { time: 27.5, text: "Trying to keep it alive" },
    { time: 31.0, text: "All this hunger inside" },
    { time: 34.5, text: "For a better confirmation" },
    { time: 38.0, text: "That I'm heading for the station" },
    { time: 42.0, text: "I can feel" },
    { time: 44.0, text: "Love is real" },
    { time: 46.0, text: "Now you try" },
    { time: 48.0, text: "If you're willing to just come along with me" },
    { time: 55.5, text: "We can feel" },
    { time: 57.5, text: "No more lies" },
    { time: 59.5, text: "A Simple dream of you and I" },
    { time: 64.0, text: "" },
    { time: 69.5, text: "All my friends by my side" },
    { time: 73.0, text: "Told me that I should find some love" },
    { time: 76.5, text: "I’ve been walking around" },
    { time: 80.0, text: "Trynna to catch you with my eyes" },
    { time: 83.5, text: "With no one in my heart" },
    { time: 87.0, text: "But I guess I can start" },
    { time: 90.5, text: "An easy conversation" },
    { time: 94.0, text: "Get a bit of your attention" },
    { time: 98.0, text: "I can feel" },
    { time: 100.0, text: "Love is real" },
    { time: 102.0, text: "Now you try" },
    { time: 104.0, text: "If you're willing to just come along with me" },
    { time: 112.0, text: "We can feel" },
    { time: 114.0, text: "No more lies" },
    { time: 115.5, text: "A Simple dream of you and I" },
    { time: 121.5, text: "A Simple dream of you and I" },
    { time: 128.0, text: "" }
];

let lineaActualKaraoke = -1;

/**
 * =========================================
 * 2. CONFIGURACIÓN INICIAL DEL JUEGO
 * =========================================
 */
const CLAVE_SECRETA = "30102025";
let despierto = false;
let nivelFade = 0; 
let camaraEnVuelo = false;
let universoExpandido = false;

// Configuración de la Escena y la Cámara
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 2500); 

// Configuración del Renderizador
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controles de Órbita
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.autoRotate = false;
controls.autoRotateSpeed = 0.5;

// Configuración de Luces
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const pLight = new THREE.PointLight(0xff77aa, 2.5, 1500);
pLight.position.set(0, 150, 250);
scene.add(pLight);

const frasesList = [
    "💖 Mi amor", "🥰 Eres mi todo", "💘 Natasha", "✨ Mi vida", 
    "💍 Siempre tú", "🧸 Mi bebita", "👑 Mi reina", "🌹 Te amo", 
    "🌙 Mi luna", "🌸 Mi gordita", "🎀 Mi caprichosita", "👑 Mi princesita", 
    "✨ Mi niña hermosa", "🍭 Mi tiquitita", "🦋 Mi pulguita", "💎 Mi tesorito"
];

/**
 * =========================================
 * 3. CREACIÓN DE OBJETOS 3D
 * =========================================
 */

// A. Fondo de Estrellas (20,000)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i = 0; i < 20000; i++) {
    const x = (Math.random() - 0.5) * 3500;
    const y = (Math.random() - 0.5) * 3000;
    const z = (Math.random() - 0.5) * 3500;
    starPos.push(x, y, z);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starsMat);
scene.add(stars);

// B. Cubos Rosas Flotantes (800)
const cubes = [];
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0 });
const boxGeo = new THREE.BoxGeometry(2, 2, 2);

for(let i = 0; i < 800; i++) {
    const c = new THREE.Mesh(boxGeo, cubeMat.clone());
    c.position.set(
        (Math.random() - 0.5) * 1600,
        (Math.random() - 0.5) * 1300,
        (Math.random() - 0.5) * 1600
    );
    scene.add(c);
    cubes.push(c);
}

// C. El Corazón 3D
const heartShape = new THREE.Shape();
heartShape.moveTo(5, 5); 
heartShape.bezierCurveTo(5, 5, 4, 0, 0, 0); 
heartShape.bezierCurveTo(-6, 0, -6, 7, -6, 7); 
heartShape.bezierCurveTo(-6, 11, -3, 15.4, 5, 19); 
heartShape.bezierCurveTo(12, 15.4, 16, 11, 16, 7); 
heartShape.bezierCurveTo(16, 7, 16, 0, 10, 0); 
heartShape.bezierCurveTo(7, 0, 5, 5, 5, 5);

const extrudeSettings = { 
    depth: 5, 
    bevelEnabled: true, 
    bevelSize: 1.5, 
    bevelThickness: 1.5 
};
const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);

const heartMat = new THREE.MeshStandardMaterial({ 
    color: 0xff3377, 
    emissive: 0xff1144, 
    emissiveIntensity: 2.2, 
    transparent: true, 
    opacity: 0, 
    roughness: 0.1, 
    metalness: 0.2 
});

const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.rotation.z = Math.PI; 
heartMesh.scale.set(4, 4, 4); 
heartMesh.position.set(20, 40, 0);
scene.add(heartMesh);

// D. Las 55 Fotos con Marco Rosa
const photos = [];
const loader = new THREE.TextureLoader();

// Geometría del marco rosa
const fShape = new THREE.Shape(); 
fShape.moveTo(-14, -14); 
fShape.lineTo(14, -14); 
fShape.lineTo(14, 14); 
fShape.lineTo(-14, 14);

const hole = new THREE.Path(); 
hole.moveTo(-12.5, -12.5); 
hole.lineTo(12.5, -12.5); 
hole.lineTo(12.5, 12.5); 
hole.lineTo(-12.5, 12.5); 
fShape.holes.push(hole);

const frameGeo = new THREE.ShapeGeometry(fShape);
const frMat = new THREE.MeshBasicMaterial({ 
    color: 0xff7ab6, 
    side: THREE.DoubleSide, 
    transparent: true, 
    opacity: 0 
});

// Bucle para crear las 55 fotos en círculos concéntricos
for(let i = 1; i <= 55; i++) {
    const group = new THREE.Group();
    
    // Material de la foto
    const photoMat = new THREE.MeshBasicMaterial({ 
        map: loader.load(`foto${i}.jpg`), 
        side: THREE.DoubleSide, 
        transparent: true, 
        opacity: 0 
    });
    
    const photoMesh = new THREE.Mesh(new THREE.PlaneGeometry(25, 25), photoMat);
    group.add(photoMesh);

    // Marco de la foto
    const frameMesh = new THREE.Mesh(frameGeo, frMat);
    group.add(frameMesh);
    
    // Cálculo de posición en anillos
    let ring = 0;
    if (i > 18 && i <= 36) ring = 1;
    if (i > 36) ring = 2;
    
    let radius = 250;
    if (ring === 1) radius = 420;
    if (ring === 2) radius = 580;
    
    let yPos = 160;
    if (ring === 1) yPos = 0;
    if (ring === 2) yPos = -160;
    
    let angle = (i % 18) * (Math.PI * 2 / 18);
    
    group.position.set(
        Math.cos(angle) * radius, 
        yPos + (Math.random() - 0.5) * 70, 
        Math.sin(angle) * radius
    );
    
    scene.add(group); 
    photos.push(group);
}

// E. Sistema de Partículas Amarillas (Explosiones)
const pCount = 600; 
const particlesGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(pCount * 3);
const velArray = new Float32Array(pCount * 3);
particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMat = new THREE.PointsMaterial({ 
    color: 0xffff00, 
    size: 3.5, 
    transparent: true, 
    opacity: 0, 
    blending: THREE.AdditiveBlending 
});
const particleSystem = new THREE.Points(particlesGeo, particlesMat);
scene.add(particleSystem);

// Función para crear la explosión
function explosion(x, y, z, speedMultiplier = 8) {
    particlesMat.opacity = 1;
    const pos = particlesGeo.attributes.position.array;
    for(let i = 0; i < pCount; i++) {
        pos[i*3] = x; 
        pos[i*3+1] = y; 
        pos[i*3+2] = z;
        velArray[i*3] = (Math.random() - 0.5) * speedMultiplier;
        velArray[i*3+1] = (Math.random() - 0.5) * speedMultiplier;
        velArray[i*3+2] = (Math.random() - 0.5) * speedMultiplier;
    }
}

// F. Lluvia de Estrellas Final
const rCount = 500;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(rCount * 3);

for(let i = 0; i < rCount; i++) {
    rainPos[i*3] = (Math.random() - 0.5) * 2500; 
    rainPos[i*3+1] = Math.random() * 1500; 
    rainPos[i*3+2] = (Math.random() - 0.5) * 2500;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));

const rainMat = new THREE.PointsMaterial({ 
    color: 0xffffcc, 
    size: 2.2, 
    transparent: true, 
    opacity: 0 
});
const rainSystem = new THREE.Points(rainGeo, rainMat);
scene.add(rainSystem);

/**
 * =========================================
 * 4. EVENTOS Y AUDIO (KARAOKE)
 * =========================================
 */
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let audio, clickSound;

// Evento al presionar "Activar Magia"
document.getElementById("musicBtn").onclick = function() {
    if(!audio) {
        audio = new Audio("music.mp3");
        audio.loop = true;
        clickSound = new Audio("click.mp3");
        
        // Sincronización del Karaoke
        audio.addEventListener('timeupdate', () => {
            const t = audio.currentTime;
            let index = -1;
            
            // Buscar la línea correspondiente al tiempo actual
            for(let i = 0; i < letraCancion.length; i++) {
                if(t >= letraCancion[i].time) {
                    index = i;
                }
            }
            
            // Si la línea cambia, actualizar el texto en pantalla
            if(index !== lineaActualKaraoke && index !== -1) {
                lineaActualKaraoke = index;
                const divKaraoke = document.getElementById('karaoke');
                
                // Animación de salida (Fade out)
                divKaraoke.style.opacity = 0;
                divKaraoke.style.transform = "translateY(15px)";
                
                // Animación de entrada (Fade in) tras un breve retraso
                setTimeout(() => {
                    divKaraoke.innerText = letraCancion[index].text;
                    if(letraCancion[index].text !== "") {
                        divKaraoke.style.opacity = 1;
                        divKaraoke.style.transform = "translateY(0px)";
                    }
                }, 600);
            }
        });
    }
    
    // Iniciar Audio y Efectos
    audio.play();
    this.style.opacity = "0";
    
    setTimeout(() => {
        this.style.display = "none";
    }, 500);
    
    despierto = true;
    
    // Zoom Inicial hacia el Corazón
    camera.position.set(0, 50, 2000); 
    camera.lookAt(heartMesh.position);
    controls.autoRotate = true; 
    camaraEnVuelo = true; 
};

// Evento de movimiento del Mouse
window.addEventListener("pointermove", (e) => { 
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; 
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; 
});

// Evento de Clics (Corazón y Fotos)
window.addEventListener("click", () => {
    if(!despierto) return;
    ray.setFromCamera(mouse, camera);
    
    // Clic en el Corazón
    const hitHeart = ray.intersectObject(heartMesh);
    if(hitHeart.length > 0) {
        document.getElementById('modalClave').classList.add('activo');
    }
    
    // Clic en las Fotos
    const hitPhotos = ray.intersectObjects(photos, true);
    if(hitPhotos.length > 0) {
        const p = hitPhotos[0].object.parent.position;
        explosion(p.x, p.y, p.z);
        if(clickSound) { 
            clickSound.currentTime = 0; 
            clickSound.play(); 
        }
    }
});

/**
 * =========================================
 * 5. BUCLE DE ANIMACIÓN PRINCIPAL
 * =========================================
 */
function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    if(despierto) {
        // Control del Vuelo de Cámara Inicial
        if(camaraEnVuelo && camera.position.z > 650) { 
            camera.position.z -= 15; 
        } else if (camaraEnVuelo) { 
            camaraEnVuelo = false; 
        }
        
        // Desvanecido de Entrada (Fade In)
        if(nivelFade < 1) {
            nivelFade += 0.004; 
            starsMat.opacity = nivelFade * 0.8; 
            heartMat.opacity = nivelFade; 
            frMat.opacity = nivelFade;
            
            photos.forEach((p) => {
                p.children[0].material.opacity = nivelFade;
            });
            cubeMat.opacity = nivelFade * 0.7;
        }

        // Animación de la Lluvia Final
        if(universoExpandido) {
            const rArray = rainGeo.attributes.position.array;
            for(let i = 0; i < rCount; i++) { 
                rArray[i*3+1] -= 2.5; 
                if(rArray[i*3+1] < -1200) {
                    rArray[i*3+1] = 1200; 
                }
            }
            rainGeo.attributes.position.needsUpdate = true;
            if(rainMat.opacity < 1) {
                rainMat.opacity += 0.01;
            }
        }

        // Animación de Latido del Corazón (Natural y Rápido)
        let pulseFactor = Math.sin(t * 5.0) * Math.sin(t * 5.0); 
        
        let targetScale = (universoExpandido ? 6.2 : 4.1) + pulseFactor * (universoExpandido ? 0.4 : 0.25);
        heartMesh.scale.setScalar(targetScale);
        
        heartMat.emissiveIntensity = 2.0 + pulseFactor * 1.5;
        heartMesh.rotation.y += (universoExpandido ? 0.05 : 0.018);
        stars.rotation.y += 0.00015;

        // Animación de Partículas (Explosiones)
        if(particlesMat.opacity > 0) {
            const pArray = particlesGeo.attributes.position.array;
            for(let i = 0; i < pCount; i++){ 
                pArray[i*3] += velArray[i*3]; 
                pArray[i*3+1] += velArray[i*3+1]; 
                pArray[i*3+2] += velArray[i*3+2]; 
            }
            particlesGeo.attributes.position.needsUpdate = true; 
            particlesMat.opacity -= 0.012; 
        }

        // Animación Flotante de las Fotos
        photos.forEach((p, i) => { 
            p.lookAt(camera.position); 
            p.position.y += Math.sin(t + i) * 0.35; 
        });
    }
    
    controls.update(); 
    renderer.render(scene, camera);
}

/**
 * =========================================
 * 6. FUNCIONES SECUNDARIAS
 * =========================================
 */
function verificarClave() {
    const inputUsuario = document.getElementById('inputClave').value;
    if(inputUsuario === CLAVE_SECRETA) {
        document.getElementById('modalClave').classList.remove('activo');
        document.getElementById('mensajeSecreto').classList.add('activo');
    } else { 
        alert("Esa no es nuestra fecha... Intenta de nuevo 💕"); 
    }
}

function cerrarMensaje() {
    document.getElementById('mensajeSecreto').classList.remove('activo');
    universoExpandido = true;
    
    // Activar Supernova
    explosion(0, 0, 0, 20); 
    
    // Aumentar Intensidad de Luz Central
    pLight.intensity = 7;
    pLight.color.setHex(0xffffff); 
}

function cerrarModales() { 
    const modales = document.querySelectorAll('.activo');
    modales.forEach((m) => {
        m.classList.remove('activo');
    });
}

// Redimensionar pantalla
window.addEventListener('resize', () => { 
    camera.aspect = window.innerWidth / window.innerHeight; 
    camera.updateProjectionMatrix(); 
    renderer.setSize(window.innerWidth, window.innerHeight); 
});

// Iniciar el Bucle Principal
animate();

// Frases Aleatorias Inferiores
setInterval(() => {
    if(despierto && nivelFade > 0.8) {
        const d = document.getElementById("frase");
        const fraseAleatoria = frasesList[Math.floor(Math.random() * frasesList.length)];
        
        d.innerHTML = fraseAleatoria;
        d.style.opacity = 1; 
        
        setTimeout(() => {
            d.style.opacity = 0;
        }, 4000);
    }
}, 7500);

</script>
</body>
</html>
