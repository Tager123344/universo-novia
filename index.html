<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

#titulo{
  position:absolute;
  top:25px;
  width:100%;
  text-align:center;
  font-size:40px;
  color:#ff77aa;
  text-shadow:0 0 40px #ff77aa;
}

#btn{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 25px;
  background:#ff2a8b;
  border:none;
  border-radius:25px;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px #ff2a8b;
}

#login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:10;
  font-size:24px;
}

#login input{
  padding:12px;
  font-size:20px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}
#login button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#ff2a8b;
  color:white;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="titulo">💖 Nuestro universo infinito 💖</div>
<div id="login">
  <div>Introduce la clave:</div>
  <input id="clave" placeholder="30102025">
  <button onclick="verificar()">Entrar</button>
</div>

<button id="btn">💌 Mensaje secreto</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2f7c9fd5d8.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,10000)
camera.position.z=120

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true
controls.dampingFactor=0.05

// GALAXIA ESPIRAL
const galaxyGeo = new THREE.BufferGeometry();
const galaxyVertices = [];
const totalStars = 20000;
const removePercent = 0.15; 
const finalStars = Math.floor(totalStars*(1-removePercent));

for(let i=0;i<finalStars;i++){
  const radius=Math.random()*200;
  const spin=radius*0.4;
  const angle=Math.random()*Math.PI*2;
  galaxyVertices.push(Math.cos(angle+spin)*radius, (Math.random()-0.5)*20, Math.sin(angle+spin)*radius);
}

galaxyGeo.setAttribute('position', new THREE.Float32BufferAttribute(galaxyVertices,3));
const galaxyMat = new THREE.PointsMaterial({color:0xffffff, size:0.3, sizeAttenuation:true});
const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxy);

// CORAZON CENTRAL RELLENO
const heartShape = new THREE.Shape();
heartShape.moveTo(0,0);
heartShape.bezierCurveTo(0,0,-6,-6,-12,0);
heartShape.bezierCurveTo(-18,6,-10,18,0,24);
heartShape.bezierCurveTo(10,18,18,6,12,0);
heartShape.bezierCurveTo(6,-6,0,0,0,0);

const heartGeo = new THREE.ExtrudeGeometry(heartShape, {depth:4, bevelEnabled:true, bevelThickness:1, bevelSize:1, bevelSegments:2});
const heartMat = new THREE.MeshStandardMaterial({color:0xff3377, emissive:0xff2255, emissiveIntensity:0.3});
const heart = new THREE.Mesh(heartGeo, heartMat);
heart.scale.set(2,2,2);
heart.position.y=0;
scene.add(heart);

// LUZ
const light=new THREE.PointLight(0xffffff,2)
light.position.set(50,50,50)
scene.add(light)

// PLANETAS SISTEMA SOLAR CON TEXTURA Y ANILLOS
const loader=new THREE.TextureLoader()
const planetData=[
  {name:"Mercurio", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/mercury.jpg", radius:30, speed:0.004},
  {name:"Venus", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/venus.jpg", radius:40, speed:0.0035},
  {name:"Tierra", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/earth.jpg", radius:50, speed:0.003},
  {name:"Marte", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/mars.jpg", radius:60, speed:0.0025},
  {name:"Jupiter", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/jupiter.jpg", radius:75, speed:0.002},
  {name:"Saturno", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/saturn.jpg", radius:90, speed:0.0018},
  {name:"Urano", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/uranus.jpg", radius:105, speed:0.0015},
  {name:"Neptuno", tex:"https://raw.githubusercontent.com/sonicadv/planet-textures/main/neptune.jpg", radius:120, speed:0.0012}
];
const planets=[]
planetData.forEach(p=>{
  const geo=new THREE.SphereGeometry(5,64,64)
  const tex=loader.load(p.tex)
  const mat=new THREE.MeshStandardMaterial({map:tex})
  const planet=new THREE.Mesh(geo,mat)
  planet.userData={angle:Math.random()*Math.PI*2, radius:p.radius, speed:p.speed}
  planet.position.x=Math.cos(planet.userData.angle)*planet.userData.radius
  planet.position.z=Math.sin(planet.userData.angle)*planet.userData.radius
  scene.add(planet)
  planets.push(planet)

  // Anillos solo para Saturno y Urano
  if(p.name==="Saturno" || p.name==="Urano"){
    const ringGeo=new THREE.RingGeometry(7,12,64)
    const ringTex=loader.load("https://raw.githubusercontent.com/sonicadv/planet-textures/main/saturn_ring.png")
    const ringMat=new THREE.MeshBasicMaterial({map:ringTex, side:THREE.DoubleSide, transparent:true})
    const ring=new THREE.Mesh(ringGeo, ringMat)
    ring.rotation.x=Math.PI/2
    planet.add(ring)
  }
})

// FOTOS ÚNICAS
const usedImages=[]
function photo(angle){
  let idx; 
  do{ idx=Math.floor(Math.random()*5)+1 }while(usedImages.includes(idx))
  usedImages.push(idx)
  const tex=loader.load("foto"+idx+".jpg")
  const geo=new THREE.PlaneGeometry(14,14)
  const mat=new THREE.MeshBasicMaterial({map:tex, transparent:true})
  const mesh=new THREE.Mesh(geo, mat)
  mesh.position.x=Math.cos(angle)*35
  mesh.position.z=Math.sin(angle)*35
  scene.add(mesh)
}
for(let i=0;i<5;i++) photo(i*Math.PI*2/5)

// DETECCIÓN DE CLICK EN EL CORAZON
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(event)=>{
  mouse.x=(event.clientX/window.innerWidth)*2-1
  mouse.y=-(event.clientY/window.innerHeight)*2+1
  raycaster.setFromCamera(mouse,camera)
  const hit=raycaster.intersectObject(heart)
  if(hit.length>0){
    document.getElementById("login").style.display="flex"
  }
})

function verificar(){
  if(document.getElementById("clave").value==="30102025"){
    document.getElementById("login").style.display="none"
    alert("¡Clave correcta! 💖")
  } else {
    alert("Clave incorrecta")
  }
}

// ANIMACION DE PLANETAS Y GALAXIA
function animate(){
  requestAnimationFrame(animate)
  galaxy.rotation.y+=0.0005
  heart.rotation.y+=0.003

  planets.forEach(p=>{
    p.userData.angle+=p.userData.speed
    p.position.x=Math.cos(p.userData.angle)*p.userData.radius
    p.position.z=Math.sin(p.userData.angle)*p.userData.radius
  })

  controls.update()
  renderer.render(scene,camera)
}
animate()

// MENSAJE
document.getElementById("btn").onclick=()=>{
  alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")
}

</script>

</body>
</html>
