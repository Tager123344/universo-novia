<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universo de Natasha</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
#login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:10;
  transition: opacity 0.5s ease;
  opacity:0;
}
#login.show{
  display:flex;
  opacity:1;
}
input{
  padding:12px;
  font-size:18px;
  border-radius:10px;
  border:none;
}
button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#ff2e8b;
  color:white;
  font-size:18px;
}
</style>
</head>
<body>

<div id="login">
<h2>Fecha especial</h2>
<input id="clave" placeholder="30/10/2025">
<button onclick="verificar()">Entrar</button>
</div>

<audio autoplay loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>

<script>
// ESCENA Y CAMARA ESTABLE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,10000);
camera.position.z = 120;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = true;
controls.enablePan = true;

// LUZ
const light = new THREE.PointLight(0xffffff,2);
light.position.set(50,50,50);
scene.add(light);
const ambient = new THREE.AmbientLight(0xff66cc,0.2);
scene.add(ambient);

// CORAZON PULSANTE CON PARTICULAS
const heartShape = new THREE.Shape();
heartShape.moveTo(0,0);
heartShape.bezierCurveTo(0,0,-6,-6,-12,0);
heartShape.bezierCurveTo(-18,6,-10,18,0,24);
heartShape.bezierCurveTo(10,18,18,6,12,0);
heartShape.bezierCurveTo(6,-6,0,0,0,0);

const heartGeo = new THREE.ExtrudeGeometry(heartShape,{depth:4,bevelEnabled:true});
const heartMat = new THREE.MeshStandardMaterial({color:0xff3366,emissive:0xff3366});
const heart = new THREE.Mesh(heartGeo,heartMat);
heart.rotation.x = Math.PI;
heart.scale.set(2,2,2);
scene.add(heart);

// PARTICULAS DEL CORAZON
function heartParticles(){
  const geo = new THREE.SphereGeometry(0.2);
  const mat = new THREE.MeshBasicMaterial({color:0xff99cc});
  const p = new THREE.Mesh(geo, mat);
  p.position.copy(heart.position);
  p.position.x += (Math.random()-0.5)*3;
  p.position.y += (Math.random()-0.5)*3;
  p.position.z += (Math.random()-0.5)*3;
  scene.add(p);
  const speed = {x:(Math.random()-0.5)*0.2, y:(Math.random()-0.5)*0.2, z:(Math.random()-0.5)*0.2};
  function move(){
    p.position.x += speed.x;
    p.position.y += speed.y;
    p.position.z += speed.z;
    p.material.opacity = (p.material.opacity||1)-0.01;
    if(p.material.opacity>0) requestAnimationFrame(move);
    else scene.remove(p);
  }
  move();
}
setInterval(heartParticles,150);

// CLICK CORAZON
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click",(event)=>{
  mouse.x=(event.clientX/window.innerWidth)*2-1;
  mouse.y=-(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hit=raycaster.intersectObject(heart);
  if(hit.length>0){
    document.getElementById("login").classList.add("show");
  }
});
function verificar(){
  if(document.getElementById("clave").value==="30/10/2025"){
    document.getElementById("login").classList.remove("show");
  }else{
    alert("Fecha incorrecta");
  }
}

// ESTRELLAS ESPACIADAS ALEATORIAMENTE
const starGeo = new THREE.BufferGeometry();
const vertices = [];
for(let i=0;i<4000;i++){
  vertices.push(
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*600,
    (Math.random()-0.5)*800
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
const starMat = new THREE.PointsMaterial({color:0xffffff,size:0.5});
const galaxy = new THREE.Points(starGeo,starMat);
scene.add(galaxy);

// PLANETAS CON TEXTURA Y PARTICULAS
function planeta(a, textureURL, radius=6, orbitRadius=60){
  const loader = new THREE.TextureLoader();
  loader.load(textureURL,function(tex){
    const geo = new THREE.SphereGeometry(radius,64,64);
    const mat = new THREE.MeshStandardMaterial({map:tex,emissive:0x222222,emissiveIntensity:0.2});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = Math.cos(a)*orbitRadius;
    mesh.position.z = Math.sin(a)*orbitRadius;

    // anillo
    const ringGeo = new THREE.RingGeometry(radius+1,radius+2,64);
    const ringMat = new THREE.MeshBasicMaterial({color:0xff99cc,side:THREE.DoubleSide,transparent:true,opacity:0.5});
    const ring = new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x = Math.PI/2;
    mesh.add(ring);

    // particulas alrededor del planeta
    const particleGeo = new THREE.BufferGeometry();
    const particleVertices = [];
    for(let i=0;i<50;i++){
      const angle = Math.random()*Math.PI*2;
      const dist = radius+Math.random()*3;
      particleVertices.push(Math.cos(angle)*dist,Math.random()*2,Math.sin(angle)*dist);
    }
    particleGeo.setAttribute('position',new THREE.Float32BufferAttribute(particleVertices,3));
    const particleMat = new THREE.PointsMaterial({color:0xff99cc,size:0.2});
    const particles = new THREE.Points(particleGeo,particleMat);
    mesh.add(particles);

    scene.add(mesh);
  });
}
planeta(0,"planet1.jpg");
planeta(Math.PI/2,"planet2.jpg");
planeta(Math.PI,"planet3.jpg");
planeta(Math.PI*1.5,"planet4.jpg");

// FRASES BONITAS CON EMOJIS
const frases = [
  "Mi princesa 👸💖","Mi niña hermosa 🌸","Te amo mucho ❤️","Mi amorcito 💕",
  "Mi cachetoncita 😚","Mi gordita 🥰","Mi tesoro 💎","Eres mi felicidad 😊💖","Eres mi todo 🌟❤️"
];
const fontLoader = new THREE.FontLoader();
fontLoader.load("https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",function(font){
  frases.forEach((f)=>{
    const geo = new THREE.TextGeometry(f,{font:font,size:3,height:0.5});
    const mat = new THREE.MeshBasicMaterial({color:0xff99cc});
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set((Math.random()-0.5)*200,(Math.random()-0.5)*100,(Math.random()-0.5)*200);
    scene.add(mesh);
  });
});

// ANIMACION PRINCIPAL
function animate(){
  requestAnimationFrame(animate);
  heart.rotation.y += 0.01;
  heart.scale.set(2+0.1*Math.sin(Date.now()*0.005),2+0.1*Math.sin(Date.now()*0.005),2+0.1*Math.sin(Date.now()*0.005));
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
