<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro Universo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#mensaje{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:40px;
color:#ff66aa;
text-shadow:0 0 20px #ff66aa;
}

#btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
background:#ff2a8b;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
box-shadow:0 0 15px #ff2a8b;
}

</style>

</head>

<body>

<div id="mensaje">💖 Eres mi universo 💖</div>

<button id="btn">💌 Mensaje secreto</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2f7c9fd5d8.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=30

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping=true
controls.dampingFactor=0.05

// estrellas

const starGeo=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<15000;i++){

starVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)

// corazones

const hearts=[]

function createHeart(){

const geo=new THREE.SphereGeometry(0.4,8,8)

const mat=new THREE.MeshBasicMaterial({
color:0xff66aa
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(
(Math.random()-0.5)*80,
(Math.random()-0.5)*80,
(Math.random()-0.5)*80
)

scene.add(mesh)

hearts.push(mesh)

}

for(let i=0;i<200;i++){
createHeart()
}

// fotos flotando

const loader=new THREE.TextureLoader()

function foto(x,y,z,img){

const tex=loader.load(img)

const geo=new THREE.PlaneGeometry(8,8)

const mat=new THREE.MeshBasicMaterial({
map:tex,
transparent:true
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x,y,z)

scene.add(mesh)

}

foto(-10,5,-10,"foto1.jpg")
foto(12,-5,-15,"foto2.jpg")
foto(-15,-8,-20,"foto3.jpg")
foto(8,15,-18,"foto4.jpg")
foto(-5,-15,-12,"foto5.jpg")

// frases

const frases=[
"Mi princesa",
"Mi niña hermosa",
"Te amo mucho",
"Mi amorcito",
"Mi cachetoncita",
"Mi gordita",
"Mi tesoro",
"Eres mi felicidad",
"Eres mi todo"
]

const textos=[]

function texto(t){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=512
canvas.height=256

ctx.fillStyle="white"
ctx.font="50px Arial"
ctx.fillText(t,40,120)

const tex=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:tex})

const sprite=new THREE.Sprite(mat)

sprite.position.set(
(Math.random()-0.5)*60,
(Math.random()-0.5)*60,
(Math.random()-0.5)*60
)

sprite.scale.set(12,5,1)

scene.add(sprite)

textos.push(sprite)

}

frases.forEach(f=>texto(f))

// botón

document.getElementById("btn").onclick=()=>{

alert("Desde que llegaste a mi vida todo es más bonito. Eres mi universo y siempre quiero estar contigo ❤️")

}

// animación

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
